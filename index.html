    ⚙️ <b>Mètode:</b> hores projectades = cost projectat ÷ ${COSTE_HORA}€/h. Cost projectat = vendes × ràtio P/V actual.
    ${f.has_full_2025 ? '' : ' · ⚠️ <span style="color:var(--warn)">Sense FY 2025: precisió reduïda</span>'}
  </div>`;
  
  // KPIs TY hores i cost
  html += `<div class="krow k3" style="margin-bottom:8px">
    <div class="kpi">
      <div class="kl">TY Hores totals</div>
      <div class="kv" style="font-size:16px">${fmt(tyH)}h</div>
      <div style="font-size:9px;color:var(--sub)">Realitzat ${fmt(realH)}h + proj ${fmt(projH)}h</div>
    </div>
    <div class="kpi">
      <div class="kl">TY Cost personal</div>
      <div class="kv" style="font-size:16px">${(tyC/1000).toFixed(0)}k€</div>
      <div style="font-size:9px;color:var(--sub)">Realitzat ${(f.ty_c_real/1000).toFixed(0)}k + proj ${(f.ty_c_proj/1000).toFixed(0)}k</div>
    </div>
    <div class="kpi">
      <div class="kl">TY Ràtio P/V</div>
      <div class="kv ${sf(tyR)}" style="font-size:16px">${pc(tyR)} ${si(tyR)}</div>
      <div style="font-size:9px;color:var(--sub)">${tyV>0?'sobre '+(tyV/1000).toFixed(0)+'k€ vendes':'—'}</div>
    </div>
  </div>`;
  
  // Pròximes 4 setmanes (projecció hores i cost)
  let t4 = `<table class="dtbl" style="font-size:11px;width:100%">
    <thead><tr>
      <th>Setm.</th>
      <th style="text-align:right">Hores proj.</th>
      <th style="text-align:right">Cost proj.</th>
      <th style="text-align:right">Vendes proj.</th>
      <th style="text-align:right">Ràtio</th>
    </tr></thead><tbody>`;
  for(let i = 0; i < f.proj_4w_v.length; i++){
    const h_i = Math.round(f.proj_4w_c[i] / COSTE_HORA);
    t4 += `<tr>
      <td style="font-weight:600">${f.proj_4w_labels[i]}</td>
      <td style="text-align:right;font-weight:700">${fmt(h_i)}h</td>
      <td style="text-align:right">${fmt(f.proj_4w_c[i])}€</td>
      <td style="text-align:right;color:var(--sub)">${fmt(f.proj_4w_v[i])}€</td>
      <td style="text-align:right;font-weight:600;color:${rc(f.proj_4w_r[i])}">${f.proj_4w_r[i]}%</td>
    </tr>`;
  }
  const totV4 = f.proj_4w_v.reduce((a,b)=>a+b,0);
  const totC4 = f.proj_4w_c.reduce((a,b)=>a+b,0);
  const totH4 = Math.round(totC4 / COSTE_HORA);
  const totR4 = totV4 > 0 ? (totC4/totV4*100).toFixed(1) : 0;
  t4 += `<tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,.03)">
    <td style="font-weight:700">Total mes</td>
    <td style="text-align:right;font-weight:700">${fmt(totH4)}h</td>
    <td style="text-align:right;font-weight:700">${fmt(totC4)}€</td>
    <td style="text-align:right;font-weight:600;color:var(--sub)">${fmt(totV4)}€</td>
    <td style="text-align:right;font-weight:700;color:${rc(totR4)}">${totR4}%</td>
  </tr></tbody></table>`;
  html += `<div class="card">
    <div class="ch"><span class="ct">📅 Projecció pròximes 4 setmanes · Personal</span></div>
    <div class="cb" style="padding:6px 10px;overflow-x:auto">${t4}</div>
  </div>`;
  
  // Gràfic cost setmanal
  const cphFcId = `cph-fc-${locKey.replace(/\s+/g,'')}`;
  html += `<div class="card-scroll">
    <div class="ch"><span class="ct">📈 Cost personal setmanal · Real vs Projecció</span></div>
    <div class="cb" style="padding:6px 4px 8px">
      <div class="cw" style="height:280px"><canvas id="${cphFcId}"></canvas></div>
    </div>
  </div>`;
  
  // Detall complet — comparativa 2025 vs 2026
  const has2025_p = f.weekly_2025 && f.weekly_2025.length > 0;
  const w2025_map_p = {};
  if(has2025_p) f.weekly_2025.forEach(w => { w2025_map_p[w.fw] = w; });
  
  let tDet = `<table class="dtbl" style="font-size:9px;width:100%">
    <thead>
      <tr>
        <th rowspan="2" style="text-align:left">fw</th>
        <th colspan="${has2025_p?2:0}" style="text-align:center;background:rgba(150,150,150,.08);border-right:.5px solid var(--sep)">${has2025_p?'2025 actual':''}</th>
        <th colspan="2" style="text-align:center;background:rgba(0,122,255,.06);border-right:.5px solid var(--sep)">2026 (real + proj)</th>
        <th colspan="2" style="text-align:center;background:rgba(255,180,0,.08)">Variació 26 vs 25</th>
        <th rowspan="2" style="text-align:center">Tipus</th>
      </tr>
      <tr>
        ${has2025_p?`
          <th style="text-align:right">Hores</th>
          <th style="text-align:right;border-right:.5px solid var(--sep)">Cost</th>
        `:''}
        <th style="text-align:right">Hores</th>
        <th style="text-align:right;border-right:.5px solid var(--sep)">Cost</th>
        <th style="text-align:right">Δ Hores</th>
        <th style="text-align:right">Δ Cost</th>
      </tr>
    </thead><tbody>`;
  
  let tot_h_25 = 0, tot_c_25 = 0, tot_h_26 = 0, tot_c_26 = 0;
  
  f.weekly_proj.forEach(w => {
    const isReal = w.source === 'real';
    const bg = isReal ? '' : 'background:rgba(0,122,255,.04)';
    const tag = isReal

      : '<span style="font-size:8px;padding:1px 5px;background:rgba(0,122,255,.12);color:var(--accent);border-radius:3px;font-weight:600">PROJ</span>';
    const h_w = Math.round(w.c / COSTE_HORA);
    const w25 = w2025_map_p[w.fw];
    const h_25 = w25 ? Math.round(w25.c / COSTE_HORA) : null;
    
    tot_c_26 += w.c; tot_h_26 += h_w;
    if(w25 && w25.c) { tot_c_25 += w25.c; tot_h_25 += h_25; }
    
    const dH = (h_25 != null && h_25 > 0) ? ((h_w - h_25) / h_25 * 100) : null;
    const dC = (w25 && w25.c > 0) ? ((w.c - w25.c) / w25.c * 100) : null;
    
    let row = `<tr style="${bg}"><td style="font-weight:600">fw${w.fw}</td>`;
    if(has2025_p){
      row += `<td style="text-align:right;color:var(--sub)">${h_25 ? fmt(h_25) : '—'}</td>`;
      row += `<td style="text-align:right;color:var(--sub);border-right:.5px solid var(--sep)">${w25 && w25.c ? fmt(w25.c) : '—'}</td>`;
    }
    row += `<td style="text-align:right;${isReal?'font-weight:600':''}">${fmt(h_w)}</td>`;
    row += `<td style="text-align:right;border-right:.5px solid var(--sep)">${fmt(w.c)}</td>`;
    row += `<td style="text-align:right;font-weight:600;color:${dH != null ? (dH<=0?'var(--ok)':'var(--bad)') : 'var(--sub)'}">${dH != null ? (dH>=0?'+':'')+dH.toFixed(1)+'%' : '—'}</td>`;
    row += `<td style="text-align:right;font-weight:600;color:${dC != null ? (dC<=0?'var(--ok)':'var(--bad)') : 'var(--sub)'}">${dC != null ? (dC>=0?'+':'')+dC.toFixed(1)+'%' : '—'}</td>`;
    row += `<td style="text-align:center">${tag}</td></tr>`;
    tDet += row;
  });
  
  // Total
  const dH_tot = tot_h_25 > 0 ? ((tot_h_26 - tot_h_25) / tot_h_25 * 100) : null;
  const dC_tot = tot_c_25 > 0 ? ((tot_c_26 - tot_c_25) / tot_c_25 * 100) : null;
  
  tDet += `<tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,.04)">
    <td style="font-weight:700">TY Total</td>`;
  if(has2025_p){
    tDet += `<td style="text-align:right;font-weight:700;color:var(--sub)">${fmt(tot_h_25)}</td>`;
    tDet += `<td style="text-align:right;font-weight:700;color:var(--sub);border-right:.5px solid var(--sep)">${fmt(tot_c_25)}</td>`;
  }
  tDet += `<td style="text-align:right;font-weight:700">${fmt(tyH)}</td>`;
  tDet += `<td style="text-align:right;font-weight:700;border-right:.5px solid var(--sep)">${fmt(tyC)}</td>`;
  tDet += `<td style="text-align:right;font-weight:700;color:${dH_tot != null ? (dH_tot<=0?'var(--ok)':'var(--bad)') : 'var(--sub)'}">${dH_tot != null ? (dH_tot>=0?'+':'')+dH_tot.toFixed(1)+'%' : '—'}</td>`;
  tDet += `<td style="text-align:right;font-weight:700;color:${dC_tot != null ? (dC_tot<=0?'var(--ok)':'var(--bad)') : 'var(--sub)'}">${dC_tot != null ? (dC_tot>=0?'+':'')+dC_tot.toFixed(1)+'%' : '—'}</td>`;
  tDet += `<td></td></tr></tbody></table>`;
  
  html += `<div class="card-scroll">
    <div class="ch"><span class="ct">📋 Detall hores/cost setmanal · 2025 actual vs 2026 (real + proj)</span></div>
    <div class="cb" style="padding:6px 10px;overflow:auto;max-height:65vh">${tDet}</div>
  </div>`;
  
  el.innerHTML = html;
  
  // Render chart
  setTimeout(() => {
    const ctx = document.getElementById(cphFcId);
    if(!ctx) return;
    dk(cphFcId);
    const labels = f.weekly_proj.map(w => 'fw' + w.fw);
    const realCost = f.weekly_proj.map(w => w.source === 'real' ? w.c : null);
    const projCost = f.weekly_proj.map(w => w.source !== 'real' ? w.c : null);
    const lastRealIdx = f.weekly_proj.findIndex(w => w.source !== 'real');
    if(lastRealIdx > 0) projCost[lastRealIdx - 1] = f.weekly_proj[lastRealIdx - 1].c;
    
    charts[cphFcId] = new Chart(ctx.getContext('2d'), {
      type:'line',
      data:{labels, datasets:[
        {label:'Realitzat 2026', data:realCost, borderColor:color, backgroundColor:'transparent', borderWidth:2.5, pointRadius:2, tension:.3, spanGaps:false},
        {label:'Projectat 2026', data:projCost, borderColor:color, backgroundColor:'transparent', borderWidth:2, borderDash:[6,3], pointRadius:1.5, tension:.3, spanGaps:false},
      ]},
      options:{responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:true, position:'bottom', labels:{font:{size:10},boxWidth:10,padding:6}}, tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw!=null?fmt(ctx.raw)+'€':'—'}`}}},
        scales:{x:{grid:{display:false}, ticks:{font:{size:8}, maxRotation:0, autoSkip:true, maxTicksLimit:12}}, y:{grid:{color:'rgba(0,0,0,0.03)'}, ticks:{font:{size:8}, callback:v=>(v/1000).toFixed(0)+'k€'}}}
      }
    });
  }, 50);
}

function _renderPerPanel(parentEl, dataset, year){
  const locsAvail = LOCS.filter(l => dataset[l]);
  if(locsAvail.length === 0){
    parentEl.innerHTML = `<div style="padding:30px;text-align:center;color:var(--sub)">No hi ha dades per ${year}</div>`;
    return;
  }
  const totH = locsAvail.reduce((s,l)=>s+dataset[l].tot_h,0);
  const totCoc = locsAvail.reduce((s,l)=>s+dataset[l].tot_hcoc,0);
  const totSal = locsAvail.reduce((s,l)=>s+dataset[l].tot_hsal,0);
  const totC = locsAvail.reduce((s,l)=>s+dataset[l].tot_cost,0);
  // Vendes per ràtio: agafa de DV o DV_HIST segons any
  const vendesSrc = year === '2026' ? DV : DV_HIST;
  const totV = locsAvail.reduce((s,l) => s + ((vendesSrc[l] && vendesSrc[l].total_vendes) || 0), 0);
  const ratioG = totV > 0 ? totC/totV*100 : 0;
  
  let html = `<div class="loc-banner" style="background:#55555512;border-left:4px solid #555">
    <div style="width:10px;height:10px;border-radius:50%;background:#555;flex-shrink:0"></div>
    <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#555">Total Grup · Personal · ${year}</div>
    <div style="font-size:11px;color:#555;opacity:.75">fw1–fw${dataset[locsAvail[0]].fw_list[dataset[locsAvail[0]].fw_list.length-1]} · ${year} · @19€/h</div></div>
  </div>
  <div class="krow k3" style="margin-bottom:8px">
    <div class="kpi"><div class="kl">Total hores</div><div class="kv" style="font-size:16px">${fmt(totH)}h</div></div>
    <div class="kpi"><div class="kl">Cost personal</div><div class="kv" style="font-size:16px">${(totC/1000).toFixed(1)}k€</div></div>
    <div class="kpi"><div class="kl">Ràtio P/V</div><div class="kv ${sf(ratioG)}">${pc(ratioG)} ${si(ratioG)}</div></div>

  </div>
  <div class="krow k2" style="margin-bottom:8px">
    <div class="kpi"><div class="kl">Cost personal</div><div class="kv" style="font-size:16px">${(p.tot_cost/1000).toFixed(1)}k€</div></div>
    <div class="kpi"><div class="kl">Ràtio P/V</div><div class="kv ${sf(ratio)}">${pc(ratio)} ${si(ratio)}</div></div>
  </div>`;
  
  // Hores per torn
  const torns = ['Matí','Migdia','Tarda','Nit'];
  let tT = `<table class="dtbl"><thead><tr><th>Torn</th><th>Cuina</th><th>Sala</th><th>Total</th></tr></thead><tbody>`;
  let totCT=0, totST=0, totTT=0;
  torns.forEach(t => {
    const c = p.torn_coc[t]||0; const s = p.torn_sal[t]||0; const tot = c+s;
    if(tot===0) return;
    totCT+=c; totST+=s; totTT+=tot;
    tT += `<tr><td style="font-weight:600">${t}</td><td>${c}h</td><td>${s}h</td><td style="font-weight:700">${tot}h</td></tr>`;
  });
  tT += `<tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,.02)"><td style="font-weight:700">Total</td><td style="font-weight:700">${totCT}h</td><td style="font-weight:700">${totST}h</td><td style="font-weight:700">${totTT}h</td></tr></tbody></table>`;
  html += `<div class="card"><div class="ch"><span class="ct">Hores per torn · ${year}</span></div><div class="cb" style="padding:6px 10px;overflow-x:auto">${tT}</div></div>`;
  
  // Hores i cost setmanals · DETALL per categoria (categories com a fila, fws com a columnes)
  // Si existeix COST_DETAIL, usem-lo. Si no, fallback a la taula simple.
  if(typeof COST_DETAIL !== 'undefined' && COST_DETAIL && COST_DETAIL[loc] && year === '2026'){
    const cd = COST_DETAIL[loc];
    const fws_cd = cd.fw_list;
    const tarifes = cd.tarifes;
    const NF = fws_cd.length;
    
    // Helper per pintar files
    function rowH(label, key, eu_label, opts){
      opts = opts || {};
      const vals = (key === null) ? new Array(NF).fill(0)
                  : Array.isArray(key) ? fws_cd.map((_,i) => key.reduce((s,k)=>s+(cd[k][i]||0),0))
                                       : (cd[key] || new Array(NF).fill(0));
      const tot = vals.reduce((s,v)=>s+v,0);
      const cls = opts.bold ? 'font-weight:700;background:rgba(0,0,0,.04)' : 'font-weight:600';
      let row = `<tr style="${opts.bold?'border-top:.5px solid var(--sep)':''}"><td style="${cls}">${label}</td><td style="text-align:right;color:var(--sub);font-size:9px">${eu_label}</td>`;
      vals.forEach(v => row += `<td style="text-align:right;${opts.bold?'font-weight:700':''}">${v?v.toFixed(0)+'h':'—'}</td>`);
      row += `<td class="tot-col" style="font-weight:700;background:${opts.bold?'#e8eef9':'#f0f4ff'}">${tot?tot.toFixed(0)+'h':'0h'}</td></tr>`;
      return row;
    }
    function rowC(label, key, eu_label, opts){
      opts = opts || {};
      const vals = (key === null) ? new Array(NF).fill(0)
                  : Array.isArray(key) ? fws_cd.map((_,i) => key.reduce((s,k)=>s+(cd[k][i]||0),0))
                                       : (cd[key] || new Array(NF).fill(0));
      const tot = vals.reduce((s,v)=>s+v,0);
      let bg, fw, col;
      if(opts.totalfinal){
        bg = '#dde7f7'; fw = '800'; col = 'var(--accent)';
      } else if(opts.bold){
        bg = '#e8eef9'; fw = '700'; col = 'inherit';
      } else {
        bg = '#f0f4ff'; fw = '600'; col = 'inherit';
      }
      const trStyle = opts.totalfinal ? 'border-top:1.5px solid var(--accent);background:rgba(0,122,255,.06)'
                    : opts.bold ? 'border-top:.5px solid var(--sep);background:rgba(0,0,0,.02)' : '';
      let row = `<tr style="${trStyle}"><td style="font-weight:${fw};color:${col}">${label}</td><td style="text-align:right;color:var(--sub);font-size:9px">${eu_label}</td>`;
      vals.forEach(v => row += `<td style="text-align:right;font-weight:${fw};color:${col}">${v?fmt(v)+'€':'—'}</td>`);
      row += `<td class="tot-col" style="font-weight:${fw};background:${bg};color:${col}">${tot?(tot/1000).toFixed(1)+'k€':'0€'}</td></tr>`;
      return row;
    }
    function sepRow(text){
      return `<tr style="background:rgba(0,0,0,.04)"><td colspan="${NF+3}" style="font-weight:700;color:var(--sub);font-size:9px;padding:3px 6px">${text}</td></tr>`;
    }
    
    // Renderitzar taula nova
    let tD = `<table class="dtbl" style="font-size:9px">
      <thead>
        <tr>
          <th rowspan="2" style="text-align:left;min-width:170px">Concepte</th>
          <th rowspan="2" style="text-align:right;min-width:50px">Cost €/h</th>

          <th class="tot-col" style="background:#f0f4ff">Total</th>
        </tr>
      </thead>
      <tbody>`;
    
    const tar_treb = `${tarifes.treball_base}/${tarifes.treball_dir_enc}€`;
    const tar_bx   = `${tarifes.baixa_mitja}/${tarifes.baixa_llarga}€`;
    
    // ═══ TREBALL ═══
    tD += sepRow('⏱️ HORES TREBALLADES');
    tD += rowH('Hores treballades cuina', 'fw_h_treb_cuina', tar_treb);
    tD += rowH('Hores treballades sala',  'fw_h_treb_sala',  tar_treb);
    tD += rowH('Total hores treballades', ['fw_h_treb_cuina','fw_h_treb_sala'], '', {bold:true});
    
    // ═══ VACANCES ═══
    tD += sepRow('🏖️ HORES VACANCES');
    tD += rowH('Hores vacances cuina', 'fw_h_vac_cuina', tar_treb);
    tD += rowH('Hores vacances sala',  'fw_h_vac_sala',  tar_treb);
    tD += rowH('Total hores vacances', ['fw_h_vac_cuina','fw_h_vac_sala'], '', {bold:true});
    
    // ═══ BAIXES + AJUSTOS (en hores) ═══
    tD += sepRow('🤒 HORES BAIXES / AJUSTOS');
    tD += rowH('Hores de baixa llarga', 'fw_h_bx_llarga', `@${tarifes.baixa_llarga}€`);
    tD += rowH('Hores de baixa curta',  'fw_h_bx_curta',  `@${tarifes.baixa_mitja}€`);
    tD += rowH('Hores ajustos',         'fw_h_ajust',     `@${tarifes.treball_base}€`);
    tD += rowH('Total hores baixes/ajustos', ['fw_h_bx_llarga','fw_h_bx_curta','fw_h_ajust'], '', {bold:true});
    
    // ═══ COSTOS ═══
    tD += sepRow('💶 COSTOS');
    tD += rowC('Total cost treballades', ['fw_c_treb_cuina','fw_c_treb_sala'], tar_treb);
    tD += rowC('Total cost vacances',    ['fw_c_vac_cuina','fw_c_vac_sala'], tar_treb);
    tD += rowC('Total cost baixes/ajustos', ['fw_c_bx_llarga','fw_c_bx_curta','fw_c_ajust'], `${tar_bx} · ajust manual`);
    tD += rowC('TOTAL COST €', 'fw_c_total', '', {totalfinal:true});
    
    tD += `</tbody></table>`;
    
    // Llegenda
    let llegenda = `<div style="font-size:10px;color:var(--sub);padding:6px 10px;background:rgba(0,0,0,.02);border-radius:4px;margin-top:6px">
      <strong>Tarifes aplicades:</strong> 
      Treball/Vacances ${tarifes.treball_dir_enc}€/h (director+encarregat) · ${tarifes.treball_base}€/h (base) · 
      Baixa llarga (>2 mesos): ${tarifes.baixa_llarga}€/h · 
      Baixa curta (<2 mesos): ${tarifes.baixa_mitja}€/h · 
      Ajustos en hores: ${tarifes.treball_base}€/h (base)<br>
      <strong>Ajustaments operatius (només cost):</strong> ${cd.ajustos_desc || '—'}
    </div>`;
    
    html += `<div class="card-scroll">
      <div class="ch"><span class="ct">📋 Detall hores i cost setmanal · ${year}</span></div>
      <div class="cb" style="padding:6px 10px;overflow:auto;max-height:75vh">${tD}${llegenda}</div>
    </div>`;
  } else {
    // Fallback (any 2025 o si no hi ha COST_DETAIL): taula simple original
    let tS = `<table class="dtbl"><thead><tr><th>fw</th><th>H.Cuina</th><th>H.Sala</th><th>H.Total</th><th>Cost</th></tr></thead><tbody>`;
    fws.forEach((fw, i) => {
      tS += `<tr><td style="font-weight:600">${fw}</td><td>${p.fw_hcoc[i]}h</td><td>${p.fw_hsal[i]}h</td><td style="font-weight:700">${p.fw_htot[i]}h</td><td style="color:var(--sub)">${(p.fw_cost_p[i]/1000).toFixed(1)}k€</td></tr>`;
    });
    tS += `<tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,.02)"><td style="font-weight:700">Total</td><td style="font-weight:700">${fmt(p.tot_hcoc)}h</td><td style="font-weight:700">${fmt(p.tot_hsal)}h</td><td style="font-weight:700">${fmt(p.tot_h)}h</td><td style="font-weight:700">${(p.tot_cost/1000).toFixed(1)}k€</td></tr></tbody></table>`;
    html += `<div class="card"><div class="ch"><span class="ct">Hores i cost setmanals · ${year}</span></div><div class="cb" style="padding:6px 10px;overflow-x:auto">${tS}</div></div>`;
  }
  
  // Absències si existeix
  if(p.absencies){
    const a = p.absencies;
    let tA = `<table class="dtbl"><thead><tr><th>Tipus</th><th>Hores</th><th>Cost</th></tr></thead><tbody>`;
    if(a.tot_baixa > 0) tA += `<tr><td>Baixa malaltia</td><td>${a.tot_baixa}h</td><td style="color:var(--bad);font-weight:700">${fmt(a.cost_baixa)}€</td></tr>`;
    if(a.tot_accident > 0) tA += `<tr><td>Accident</td><td>${a.tot_accident}h</td><td style="color:var(--bad);font-weight:700">${fmt(a.cost_accident)}€</td></tr>`;
    if(a.tot_vacances > 0) tA += `<tr><td>Vacances</td><td>${a.tot_vacances}h (${Math.round(a.tot_vacances/8)}d)</td><td style="color:var(--sub)">—</td></tr>`;
    if(a.tot_injust > 0) tA += `<tr><td>Injustificada</td><td>${a.tot_injust}h</td><td style="color:var(--sub)">—</td></tr>`;
    if(a.tot_altres > 0) tA += `<tr><td>Altres</td><td>${a.tot_altres}h</td><td style="color:var(--sub)">—</td></tr>`;
    tA += `<tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,.02)"><td style="font-weight:700">Total cost</td><td>—</td><td style="color:var(--bad);font-weight:700">${fmt(a.cost_total)}€</td></tr></tbody></table>`;
    html += `<div class="card"><div class="ch"><span class="ct">Absències · ${year}</span></div><div class="cb" style="padding:6px 10px;overflow-x:auto">${tA}</div></div>`;
  }
  
  parentEl.innerHTML = html;
}

function tornTaula(p,col){
  const torns=['Matí','Migdia','Tarda','Nit'];
  const actius=torns.filter(t=>(p.torn_coc[t]||0)+(p.torn_sal[t]||0)>0);
  const dv=DV[curPer];
  const hmV=dv?dv.heatmap:null;
  const totV=dv?dv.total_vendes:0;
  return`<table class="dtbl">
    <thead><tr><th style="text-align:left">Torn</th><th>Cuina</th><th>Sala</th><th>Total</th>${hmV?'<th>Ràtio P/V</th>':''}</tr></thead>
    <tbody>${actius.map(t=>{
      const c=p.torn_coc[t]||0,s=p.torn_sal[t]||0,tot=c+s;
      const cost=tot*COSTE_HORA;
      const vTorn=hmV&&hmV[t]?hmV[t].reduce((a,b)=>a+b,0):0;
      const ratio=vTorn>0?parseFloat((cost/vTorn*100).toFixed(1)):null;
      const ratioCell=hmV&&ratio!==null?`<td style="font-weight:700;color:${rc(ratio)}">${ratio}%</td>`:'<td>—</td>';
      return`<tr><td>${t}</td><td>${fmt(c)}h</td><td>${fmt(s)}h</td><td style="font-weight:700">${fmt(tot)}h</td>${ratioCell}</tr>`;
    }).join('')}
    <tr style="background:rgba(0,0,0,0.02)"><td style="font-weight:700">Total</td><td style="font-weight:700">${fmt(p.tot_hcoc)}h</td><td style="font-weight:700">${fmt(p.tot_hsal)}h</td><td style="font-weight:700">${fmt(p.tot_h)}h</td>${hmV?`<td style="font-weight:700;color:${rc(p.tot_cost/totV*100)}">${pc(p.tot_cost/totV*100)}</td>`:''}</tr>
    </tbody></table>`;
}

function horesDiaTaula(p,col){
  const totDia=p.avg_dia_hcoc.map((c,i)=>c+(p.avg_dia_hsal[i]||0));
  const nFw=p.fw_list?p.fw_list.length:15;
  return`<table class="dtbl"><thead><tr>
    <th></th>${DIES.map(d=>`<th>${d}</th>`).join('')}
    <th class="tot-col" style="background:#f0f4ff">Mitja/fw</th>
    <th class="tot-col">Total acum.</th>
  </tr></thead><tbody>
    <tr><td style="color:${col};font-weight:700">Cuina</td>${p.avg_dia_hcoc.map(v=>`<td>${v>0?v+'h':'—'}</td>`).join('')}<td class="tot-col" style="background:#f0f4ff;color:var(--sub)">${Math.round(p.tot_hcoc/nFw)}h</td><td class="tot-col" style="font-weight:700">${fmt(p.tot_hcoc)}h</td></tr>
    <tr><td style="color:${col}99;font-weight:700">Sala</td>${p.avg_dia_hsal.map(v=>`<td>${v>0?v+'h':'—'}</td>`).join('')}<td class="tot-col" style="background:#f0f4ff;color:var(--sub)">${Math.round(p.tot_hsal/nFw)}h</td><td class="tot-col" style="font-weight:700">${fmt(p.tot_hsal)}h</td></tr>
    <tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,0.02)"><td style="font-weight:700">Total</td>${totDia.map(t=>`<td style="font-weight:700">${t>0?t+'h':'—'}</td>`).join('')}<td class="tot-col" style="background:#f0f4ff;font-weight:700;color:var(--sub)">${Math.round(p.tot_h/nFw)}h</td><td class="tot-col" style="font-weight:700">${fmt(p.tot_h)}h</td></tr>

}

let curProdLoc = 'TOTAL';
let curProdSec = 'articles';
let _artUnit = 'eur';
let _famUnit = 'eur';

function showProdSec(sec){
  curProdSec = sec;
  document.querySelectorAll('#prod-seg .sb').forEach(b=>b.classList.remove('active'));
  if(event && event.target) event.target.classList.add('active');
  renderProductes();
}

function selProdLoc(loc){
  curProdLoc = loc;
  buildSeg('prod-loc-seg', loc, selProdLoc);
  renderProductes();
  window.scrollTo(0, 52);
}

function renderProductes(){
  // Construir selector de local si encara no s'ha fet
  const seg = document.getElementById('prod-loc-seg');
  if(seg && !seg.hasChildNodes()){
    buildSeg('prod-loc-seg', curProdLoc, selProdLoc);
  }
  // Renderitzar botó Euros/Unitats al sticky segons subvista
  const unitSeg = document.getElementById('prod-unit-seg');
  if(unitSeg){
    if(curProdSec === 'articles' || curProdSec === 'artxfam'){
      unitSeg.innerHTML = `
        <button class="sb ${_artUnit==='eur'?'active':''}" onclick="setArtUnit('eur')">Euros</button>
        <button class="sb ${_artUnit==='uni'?'active':''}" onclick="setArtUnit('uni')">Unitats</button>`;
      unitSeg.style.display = 'flex';
    } else if(curProdSec === 'families'){
      unitSeg.innerHTML = `
        <button class="sb ${_famUnit==='eur'?'active':''}" onclick="setFamUnit('eur')">Euros</button>
        <button class="sb ${_famUnit==='uni'?'active':''}" onclick="setFamUnit('uni')">Unitats</button>`;
      unitSeg.style.display = 'flex';
    } else {
      unitSeg.style.display = 'none';
    }
  }
  // Renderitzar banner del local seleccionat (sticky)
  const bannerEl = document.getElementById('prod-banner');
  if(bannerEl){
    const locLbl = curProdLoc === 'TOTAL' ? `Grup (${LOCS.length} locals)` : curProdLoc;
    const col = curProdLoc === 'TOTAL' ? '#555' : GCOLS[LOCS.indexOf(curProdLoc)] || '#555';
    let secLbl = 'Articles per secció';
    if(curProdSec === 'artxfam') secLbl = 'Articles agrupats per família';
    else if(curProdSec === 'families') secLbl = 'Famílies';
    bannerEl.innerHTML = `<div class="loc-banner" style="background:${col}12;border-left:4px solid ${col};margin-top:4px;margin-bottom:0">
      <div style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0"></div>
      <div style="flex:1"><div style="font-size:14px;font-weight:700;color:${col}">${locLbl}</div>
      <div style="font-size:10px;color:${col};opacity:.75">${secLbl} · fw1–fw${LD.weeks[LD.weeks.length-1]} · 2026</div></div>
    </div>`;
  }
  const el = document.getElementById('prod-detail');
  if(!el) return;
  if(curProdSec === 'articles') el.innerHTML = renderProdArticles();
  else if(curProdSec === 'artxfam') el.innerHTML = renderProdArticlesXFam();
  else el.innerHTML = renderProdFamilies();
}

// Helper: donat un local (o 'TOTAL'), retorna els agregats 2026 i 2025 en format comú
// Output: { fam: [{name, eur_25, eur_26, uni_25, uni_26, mitja_eur_25, mitja_eur_26, mitja_uni_25, mitja_uni_26}, ...],
//           art: {MENJAR:[...], POSTRES:[...], BEGUDES:[...]} }
function aggregateProducts(loc){
  const NW = LD.weeks.length;  // 16
  const zeros = () => Array(NW).fill(0);

  // ── Famílies ──
  const famMap = {};
  const locals = (loc === 'TOTAL') ? LOCS : [loc];
  // Helper de normalització de claus (el reusem per articles a sota també)
  const _normK = s => String(s).trim().replace(/\s+/g, ' ');
  locals.forEach(l => {
    const d = LD.locals[l];
    if(!d) return;
    d.fam.order.forEach(f => {
      const fk = _normK(f);
      if(!famMap[fk]) famMap[fk] = {name:fk, eur_26:0, uni_26:0, eur_25:null, uni_25:null,
                                   serie_eur_26: zeros(), serie_uni_26: zeros()};
      const eurArr = d.fam.eur[f] || [];
      const uniArr = d.fam.uni[f] || [];
      for(let i=0;i<NW;i++){
        famMap[fk].serie_eur_26[i] += (eurArr[i]||0);
        famMap[fk].serie_uni_26[i] += (uniArr[i]||0);
      }
      famMap[fk].eur_26 += eurArr.reduce((a,b)=>a+b, 0);
      famMap[fk].uni_26 += uniArr.reduce((a,b)=>a+b, 0);
    });
    const h = (typeof LD_HIST !== 'undefined') ? LD_HIST[l] : null;
    if(h){
      h.fam.order.forEach(f => {
        const fk = _normK(f);
        if(!famMap[fk]) famMap[fk] = {name:fk, eur_26:0, uni_26:0, eur_25:0, uni_25:0,
                                     serie_eur_26: zeros(), serie_uni_26: zeros()};
        if(famMap[fk].eur_25 === null) famMap[fk].eur_25 = 0;
        if(famMap[fk].uni_25 === null) famMap[fk].uni_25 = 0;
        famMap[fk].eur_25 += h.fam.acum_eur[f] || 0;
        famMap[fk].uni_25 += h.fam.acum_uni[f] || 0;
      });
    }
  });
  const famList = Object.values(famMap).map(f => ({
    ...f,
    mitja_eur_26: f.eur_26 / NW,
    mitja_uni_26: f.uni_26 / NW,
    mitja_eur_25: f.eur_25 !== null ? f.eur_25 / NW : null,
    mitja_uni_25: f.uni_25 !== null ? f.uni_25 / NW : null,
    d_pct_eur: (f.eur_25 && f.eur_25 > 0) ? ((f.eur_26 - f.eur_25) / f.eur_25 * 100) : null,
    d_pct_uni: (f.uni_25 && f.uni_25 > 0) ? ((f.uni_26 - f.uni_25) / f.uni_25 * 100) : null,
  })).sort((a,b) => b.eur_26 - a.eur_26);

  // ── Articles per secció ──
  // Helper per normalitzar la clau (evita duplicats per espais finals/internes)
  const normKey = s => String(s).trim().replace(/\s+/g, ' ');

  const artResult = {};
  ['MENJAR','POSTRES','BEGUDES'].forEach(sec => {
    const artMap = {};
    locals.forEach(l => {
      const d = LD.locals[l];
      if(!d || !d.art[sec]) return;
      const artFam26 = d.art[sec].art_fam || {};
      d.art[sec].order.forEach(a => {
        const key = normKey(a);
        if(!artMap[key]) artMap[key] = {name:key, family:null, eur_26:0, uni_26:0, eur_25:null, uni_25:null,
                                     serie_eur_26: zeros(), serie_uni_26: zeros()};
        // Família: prioritzem 2026, després 2025
        if(!artMap[key].family && artFam26[a]) artMap[key].family = artFam26[a];
        const eurArr = d.art[sec].eur[a] || [];
        const uniArr = d.art[sec].uni[a] || [];
        for(let i=0;i<NW;i++){
          artMap[key].serie_eur_26[i] += (eurArr[i]||0);
          artMap[key].serie_uni_26[i] += (uniArr[i]||0);
        }
        artMap[key].eur_26 += eurArr.reduce((x,y)=>x+y, 0);
        artMap[key].uni_26 += uniArr.reduce((x,y)=>x+y, 0);
      });
      const h = (typeof LD_HIST !== 'undefined') ? LD_HIST[l] : null;
      if(h && h.art && h.art[sec]){
        const artFam25 = h.art[sec].art_fam || {};
        Object.keys(h.art[sec].acum_eur || {}).forEach(a => {
          const key = normKey(a);
          if(!artMap[key]) artMap[key] = {name:key, family:null, eur_26:0, uni_26:0, eur_25:0, uni_25:0,
                                       serie_eur_26: zeros(), serie_uni_26: zeros()};
          // Si no tenim família del 2026, agafem la del 2025
          if(!artMap[key].family && artFam25[a]) artMap[key].family = artFam25[a];
          if(artMap[key].eur_25 === null) artMap[key].eur_25 = 0;
          if(artMap[key].uni_25 === null) artMap[key].uni_25 = 0;
          artMap[key].eur_25 += h.art[sec].acum_eur[a] || 0;
          artMap[key].uni_25 += h.art[sec].acum_uni[a] || 0;
        });
      }
    });
    artResult[sec] = Object.values(artMap).map(a => ({
      ...a,
      mitja_eur_26: a.eur_26 / NW,
      mitja_uni_26: a.uni_26 / NW,
      mitja_eur_25: a.eur_25 !== null ? a.eur_25 / NW : null,
      mitja_uni_25: a.uni_25 !== null ? a.uni_25 / NW : null,
      d_pct_eur: (a.eur_25 && a.eur_25 > 0) ? ((a.eur_26 - a.eur_25) / a.eur_25 * 100) : null,
      d_pct_uni: (a.uni_25 && a.uni_25 > 0) ? ((a.uni_26 - a.uni_25) / a.uni_25 * 100) : null,
    })).sort((x,y) => y.eur_26 - x.eur_26);
  });

  return {fam: famList, art: artResult};
}

function renderProductes_table(rows, unit, categoryTotal26, categoryTotal25){
  // categoryTotal26/25 = total real de la categoria (per calcular cobertura)
  // Si no es passen, no es mostra fila TOTAL
  const hasHist = rows.some(r => (unit==='eur' ? r.eur_25 : r.uni_25) !== null);

  const fws = LD.weeks.map(w => 'fw' + w);
  const NW = fws.length;

  const getMitja25 = r => unit==='eur' ? r.mitja_eur_25 : r.mitja_uni_25;
  const getMitja26 = r => unit==='eur' ? r.mitja_eur_26 : r.mitja_uni_26;
  const getAcum25  = r => unit==='eur' ? r.eur_25 : r.uni_25;
  const getAcum26  = r => unit==='eur' ? r.eur_26 : r.uni_26;
  const getDpct    = r => unit==='eur' ? r.d_pct_eur : r.d_pct_uni;
  const getSerie   = r => unit==='eur' ? (r.serie_eur_26 || []) : (r.serie_uni_26 || []);

  const fv = v => unit==='eur' ? fmt(Math.round(v))+'€' : fmt(Math.round(v));

  function cellColor(v, mitja){
    if(!mitja || mitja === 0) return '';
    const p = (v - mitja) / mitja;
    if(p > 0.20)  return 'background:#2E7D32;color:#fff';
    if(p > 0.10)  return 'background:#81C784;color:#1B5E20';
    if(p >= -0.10) return 'background:#FFF9C4;color:#5D4037';
    if(p >= -0.20) return 'background:#FFB74D;color:#4E2600';
    return 'background:#C62828;color:#fff';
  }
  function wkCol(w){ return w<=4 ? '#1A5276' : w<=9 ? '#1A7A5E' : '#5B3A8C'; }

  // Sticky stacking (com Excel/Sheets):
  // - Cantonada superior esquerra: sempre dalt de tot (z:60)
  // - Columna esquerra <td> sticky-left: z:50 (tapa els <th> en scroll horitzontal;
  //   no problema en scroll vertical perquè les <td> de la columna mai entren a la
  //   zona dels <th> top:0 — sempre estan a la fila on són)
  // - Capçaleres <th> sticky-top: z:20 (per sobre de dades, sota de columna)
  // Tots amb fons SÒLID OPAC perquè no es transparenti el contingut darrere
  const stickyHdrCorner = 'position:sticky;top:0;left:0;z-index:60;background:#e8e8ed;box-shadow:2px 2px 4px rgba(0,0,0,.08)';
  const stickyHdrRow    = 'position:sticky;top:0;z-index:20;background:#e8e8ed;box-shadow:0 2px 4px rgba(0,0,0,.08)';
  const stickyNameCol   = 'position:sticky;left:0;z-index:50;box-shadow:2px 0 4px rgba(0,0,0,.08)';

  let tbl = `<table style="border-collapse:separate;border-spacing:0;font-size:9px;width:100%;min-width:600px">
    <thead>
      <tr style="color:var(--sub);font-weight:600;font-size:9px">
        <th style="padding:6px 6px;text-align:left;${stickyHdrCorner};min-width:140px;max-width:140px;border-bottom:1px solid var(--br)">Article / Família</th>
        ${hasHist ? `<th style="padding:6px 4px;text-align:right;${stickyHdrRow};border-left:1px solid var(--br);border-bottom:1px solid var(--br);white-space:nowrap;font-size:8px">M./fw '25</th>` : ''}
        <th style="padding:6px 4px;text-align:right;${stickyHdrRow};border-left:1px solid var(--br);border-bottom:1px solid var(--br);white-space:nowrap;font-size:8px">M./fw '26</th>
        ${hasHist ? `<th style="padding:6px 4px;text-align:right;${stickyHdrRow};border-left:1px solid var(--br);border-bottom:1px solid var(--br);white-space:nowrap;font-size:8px">Ac. '25</th>` : ''}
        <th style="padding:6px 4px;text-align:right;${stickyHdrRow};border-left:1px solid var(--br);border-bottom:1px solid var(--br);white-space:nowrap;font-size:8px">Ac. '26</th>
        ${hasHist ? `<th style="padding:6px 4px;text-align:right;${stickyHdrRow};border-left:1px solid var(--br);border-bottom:1px solid var(--br);white-space:nowrap;font-size:8px">Δ%</th>` : ''}
        ${fws.map((fw,i)=>`<th style="padding:3px 4px;text-align:right;background:${wkCol(LD.weeks[i])};color:#fff;font-size:8px;min-width:32px;border-left:1px solid #fff;position:sticky;top:0;z-index:10">${fw}</th>`).join('')}
      </tr>
    </thead>
    <tbody>`;

  // Acumular totals de les files mostrades per la fila TOTAL
  let sumEur25 = 0, sumEur26 = 0, sumUni25 = 0, sumUni26 = 0;
  let any25 = false;
  const sumSerie = Array(NW).fill(0);

  rows.forEach((r, ri) => {
    const bg = ri%2===0 ? '#fff' : '#f8f8f8';
    const m25 = getMitja25(r);
    const m26 = getMitja26(r);
    const a25 = getAcum25(r);
    const a26 = getAcum26(r);
    const dpct = getDpct(r);
    const serie = getSerie(r);

    sumEur26 += (r.eur_26 || 0);
    sumUni26 += (r.uni_26 || 0);
    if(r.eur_25 !== null && r.eur_25 !== undefined){ sumEur25 += r.eur_25; any25 = true; }
    if(r.uni_25 !== null && r.uni_25 !== undefined){ sumUni25 += r.uni_25; }
    serie.forEach((v,i) => sumSerie[i] += v);

    let deltaTxt = '—';
    if(hasHist && dpct !== null){
      const col = dpct >= 0 ? 'var(--ok)' : 'var(--bad)';
      deltaTxt = `<span style="color:${col};font-weight:700">${dpct>=0?'+':''}${dpct.toFixed(1)}%</span>`;
    }

    const m25Txt = (a25 === null) ? '—' : fv(m25);
    const a25Txt = (a25 === null) ? '—' : fv(a25);

    tbl += `<tr style="border-top:1px solid var(--br)">
      <td style="padding:4px 6px;font-weight:600;font-size:9px;${stickyNameCol};background:${bg};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px" title="${r.name}">${r.name}</td>
      ${hasHist ? `<td style="padding:4px 4px;text-align:right;font-size:9px;color:var(--sub);background:${bg};border-left:.5px solid var(--br)">${m25Txt}</td>` : ''}
      <td style="padding:4px 4px;text-align:right;font-size:9px;font-weight:700;background:${bg};border-left:.5px solid var(--br)">${fv(m26)}</td>
      ${hasHist ? `<td style="padding:4px 4px;text-align:right;font-size:9px;color:var(--sub);background:${bg};border-left:.5px solid var(--br)">${a25Txt}</td>` : ''}
      <td style="padding:4px 4px;text-align:right;font-size:9px;font-weight:700;background:${bg};border-left:.5px solid var(--br)">${fv(a26)}</td>
      ${hasHist ? `<td style="padding:4px 4px;text-align:right;font-size:9px;background:${bg};border-left:.5px solid var(--br)">${deltaTxt}</td>` : ''}
      ${serie.map(v => {
        const style = cellColor(v, m26);
        return `<td style="padding:3px 4px;text-align:right;font-size:8.5px;${style};border-left:.5px solid var(--br)">${fv(v)}</td>`;
      }).join('')}
    </tr>`;
  });

  // Fila TOTAL: sumatori files visibles + cobertura % vs total real categoria
  if(rows.length > 0){
    const totBg = '#1F3864';
    const totFg = '#fff';
    const sumMitja26 = sumEur26 / NW;
    const sumMitja25 = sumEur25 / NW;
    const sumAcum26 = unit==='eur' ? sumEur26 : sumUni26;
    const sumAcum25 = unit==='eur' ? sumEur25 : sumUni25;
    const totDpct = (any25 && sumAcum25 > 0) ? ((sumAcum26 - sumAcum25) / sumAcum25 * 100) : null;

    // Cobertura: % del total real de la categoria que cobreixen aquestes files
    const sufix = unit === 'eur' ? '€' : ' ut';
    let cov26Txt = '';
    if(categoryTotal26 && categoryTotal26 > 0){
      const cov = (sumAcum26 / categoryTotal26 * 100).toFixed(0);
      cov26Txt = ` <span style="font-weight:400;opacity:.85;font-size:8px">(${cov}% del total ${fmt(Math.round(categoryTotal26))}${sufix})</span>`;
    }

    let totDeltaTxt = '—';
    if(any25 && totDpct !== null){
      const col = totDpct >= 0 ? '#A5E0AC' : '#FFB3B3';
      totDeltaTxt = `<span style="color:${col};font-weight:700">${totDpct>=0?'+':''}${totDpct.toFixed(1)}%</span>`;
    }

    tbl += `<tr style="background:${totBg};color:${totFg};font-weight:700;border-top:2px solid #000">
      <td style="padding:5px 6px;font-size:10px;${stickyNameCol};background:${totBg};color:${totFg};white-space:nowrap" title="Suma files visibles">📊 TOTAL${cov26Txt}</td>
      ${hasHist ? `<td style="padding:5px 4px;text-align:right;font-size:9px;background:${totBg};color:${totFg};border-left:.5px solid #fff">${any25 ? fv(sumMitja25) : '—'}</td>` : ''}
      <td style="padding:5px 4px;text-align:right;font-size:9px;background:${totBg};color:${totFg};border-left:.5px solid #fff">${fv(sumMitja26)}</td>
      ${hasHist ? `<td style="padding:5px 4px;text-align:right;font-size:9px;background:${totBg};color:${totFg};border-left:.5px solid #fff">${any25 ? fv(sumAcum25) : '—'}</td>` : ''}
      <td style="padding:5px 4px;text-align:right;font-size:9px;background:${totBg};color:${totFg};border-left:.5px solid #fff">${fv(sumAcum26)}</td>
      ${hasHist ? `<td style="padding:5px 4px;text-align:right;font-size:9px;background:${totBg};color:${totFg};border-left:.5px solid #fff">${totDeltaTxt}</td>` : ''}
      ${sumSerie.map(v => `<td style="padding:4px 4px;text-align:right;font-size:8.5px;background:${totBg};color:${totFg};border-left:.5px solid #fff">${fv(v)}</td>`).join('')}
    </tr>`;
  }

  tbl += `</tbody></table>`;
  return tbl;
}

function renderProdArticles(){
  const agg = aggregateProducts(curProdLoc);
  let html = '';

  const secs = [
    {key:'MENJAR', label:'🍽 Menjar', color:'#1A3A5C', topN:40},
    {key:'POSTRES', label:'🍮 Postres', color:'#6E2F1A', topN:8},
    {key:'BEGUDES', label:'🍺 Begudes', color:'#1A5C3A', topN:20},
  ];

  // Helper: total real d'una secció (suma de TOTS els articles del local, no només top N)
  // Es treu de LD.locals[loc].sec_totals_eur (i LD_HIST per 2025)
  function realSecTotal(year, sec, unit){
    const locals = (curProdLoc === 'TOTAL') ? LOCS : [curProdLoc];
    let tot = 0;
    locals.forEach(l => {
      const src = year === 26 ? (LD.locals[l] || {}) : ((typeof LD_HIST !== 'undefined') ? (LD_HIST[l] || {}) : {});
      const totalsKey = unit === 'eur' ? 'sec_totals_eur' : 'sec_totals_uni';
      if(src[totalsKey] && src[totalsKey][sec] != null){
        tot += src[totalsKey][sec];
      }
    });
    return tot;
  }

  secs.forEach(s => {
    const allRows = agg.art[s.key] || [];
    const rows = allRows.slice(0, s.topN);
    if(rows.length === 0) return;
    // Total REAL de la secció (de tots els articles, no només els 40 top de LD)
    const cat26 = realSecTotal(26, s.key, _artUnit);
    const cat25 = realSecTotal(25, s.key, _artUnit);
    html += `<div class="card-scroll">
      <div class="ch" style="background:${s.color}12;border-left:4px solid ${s.color}">
        <span class="ct" style="color:${s.color}">${s.label}</span>
        <span style="font-size:10px;color:var(--sub)">top ${rows.length} de ${allRows.length}</span>
      </div>
      <div class="cb" style="padding:0;overflow:auto;height:65vh">${renderProductes_table(rows, _artUnit, cat26, cat25)}</div>
    </div>`;
  });

  return html;
}

function renderProdFamilies(){
  const agg = aggregateProducts(curProdLoc);
  let html = '';

  // Per famílies, agg.fam ja inclou TOTES (no està limitat a top N), per tant
  // el total visible és el total real (cobertura 100% per definició)
  const fam26 = agg.fam.reduce((s, r) => s + (_famUnit==='eur' ? (r.eur_26 || 0) : (r.uni_26 || 0)), 0);
  const fam25 = agg.fam.reduce((s, r) => s + (_famUnit==='eur' ? (r.eur_25 || 0) : (r.uni_25 || 0)), 0);

  html += `<div class="card-scroll">
    <div class="ch"><span class="ct">📦 Totes les famílies</span><span style="font-size:10px;color:var(--sub)">${agg.fam.length} famílies</span></div>
    <div class="cb" style="padding:0;overflow:auto;height:65vh">${renderProductes_table(agg.fam, _famUnit, fam26, fam25)}</div>
  </div>`;

  return html;
}

function setArtUnit(u){
  _artUnit=u;
  renderProductes();  // Refresc complet (inclou actualitzar el botó sticky)
}
function setFamUnit(u){
  _famUnit=u;
  renderProductes();
}

// ═══════════════════════════════════════════════════════════════
// RenderProdArticlesXFam: vista híbrida — articles agrupats per família
// dins de cada secció (Menjar/Postres/Begudes), amb subtotal per família
// ═══════════════════════════════════════════════════════════════
function renderProdArticlesXFam(){
  const agg = aggregateProducts(curProdLoc);
  let html = '';

  const secs = [
    {key:'MENJAR', label:'🍽 Menjar', color:'#1A3A5C', topN:40},
    {key:'POSTRES', label:'🍮 Postres', color:'#6E2F1A', topN:8},
    {key:'BEGUDES', label:'🍺 Begudes', color:'#1A5C3A', topN:20},
  ];

  // Helper realSecTotal (com a renderProdArticles)
  function realSecTotal(year, sec, unit){
    const locals = (curProdLoc === 'TOTAL') ? LOCS : [curProdLoc];
    let tot = 0;
    locals.forEach(l => {
      const src = year === 26 ? (LD.locals[l] || {}) : ((typeof LD_HIST !== 'undefined') ? (LD_HIST[l] || {}) : {});
      const totalsKey = unit === 'eur' ? 'sec_totals_eur' : 'sec_totals_uni';
      if(src[totalsKey] && src[totalsKey][sec] != null){
        tot += src[totalsKey][sec];
      }
    });
    return tot;
  }

  secs.forEach(s => {
    const allRows = agg.art[s.key] || [];
    const rows = allRows.slice(0, s.topN);
    if(rows.length === 0) return;

    // Agrupar files per família, mantenint l'ordre per import 2026 desc
    const byFam = {};
    rows.forEach(r => {
      const fam = r.family || 'ALTRES';
      if(!byFam[fam]) byFam[fam] = [];
      byFam[fam].push(r);
    });
    // Ordre famílies: per suma 2026 desc
    const famOrder = Object.keys(byFam).sort((a,b) => {
      const sa = byFam[a].reduce((s,r) => s + (r.eur_26||0), 0);
      const sb = byFam[b].reduce((s,r) => s + (r.eur_26||0), 0);
      return sb - sa;
    });

    const cat26 = realSecTotal(26, s.key, _artUnit);
    const cat25 = realSecTotal(25, s.key, _artUnit);

    html += `<div class="card-scroll">
      <div class="ch" style="background:${s.color}12;border-left:4px solid ${s.color}">
        <span class="ct" style="color:${s.color}">${s.label}</span>
        <span style="font-size:10px;color:var(--sub)">top ${rows.length} de ${allRows.length} · ${famOrder.length} famílies</span>
      </div>
      <div class="cb" style="padding:0;overflow:auto;height:65vh">${renderProductes_table_grouped(byFam, famOrder, _artUnit, cat26, cat25)}</div>
    </div>`;
  });

  return html;
}

// ═══════════════════════════════════════════════════════════════
// renderProductes_table_grouped: variant agrupada per família amb subtotals
// byFam: { 'TAPES': [row1, row2,...], 'PLATETS': [...], ... }
// famOrder: ordre famílies (per import desc)
// ═══════════════════════════════════════════════════════════════
function renderProductes_table_grouped(byFam, famOrder, unit, categoryTotal26, categoryTotal25){
  const allRows = famOrder.flatMap(f => byFam[f]);
  const hasHist = allRows.some(r => (unit==='eur' ? r.eur_25 : r.uni_25) !== null);

  const fws = LD.weeks.map(w => 'fw' + w);
  const NW = fws.length;

  const fv = v => unit==='eur' ? fmt(Math.round(v))+'€' : fmt(Math.round(v));

  function cellColor(v, mitja){
    if(!mitja || mitja === 0) return '';
    const p = (v - mitja) / mitja;
    if(p > 0.20)  return 'background:#2E7D32;color:#fff';
    if(p > 0.10)  return 'background:#81C784;color:#1B5E20';
    if(p >= -0.10) return 'background:#FFF9C4;color:#5D4037';
    if(p >= -0.20) return 'background:#FFB74D;color:#4E2600';
    return 'background:#C62828;color:#fff';
  }
  function wkCol(w){ return w<=4 ? '#1A5276' : w<=9 ? '#1A7A5E' : '#5B3A8C'; }

  const stickyHdrCorner = 'position:sticky;top:0;left:0;z-index:60;background:#e8e8ed;box-shadow:2px 2px 4px rgba(0,0,0,.08)';
  const stickyHdrRow    = 'position:sticky;top:0;z-index:20;background:#e8e8ed;box-shadow:0 2px 4px rgba(0,0,0,.08)';
  const stickyNameCol   = 'position:sticky;left:0;z-index:50;box-shadow:2px 0 4px rgba(0,0,0,.08)';

  const colspan = 1 + (hasHist ? 1 : 0) + 1 + (hasHist ? 1 : 0) + 1 + (hasHist ? 1 : 0) + NW;

  let tbl = `<table style="border-collapse:separate;border-spacing:0;font-size:9px;width:100%;min-width:600px">
    <thead>
      <tr style="color:var(--sub);font-weight:600;font-size:9px">
        <th style="padding:6px 6px;text-align:left;${stickyHdrCorner};min-width:140px;max-width:140px;border-bottom:1px solid var(--br)">Article / Família</th>
        ${hasHist ? `<th style="padding:6px 4px;text-align:right;${stickyHdrRow};border-left:1px solid var(--br);border-bottom:1px solid var(--br);white-space:nowrap;font-size:8px">M./fw '25</th>` : ''}
        <th style="padding:6px 4px;text-align:right;${stickyHdrRow};border-left:1px solid var(--br);border-bottom:1px solid var(--br);white-space:nowrap;font-size:8px">M./fw '26</th>
        ${hasHist ? `<th style="padding:6px 4px;text-align:right;${stickyHdrRow};border-left:1px solid var(--br);border-bottom:1px solid var(--br);white-space:nowrap;font-size:8px">Ac. '25</th>` : ''}
        <th style="padding:6px 4px;text-align:right;${stickyHdrRow};border-left:1px solid var(--br);border-bottom:1px solid var(--br);white-space:nowrap;font-size:8px">Ac. '26</th>
        ${hasHist ? `<th style="padding:6px 4px;text-align:right;${stickyHdrRow};border-left:1px solid var(--br);border-bottom:1px solid var(--br);white-space:nowrap;font-size:8px">Δ%</th>` : ''}
        ${fws.map((fw,i)=>`<th style="padding:3px 4px;text-align:right;background:${wkCol(LD.weeks[i])};color:#fff;font-size:8px;min-width:32px;border-left:1px solid #fff;position:sticky;top:0;z-index:10">${fw}</th>`).join('')}
      </tr>
    </thead>
    <tbody>`;

  // Acumular per la fila TOTAL global
  let gSumEur25 = 0, gSumEur26 = 0, gSumUni25 = 0, gSumUni26 = 0;
  let gAny25 = false;
  const gSumSerie = Array(NW).fill(0);

  // Colors de família (suaus)
  const famColors = ['#E3F2FD', '#FFF3E0', '#E8F5E9', '#F3E5F5', '#FFEBEE', '#E0F7FA', '#FFF8E1', '#F1F8E9', '#FCE4EC'];
  let famIdx = 0;

  famOrder.forEach((fam, fi) => {
    const famRows = byFam[fam];
    const famBg = famColors[famIdx % famColors.length];
    famIdx++;

    // Subtotal de la família
    let fSumEur25=0, fSumEur26=0, fSumUni25=0, fSumUni26=0;
    let fAny25 = false;
    const fSumSerie = Array(NW).fill(0);

    // Capçalera de família (banda de color)
    famRows.forEach(r => {
      fSumEur26 += (r.eur_26||0);
      fSumUni26 += (r.uni_26||0);
      if(r.eur_25 !== null && r.eur_25 !== undefined){ fSumEur25 += r.eur_25; fAny25 = true; }
      if(r.uni_25 !== null && r.uni_25 !== undefined) fSumUni25 += r.uni_25;
      const serie = unit==='eur' ? (r.serie_eur_26||[]) : (r.serie_uni_26||[]);
      serie.forEach((v,i) => fSumSerie[i] += v);
    });
    const fSumAcum26 = unit==='eur' ? fSumEur26 : fSumUni26;
    const fSumAcum25 = unit==='eur' ? fSumEur25 : fSumUni25;
    
    // Banda família amb pes %
    const famPct26 = categoryTotal26 > 0 ? (fSumEur26/categoryTotal26*100).toFixed(0) : 0;
    // NOTA: NO apliquem sticky a aquesta cel·la perquè ocupa tot el colspan
    // (sticky horitzontal no té sentit quan la cel·la ja cobreix tota l'amplada)
    tbl += `<tr style="background:#37474F;color:#fff;font-weight:700">
      <td colspan="${colspan}" style="padding:6px 8px;font-size:10px;background:#37474F;color:#fff">
        📦 ${fam} <span style="opacity:.85;font-weight:400;font-size:9px">— ${famRows.length} art · ${fmt(Math.round(fSumEur26))}€ (${famPct26}%)</span>
      </td>
    </tr>`;

    // Files dels articles
    famRows.forEach((r, ri) => {
      const bg = ri%2===0 ? famBg : '#fff';
      const m25 = unit==='eur' ? r.mitja_eur_25 : r.mitja_uni_25;
      const m26 = unit==='eur' ? r.mitja_eur_26 : r.mitja_uni_26;
      const a25 = unit==='eur' ? r.eur_25 : r.uni_25;
      const a26 = unit==='eur' ? r.eur_26 : r.uni_26;
      const dpct = unit==='eur' ? r.d_pct_eur : r.d_pct_uni;
      const serie = unit==='eur' ? (r.serie_eur_26||[]) : (r.serie_uni_26||[]);

      gSumEur26 += (r.eur_26||0);
      gSumUni26 += (r.uni_26||0);
      if(r.eur_25 !== null && r.eur_25 !== undefined){ gSumEur25 += r.eur_25; gAny25 = true; }
      if(r.uni_25 !== null && r.uni_25 !== undefined) gSumUni25 += r.uni_25;
      serie.forEach((v,i) => gSumSerie[i] += v);

      let deltaTxt = '—';
      if(hasHist && dpct !== null){
        const col = dpct >= 0 ? 'var(--ok)' : 'var(--bad)';
        deltaTxt = `<span style="color:${col};font-weight:700">${dpct>=0?'+':''}${dpct.toFixed(1)}%</span>`;
      }

      const m25Txt = (a25 === null) ? '—' : fv(m25);
      const a25Txt = (a25 === null) ? '—' : fv(a25);

      tbl += `<tr style="border-top:1px solid var(--br)">
        <td style="padding:4px 6px 4px 18px;font-weight:600;font-size:9px;${stickyNameCol};background:${bg};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px" title="${r.name}">${r.name}</td>
        ${hasHist ? `<td style="padding:4px 4px;text-align:right;font-size:9px;color:var(--sub);background:${bg};border-left:.5px solid var(--br)">${m25Txt}</td>` : ''}
        <td style="padding:4px 4px;text-align:right;font-size:9px;font-weight:700;background:${bg};border-left:.5px solid var(--br)">${fv(m26)}</td>
        ${hasHist ? `<td style="padding:4px 4px;text-align:right;font-size:9px;color:var(--sub);background:${bg};border-left:.5px solid var(--br)">${a25Txt}</td>` : ''}
        <td style="padding:4px 4px;text-align:right;font-size:9px;font-weight:700;background:${bg};border-left:.5px solid var(--br)">${fv(a26)}</td>
        ${hasHist ? `<td style="padding:4px 4px;text-align:right;font-size:9px;background:${bg};border-left:.5px solid var(--br)">${deltaTxt}</td>` : ''}
        ${serie.map(v => {
          const style = cellColor(v, m26);
          return `<td style="padding:3px 4px;text-align:right;font-size:8.5px;${style};border-left:.5px solid var(--br)">${fv(v)}</td>`;
        }).join('')}
      </tr>`;
    });

    // Subtotal família
    const fSumMitja26 = fSumEur26 / NW;
    const fSumMitja25 = fSumEur25 / NW;
    const fDpct = (fAny25 && fSumEur25 > 0) ? ((fSumEur26 - fSumEur25) / fSumEur25 * 100) : null;
    let fDeltaTxt = '—';
    if(fAny25 && fDpct !== null){
      const col = fDpct >= 0 ? '#1B5E20' : '#B71C1C';
      fDeltaTxt = `<span style="color:${col};font-weight:700">${fDpct>=0?'+':''}${fDpct.toFixed(1)}%</span>`;
    }

    tbl += `<tr style="background:#CFD8DC;font-weight:700;border-top:1px solid #607D8B">
      <td style="padding:4px 6px 4px 18px;font-size:9px;${stickyNameCol};background:#CFD8DC;color:#37474F">↳ Subtotal ${fam}</td>
      ${hasHist ? `<td style="padding:4px 4px;text-align:right;font-size:9px;background:#CFD8DC;color:#37474F;border-left:.5px solid #fff">${fAny25 ? fv(fSumMitja25) : '—'}</td>` : ''}
      <td style="padding:4px 4px;text-align:right;font-size:9px;background:#CFD8DC;color:#37474F;border-left:.5px solid #fff">${fv(fSumMitja26)}</td>
      ${hasHist ? `<td style="padding:4px 4px;text-align:right;font-size:9px;background:#CFD8DC;color:#37474F;border-left:.5px solid #fff">${fAny25 ? fv(fSumAcum25) : '—'}</td>` : ''}
      <td style="padding:4px 4px;text-align:right;font-size:9px;background:#CFD8DC;color:#37474F;border-left:.5px solid #fff">${fv(fSumAcum26)}</td>
      ${hasHist ? `<td style="padding:4px 4px;text-align:right;font-size:9px;background:#CFD8DC;color:#37474F;border-left:.5px solid #fff">${fDeltaTxt}</td>` : ''}
      ${fSumSerie.map(v => `<td style="padding:3px 4px;text-align:right;font-size:8.5px;background:#CFD8DC;color:#37474F;border-left:.5px solid #fff">${fv(v)}</td>`).join('')}
    </tr>`;
  });

  // Fila TOTAL global (cobertura)
  if(allRows.length > 0){
    const totBg = '#1F3864';
    const totFg = '#fff';
    const gSumMitja26 = gSumEur26 / NW;
    const gSumMitja25 = gSumEur25 / NW;
    const gSumAcum26 = unit==='eur' ? gSumEur26 : gSumUni26;
    const gSumAcum25 = unit==='eur' ? gSumEur25 : gSumUni25;
    const gDpct = (gAny25 && gSumEur25 > 0) ? ((gSumEur26 - gSumEur25) / gSumEur25 * 100) : null;
    const sufix = unit === 'eur' ? '€' : ' ut';
    let cov26Txt = '';
    if(categoryTotal26 && categoryTotal26 > 0){
      const cov = (gSumAcum26 / categoryTotal26 * 100).toFixed(0);
      cov26Txt = ` <span style="font-weight:400;opacity:.85;font-size:8px">(${cov}% del total ${fmt(Math.round(categoryTotal26))}${sufix})</span>`;
    }
    let totDeltaTxt = '—';
    if(gAny25 && gDpct !== null){
      const col = gDpct >= 0 ? '#A5E0AC' : '#FFB3B3';
      totDeltaTxt = `<span style="color:${col};font-weight:700">${gDpct>=0?'+':''}${gDpct.toFixed(1)}%</span>`;
    }
    tbl += `<tr style="background:${totBg};color:${totFg};font-weight:700;border-top:2px solid #000">
      <td style="padding:5px 6px;font-size:10px;${stickyNameCol};background:${totBg};color:${totFg};white-space:nowrap" title="Suma articles visibles">📊 TOTAL${cov26Txt}</td>
      ${hasHist ? `<td style="padding:5px 4px;text-align:right;font-size:9px;background:${totBg};color:${totFg};border-left:.5px solid #fff">${gAny25 ? fv(gSumMitja25) : '—'}</td>` : ''}
      <td style="padding:5px 4px;text-align:right;font-size:9px;background:${totBg};color:${totFg};border-left:.5px solid #fff">${fv(gSumMitja26)}</td>
      ${hasHist ? `<td style="padding:5px 4px;text-align:right;font-size:9px;background:${totBg};color:${totFg};border-left:.5px solid #fff">${gAny25 ? fv(gSumAcum25) : '—'}</td>` : ''}
      <td style="padding:5px 4px;text-align:right;font-size:9px;background:${totBg};color:${totFg};border-left:.5px solid #fff">${fv(gSumAcum26)}</td>
      ${hasHist ? `<td style="padding:5px 4px;text-align:right;font-size:9px;background:${totBg};color:${totFg};border-left:.5px solid #fff">${totDeltaTxt}</td>` : ''}
      ${gSumSerie.map(v => `<td style="padding:4px 4px;text-align:right;font-size:8.5px;background:${totBg};color:${totFg};border-left:.5px solid #fff">${fv(v)}</td>`).join('')}
    </tr>`;
  }

  tbl += `</tbody></table>`;
  return tbl;
}

initAuth();
</script>
