*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);padding-bottom:60px;font-size:14px}
.topbar{position:sticky;top:0;z-index:99;background:rgba(242,242,247,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:8px 14px 6px;border-bottom:.5px solid var(--sep);display:flex;align-items:center;justify-content:space-between}
.topbar-left h1{font-size:15px;font-weight:700;letter-spacing:-.3px}
.topbar-left p{font-size:11px;color:var(--sub)}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:99;background:rgba(248,248,248,.97);backdrop-filter:blur(16px);border-top:.5px solid var(--sep);display:flex;height:56px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9px;color:var(--sub);cursor:pointer;border:none;background:none;transition:color .15s}
.tab.active{color:var(--accent)}.tab svg{width:20px;height:20px}
.page{display:none;padding:8px 10px 4px;animation:fi .18s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
/* card-scroll: contenidor pare per cards amb taules scrollables sticky.
   IMPORTANT: NO té overflow:hidden perquè trencaria el sticky del fill .cb.
   isolation:isolate crea un context d'apilament local — així els <td> sticky
   horitzontals de dins (z-index 2-3) no superen el .loc-sticky (z-index 50)
   global. */
.card-scroll{background:var(--card);border-radius:var(--r);margin-bottom:8px;border:1px solid var(--sep);position:relative;z-index:0;isolation:isolate}
.ch{padding:8px 12px 7px;border-bottom:.5px solid var(--sep);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.4px}
.cb{padding:10px 12px}
.krow{display:grid;gap:6px;margin-bottom:8px}
.k2{grid-template-columns:1fr 1fr}.k3{grid-template-columns:1fr 1fr 1fr}
.kpi{background:var(--card);border-radius:var(--r);padding:8px 10px}
.kl{font-size:10px;color:var(--sub);margin-bottom:2px}
.kv{font-size:20px;font-weight:700;letter-spacing:-.7px;line-height:1.1}
.kv.ok{color:var(--ok)}.kv.warn{color:var(--warn)}.kv.bad{color:var(--bad)}
.ks{font-size:10px;color:var(--sub);margin-top:1px}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600}
.pill.ok{background:rgba(52,199,89,.14);color:#1a7a37}
.pill.warn{background:rgba(255,159,10,.14);color:#b36b00}
.pill.bad{background:rgba(255,59,48,.14);color:#c0392b}
.loc-sticky{position:sticky;top:52px;z-index:50;padding:6px 10px;background:rgba(242,242,247,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:.5px solid var(--sep);margin:0 -10px 10px}
.seg{display:flex;background:rgba(118,118,128,.12);border-radius:8px;padding:2px}
.sb{flex:1;padding:5px 2px;border:none;background:none;font-size:10px;font-weight:500;color:var(--sub);border-radius:6px;cursor:pointer;transition:all .15s;text-align:center}
.sb:hover:not(.active){background:rgba(255,255,255,.5);color:var(--text)}
.sb.active{background:#1F3864;color:#fff;font-weight:700;box-shadow:0 2px 6px rgba(31,56,100,.35);transform:scale(1.02)}
.loc-banner{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;margin-bottom:8px}
.cw{position:relative;height:190px}
.cws{position:relative;height:160px}
.cwm{position:relative;height:175px}
.dtbl{width:100%;border-collapse:separate;border-spacing:0;font-size:10px}
.dtbl th{color:var(--sub);font-weight:600;padding:3px 2px 4px;text-align:center;border-bottom:.5px solid var(--sep);white-space:nowrap;font-size:9px;background:#fff}
.dtbl th:first-child{text-align:left;padding-left:6px;min-width:42px;position:sticky;left:0;z-index:3;background:#fff;box-shadow:1px 0 0 var(--sep)}
.dtbl td{padding:3px 2px;text-align:center;border-bottom:.5px solid var(--sep);font-size:9px;background:#fff}
.dtbl td:first-child{text-align:left;padding-left:6px;font-weight:600;font-size:9px;white-space:nowrap;position:sticky;left:0;z-index:2;box-shadow:1px 0 0 var(--sep)}
.dtbl tr:last-child td{border-bottom:none}
.dtbl .tot-col{font-weight:700;border-left:.5px solid var(--sep)}
/* Files amb background especial: pintar abans la cel·la sticky perquè heretí el color */
.dtbl tr td:first-child{background:var(--row-bg, #fff)}
/* Marcar fila i propagar el background a la cel·la sticky via CSS variable */
.dtbl tr.row-total td{--row-bg:#f5f5f7}
.dtbl tr.row-section td{--row-bg:rgba(0,0,0,.05)}
.dtbl tr.row-bold td{--row-bg:rgba(0,0,0,.03)}
.dtbl tr.row-final td{--row-bg:#dde7f7}
.dtbl tr.row-projeccio td{--row-bg:rgba(0,122,255,.04)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:5px 8px;border-bottom:.5px solid var(--sep);text-align:right}
.tbl th:first-child{text-align:left}
.tbl td{padding:6px 8px;border-bottom:.5px solid var(--sep);text-align:right}
.tbl td:first-child{text-align:left;font-weight:500}
.tbl tr:last-child td{border-bottom:none}
.hm{display:grid;gap:2px}
.hml{color:var(--sub);display:flex;align-items:center;font-size:9px;font-weight:600}
.hmc{border-radius:4px;height:26px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.rg{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;text-align:center}

.day-row{display:flex;flex-direction:column;padding:5px 0;border-bottom:.5px solid var(--sep)}

.abs-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid var(--sep)}
.abs-row:last-child{border-bottom:none}

<script>
const USERS = [
  {nom:'Josep Maria', pin:'1234', rol:'admin',   local:null,            tabs:['resum','locals','personal','productes','compar'], seccions:[]},
  {nom:'Soci',        pin:'5678', rol:'soci',    local:null,            tabs:['resum','locals','productes','compar'],            seccions:[]},
  {nom:'Mgr.Sarrià',  pin:'9111', rol:'manager', local:'SM Sarrià',    tabs:['locals','personal','productes','compar'],          seccions:[]},
  {nom:'Mgr.PSbd',    pin:'9333', rol:'manager', local:'Picu Sabadell',tabs:['locals','personal','productes','compar'],          seccions:[]},
];

let SESSION = null;

function initAuth(){
  const saved = localStorage.getItem('mg_session');
  if(saved){
    try{
      const s = JSON.parse(saved);
      const u = USERS.find(u=>u.pin===s.pin && u.nom===s.nom);
      if(u){ SESSION=u; applySession(); return; }
    }catch(e){}
  }
  document.getElementById('login-overlay').style.display='flex';
}

function doLogin(){
  const pin = document.getElementById('login-pin').value.trim();
  const u = USERS.find(u=>u.pin===pin);
  if(!u){ document.getElementById('login-error').textContent='PIN incorrecte'; return; }
  localStorage.setItem('mg_session', JSON.stringify({pin:u.pin,nom:u.nom}));
  SESSION = u;
  document.getElementById('login-overlay').style.display='none';
  applySession();
}

function doLogout(){
  localStorage.removeItem('mg_session');
  SESSION=null;
  location.reload();
}

function applySession(){
  const u = SESSION;
  document.getElementById('user-label').textContent = u.nom;
  ['resum','locals','personal','productes','compar'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    if(el) el.style.display = u.tabs.includes(t)?'':'none';
  });
  if(u.local){ curLoc = u.local; curPer = u.local; }
  const primera = u.tabs[0];
  showPage(primera);
  if(!u.local) renderResum();

// ── Agrupació fw → mes (regla: mes amb més dies dins la fw) ──
const MESOS_CA=['Gen','Feb','Mar','Abr','Mai','Jun','Jul','Ago','Set','Oct','Nov','Des'];
function fwToMes(fw, year){
  // ISO week: dilluns de fw1 = Monday more or less. Calc per any
  year = year || 2026;
  const jan4 = new Date(year, 0, 4);
  const dow = (jan4.getDay() + 6) % 7; // 0=monday
  const week1Monday = new Date(jan4.getTime() - dow*86400000);
  const monday = new Date(week1Monday.getTime() + (fw-1)*7*86400000);
  // Comptar dies per mes a la setmana
  const counts = {};
  for(let i=0;i<7;i++){
    const d = new Date(monday.getTime() + i*86400000);
    const m = d.getMonth();
    counts[m] = (counts[m]||0) + 1;
  }
  let bestM=null, bestC=-1;
  for(const m in counts){ if(counts[m]>bestC){bestC=counts[m]; bestM=parseInt(m);} }
  return bestM;
}
// fw "esperades" per cada mes: TOTES les fw cuyo mes assignat és aquell, donat un any.
// Necessari per saber si un mes està complet.
function expectedFwsForMes(mesNum, year){
  year = year || 2026;
  const out = [];
  for(let fw=1; fw<=53; fw++){
    if(fwToMes(fw, year) === mesNum) out.push(fw);
  }
  return out;
}
function mesGroupsForFws(fwList, year){
  // Retorna [{mes:'Gen', mesNum:0, fws:[1,2,3,4,5], complet:true}, ...]
  year = year || 2026;
  const groups = [];
  let cur = null;
  for(const fw of fwList){
    const m = fwToMes(fw, year);
    if(!cur || cur.mesNum !== m){
      cur = {mes: MESOS_CA[m], mesNum: m, fws:[], complet:true};
      groups.push(cur);
    }
    cur.fws.push(fw);
  }
  // Marcar quins són incomplets
  for(const g of groups){
    const expected = expectedFwsForMes(g.mesNum, year);
    g.complet = expected.every(fw => g.fws.includes(fw));
    g.label = g.complet ? g.mes : g.mes + '*';
  }
  return groups;
}
// Genera capçalera de columnes mensuals (per posar-les com a columnes addicionals)
// Retorna {colsHtml: html_th_cols, groups: [...]}
function mesColsHeader(fwList, year){
  const groups = mesGroupsForFws(fwList, year);
  let html = '';
  for(const g of groups){
    const tooltip = g.complet ? g.mes : `${g.mes} (incomplet: només fw${g.fws[0]}-fw${g.fws[g.fws.length-1]} de fw${expectedFwsForMes(g.mesNum, year)[0]}-fw${expectedFwsForMes(g.mesNum, year).slice(-1)[0]})`;
    html += `<th class="mes-col" title="${tooltip}" style="background:rgba(44,62,80,.08);font-weight:700;color:#2C3E50;border-left:1.5px solid var(--sep);border-right:1.5px solid var(--sep)">${g.label}</th>`;
  }
  return {colsHtml: html, groups: groups};
}
// Donat un array fw_list (números) i un array de valors paral·lel, retorna
// un array de subtotals per mes (un valor per group).
function aggregateByMes(fwList, values, groups, op){
  op = op || 'sum';
  const result = [];
  for(const g of groups){
    let acc = 0, n = 0, vSum = 0, cSum = 0;
    for(const fw of g.fws){
      const idx = fwList.indexOf(fw);
      if(idx === -1) continue;
      const v = values[idx];
      if(op === 'avg_ratio'){
        // No usat aquí: requereix sum_v i sum_c, fem manual
      } else {
        acc += (typeof v === 'number' ? v : 0);
        n += 1;
      }
    }
    result.push(op === 'avg' ? (n ? acc/n : 0) : acc);
  }
  return result;
}
// Ràtio mensual (cost/vendes): cal fw_v i fw_c separats
function aggregateRatioByMes(fwList, fw_v, fw_c, groups){
  const result = [];
  for(const g of groups){
    let v=0, c=0;
    for(const fw of g.fws){
      const idx = fwList.indexOf(fw);
      if(idx === -1) continue;
      v += fw_v[idx] || 0;
      c += fw_c[idx] || 0;
    }
    result.push(v > 0 ? (c/v*100) : 0);
  }
  return result;
}
// Per a taules amb fw a files: produeix l'ordre {mes, total, fw} (mes a dalt, total al mig, fw a baix)
// rowFn(item, opts) ha de retornar el HTML d'una <tr>. opts conté: {kind: 'mes'|'total'|'fw', label, isPart, indexInGroup, fw}
// items: array d'objectes amb tota la info necessària per cada fw
// fwsList: array de números fw paral·lel a items
// year: any (per calcular grups mensuals)
// renderMesRow(group, items_in_group): retorna HTML de la fila mes
// renderTotalRow(items_all): retorna HTML de la fila total
// renderFwRow(item, i): retorna HTML de la fila fw
function buildRowsMesTotalFw(fwsList, items, year, renderMesRow, renderTotalRow, renderFwRow){
  const groups = mesGroupsForFws(fwsList, year);
  let html = '';
  // 1) Files mensuals
  for(const g of groups){
    const itemsMes = g.fws.map(fw => {
      const idx = fwsList.indexOf(fw);
      return idx >= 0 ? items[idx] : null;
    }).filter(x => x !== null);
    html += renderMesRow(g, itemsMes);
  }
  // 2) Total
  html += renderTotalRow(items);
  // 3) fws individuals
  fwsList.forEach((fw, i) => {
    html += renderFwRow(items[i], i, fw);
  });
  return html;
}

// Retorna les notes (array) per un local i fw donats. Inclou notes pròpies del local
// + notes del 'GRUP' que apliquen a tots.
function notesFor(loc, fw){
  if(typeof NOTES === 'undefined') return [];
  const out = [];
  const fwStr = String(fw);
  if(NOTES[loc] && NOTES[loc][fwStr]) out.push(...NOTES[loc][fwStr]);
  if(NOTES['GRUP'] && NOTES['GRUP'][fwStr]) out.push(...NOTES['GRUP'][fwStr]);
  return out;
}
// Retorna '*' si hi ha alguna nota per aquest local i fw, '' altrament
function noteMark(loc, fw){
  return notesFor(loc, fw).length > 0 ? '*' : '';
}
// Per Total Grup: marca si qualsevol local té nota a aquesta fw
function noteMarkAny(fw){
  if(typeof NOTES === 'undefined') return '';
  const fwStr = String(fw);
  for(const loc in NOTES){
    if(NOTES[loc] && NOTES[loc][fwStr] && NOTES[loc][fwStr].length>0) return '*';
  }
  return '';
}
// Icona per tipus de nota
const NOTE_ICONS = {
  'obres':'🏗️','esdeveniment':'🎉','ajust_cost':'💶','ajust_hores':'⏱️',
  'dades_incompletes':'⚠️','altre':'📝'
};
// Renderitza targeta de notes per un local. Si loc='TOTAL', mostra notes de tots els locals.
function renderNotesCard(loc){
  if(typeof NOTES === 'undefined') return '';
  let allNotes = [];  // {fw, loc, tipus, text}
  const targets = (loc === 'TOTAL') ? Object.keys(NOTES) : [loc, 'GRUP'];
  targets.forEach(l => {
    if(!NOTES[l]) return;
    Object.keys(NOTES[l]).forEach(fw => {
      NOTES[l][fw].forEach(n => allNotes.push({fw:parseInt(fw), loc:l, ...n}));
    });
  });
  if(allNotes.length === 0) return '';
  // Ordena per fw asc
  allNotes.sort((a,b) => a.fw - b.fw || a.loc.localeCompare(b.loc));
  // Filtra: si loc != TOTAL, només mostrem notes que afectin a aquest local (les pròpies + GRUP)
  // (això ja ho fem amb 'targets' a sobre)
  let html = `<details class="card" style="margin:6px 0 10px;border-left:3px solid #ff9f0a">
    <summary style="padding:8px 12px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);background:rgba(255,159,10,.06)">
      📝 Notes contextuals (${allNotes.length})
    </summary>
    <div style="padding:6px 12px 10px">
      <table style="width:100%;border-collapse:collapse;font-size:11px">
        <thead><tr style="border-bottom:1px solid var(--sep);color:var(--sub)">
          <th style="text-align:left;padding:4px 6px;width:50px">fw</th>
          ${loc==='TOTAL'?'<th style="text-align:left;padding:4px 6px;width:110px">Local</th>':''}
          <th style="text-align:left;padding:4px 6px;width:30px"></th>
          <th style="text-align:left;padding:4px 6px">Comentari</th>
        </tr></thead><tbody>`;
  allNotes.forEach(n => {
    const ico = NOTE_ICONS[n.tipus] || '📝';
    html += `<tr style="border-bottom:1px solid rgba(0,0,0,.04)">
      <td style="padding:4px 6px;font-weight:600">fw${n.fw}*</td>
      ${loc==='TOTAL'?`<td style="padding:4px 6px;color:var(--sub)">${n.loc==='GRUP'?'Tots':n.loc}</td>`:''}
      <td style="padding:4px 6px">${ico}</td>
      <td style="padding:4px 6px">${n.text}</td>
    </tr>`;
  });
  html += `</tbody></table></div></details>`;
  return html;
}

function sparkline(vals, tend, color, proj4){
  const W = 280, H = 50, P = 4;  // width, height, padding
  const all = [...vals, ...tend, ...(proj4 || [])];
  const mn = Math.min(...all), mx = Math.max(...all);
  const range = mx - mn || 1;
  const n = vals.length;
  const projN = (proj4 || []).length;
  const totalPoints = n + projN;
  const stepX = (W - 2*P) / Math.max(1, totalPoints - 1);
  const toY = v => H - P - ((v - mn) / range) * (H - 2*P);

  // Línia tendència (sobre els punts reals)
  const tendPath = tend.map((v, i) => `${i===0?'M':'L'}${P + i*stepX},${toY(v)}`).join(' ');

  // Línia projecció (continuació punts nous + l'últim de tendència)
  let projPath = '';
  if (projN > 0) {
    const lastX = P + (n - 1) * stepX;
    const lastY = toY(tend[tend.length - 1]);
    projPath = `M${lastX},${lastY}`;
    proj4.forEach((v, i) => {
      const x = P + (n + i) * stepX;
      projPath += ` L${x},${toY(v)}`;
    });
  }

  // Punts reals (cercles)
  const dots = vals.map((v, i) => `<circle cx="${P + i*stepX}" cy="${toY(v)}" r="1.8" fill="#6b6b6b"/>`).join('');

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:50px;display:block">
    <path d="${tendPath}" fill="none" stroke="${color}" stroke-width="2" opacity="0.75"/>
    ${projPath ? `<path d="${projPath}" fill="none" stroke="${color}" stroke-width="1.8" stroke-dasharray="3,3" opacity="0.6"/>` : ''}
    ${dots}
  </svg>`;
}

            <td style="padding:6px;text-align:right">${fmt(h.total_hores)}h</td>
            <td style="padding:6px;text-align:right;font-weight:700">${fmt(d.total_cost/19)}h</td>
            <td style="padding:6px;text-align:right;font-weight:700;color:${col_c}">${dc_pct>=0?'+':''}${dc_pct.toFixed(1)}%</td>

        </tbody>
      </table>
    </div>
  </div>`;
}

function renderTendenciaCard(loc, year){
  year = year || '2026';
  if(typeof TRENDS === 'undefined') return '';
  // Selector de fonts segons any
  const _TRENDS = year === '2025' ? (typeof TRENDS_HIST !== 'undefined' ? TRENDS_HIST : null) : TRENDS;
  if(!_TRENDS) return '';
  const _DV = year === '2025' ? (typeof DV_HIST !== 'undefined' ? DV_HIST : {}) : DV;
  const _HIST_ref = year === '2025' ? null : (typeof HIST !== 'undefined' ? HIST : null);  // 2025 no té any anterior disponible
  
  const key = loc==='TOTAL' ? 'GRUP' : loc;
  const t = _TRENDS[key];
  if(!t) return '';

  const lblLoc = loc==='TOTAL' ? 'Grup' : loc;

  // Dades actuals (de l'any seleccionat)
  const dv = loc==='TOTAL' ? null : _DV[loc];
  if(loc !== 'TOTAL' && !dv) return '';  // no hi ha dades aquest any
  
  let fw_v_real, fw_r_real, fw_list;
  if(loc === 'TOTAL'){
    // Recalcular GRUP per any
    const locsAv = LOCS.filter(l => _DV[l]);
    if(locsAv.length === 0) return '';
    fw_list = _DV[locsAv[0]].fw_list;
    fw_v_real = fw_list.map((_,i) => locsAv.reduce((s,l)=>s+(_DV[l].fw_vendes[i]||0), 0));
    const fw_c = fw_list.map((_,i) => locsAv.reduce((s,l)=>s+(_DV[l].fw_cost[i]||0), 0));
    fw_r_real = fw_v_real.map((v,i) => v>0 ? round1(fw_c[i]/v*100) : 0);
  } else {
    fw_v_real = dv.fw_vendes;
    fw_r_real = dv.fw_ratio;
    fw_list = dv.fw_list;
  }
  
  const nW = fw_v_real.length;
  const fwFirst = fw_list[0];
  const fwLast = fw_list[fw_list.length-1];
  const fwProj = fwLast + 4;
  const rangLbl = `fw${fwFirst}–fw${fwLast}`;

  // Última setmana
  const vLast = fw_v_real[nW - 1];
  const rLast = fw_r_real[nW - 1];

  // Mitjana del període (només setmanes amb dades)
  const vValid = fw_v_real.filter(v => v > 0);
  const vAvg = vValid.length ? vValid.reduce((a,b)=>a+b,0) / vValid.length : 0;
  const rValid = fw_r_real.filter(r => r > 0);
  const rAvg = rValid.length ? rValid.reduce((a,b)=>a+b,0) / rValid.length : 0;

  // Projecció a 4 setmanes (extrapolant la recta de regressió)
  const lastTendV = t.tend_v[t.tend_v.length - 1];
  const lastTendR = t.tend_r[t.tend_r.length - 1];
  const proj4v = [1,2,3,4].map(i => lastTendV + t.sl_v * i);
  const proj4r = [1,2,3,4].map(i => lastTendR + t.sl_r * i);
  const vProj4 = Math.max(0, Math.round(proj4v[3]));
  const rProj4 = Math.max(0, proj4r[3]);

  // === Vendes: classificar direcció de negoci ===
  const confV = confLabel(t.r2_v);
  let vIcon, vFrase, vColor;
  if (confV.cls === 'weak') {
    vIcon = '💤';
    vFrase = 'Sense direcció clara · variació elevada setmana a setmana';
    vColor = '#8e8e93';
  } else if (t.sl_v > 0) {
    vIcon = '🟢';
    vFrase = confV.cls === 'strong' ? 'Creixent de forma sòlida' : 'Tendència probable a créixer';
    vColor = 'var(--ok)';
  } else {
    vIcon = confV.cls === 'strong' ? '🔴' : '🟡';
    vFrase = confV.cls === 'strong' ? 'Decreixent de forma sòlida' : 'Tendència probable a baixar';
    vColor = confV.cls === 'strong' ? 'var(--bad)' : 'var(--warn)';
  }

  // === Ràtio: classificar direcció de negoci (pujar = dolent) ===
  const confR = confLabel(t.r2_r);
  let rIcon, rFrase, rColor;
  if (confR.cls === 'weak') {
    rIcon = '💤';
    rFrase = 'Sense direcció clara · variació elevada setmana a setmana';
    rColor = '#8e8e93';
  } else if (t.sl_r < 0) {
    rIcon = '🟢';
    rFrase = confR.cls === 'strong' ? 'Millorant de forma sòlida' : 'Tendència probable a millorar';
    rColor = 'var(--ok)';
  } else {
    rIcon = confR.cls === 'strong' ? '🔴' : '🟡';
    rFrase = confR.cls === 'strong' ? 'Empitjorant de forma sòlida' : 'Tendència probable a empitjorar';
    rColor = confR.cls === 'strong' ? 'var(--bad)' : 'var(--warn)';
  }

  // === Suggeriment d'acció (només si alguna mètrica té senyal clar) ===
  const rSevIsBad = (rIcon === '🔴');
  const rSevIsWarn = (rIcon === '🟡');
  const rSevIsGood = (rIcon === '🟢');
  const vSevIsGood = (vIcon === '🟢' && confV.cls === 'strong');
  let sugg = '';
  if (rSevIsBad) {
    sugg = '💡 Revisar urgentment mix hores cuina/sala i productivitat dels torns més carregats.';
  } else if (rSevIsWarn) {
    sugg = '💡 Tendència a confirmar: monitoritzar les pròximes 2-3 setmanes abans d\'intervenir.';
  } else if (rSevIsGood && vSevIsGood) {
    sugg = '💡 Trajectòria molt positiva: mantenir la gestió actual d\'equips i patró d\'obertura.';
  } else if (rSevIsGood) {
    sugg = '💡 Ràtio millorant: mantenir control de costs laborals actual.';
  }

  // === HTML: fila de 4 números amb etiquetes (afegeix 2025 si hi ha HIST) ===
  // Comportament: si HIST té aquest local, mostrem la columna "Mateixa setm. 2025"
  //  amb delta vs 2025 al peu. Si no, la columna es suprimeix i tornem a 3 columnes.
  const hasHist = year === '2026' && typeof HIST !== 'undefined' && HIST && HIST[loc];
  const hist = hasHist ? HIST[loc] : null;

  function quadruple(lastVal, avgVal, histVal, projVal, showProj, unit, projColor){
    const fmtVal = unit === '€' ? `${fmt(lastVal)}€` : `${lastVal.toFixed(1)}%`;
    const fmtAvg = unit === '€' ? `${fmt(avgVal)}€` : `${avgVal.toFixed(1)}%`;
    const fmtProj = unit === '€' ? `~${fmt(projVal)}€` : `~${projVal.toFixed(1)}%`;

    // Calcular delta vs 2025
    let fmtHist = '—';
    let fmtDelta = '';
    if (histVal !== null && histVal !== undefined && histVal > 0) {
      fmtHist = unit === '€' ? `${fmt(histVal)}€` : `${histVal.toFixed(1)}%`;
      if (unit === '€') {
        const deltaPct = ((lastVal - histVal) / histVal) * 100;
        const sign = deltaPct > 0 ? '+' : '';
        const color = deltaPct > 0 ? 'var(--ok)' : deltaPct < 0 ? 'var(--bad)' : 'var(--sub)';
        fmtDelta = `<div style="font-size:9px;color:${color};font-weight:600;margin-top:1px">${sign}${deltaPct.toFixed(1)}% vs 2025</div>`;
      } else {
        // Per ràtio, la diferència en pp (no %)
        const deltaPp = lastVal - histVal;
        const sign = deltaPp > 0 ? '+' : '';
        // En ràtio: baixar és bo (verd), pujar és dolent (vermell)
        const color = deltaPp < 0 ? 'var(--ok)' : deltaPp > 0 ? 'var(--bad)' : 'var(--sub)';
        fmtDelta = `<div style="font-size:9px;color:${color};font-weight:600;margin-top:1px">${sign}${deltaPp.toFixed(1)}pp vs 2025</div>`;
      }
    }

    const cols = hasHist ? '1fr 1fr 1fr 1fr' : '1fr 1fr 1fr';
    const histBlock = hasHist ? `<div style="text-align:center;padding:5px 4px;background:#fff;border-radius:6px">
        <div style="color:var(--sub);font-size:9px;margin-bottom:2px">Mateixa setm. (fw${fwLast} 2025)</div>
        <div style="font-weight:700;font-size:12px;color:var(--fg)">${fmtHist}</div>
        ${fmtDelta}
      </div>` : '';

    return `<div style="display:grid;grid-template-columns:${cols};gap:6px;font-size:10px;margin-top:6px">
      <div style="text-align:center;padding:5px 4px;background:#fff;border-radius:6px">
        <div style="color:var(--sub);font-size:9px;margin-bottom:2px">Última setm. (fw${fwLast})</div>
        <div style="font-weight:700;font-size:12px;color:var(--fg)">${fmtVal}</div>
      </div>
      <div style="text-align:center;padding:5px 4px;background:#fff;border-radius:6px">
        <div style="color:var(--sub);font-size:9px;margin-bottom:2px">Mitjana ${rangLbl}</div>
        <div style="font-weight:700;font-size:12px;color:var(--fg)">${fmtAvg}</div>
      </div>
      ${histBlock}
      <div style="text-align:center;padding:5px 4px;background:#fff;border-radius:6px;${!showProj?'opacity:.35':''}">
        <div style="color:var(--sub);font-size:9px;margin-bottom:2px">Projecció fw${fwProj}</div>
        <div style="font-weight:700;font-size:12px;color:${showProj?projColor:'var(--sub)'}">${showProj?fmtProj:'—'}</div>
      </div>
    </div>`;
  }

  // Valors històrics per la mateixa setmana (fw1-16 2025)
  const histVLast = hist ? (hist.fw_vendes[hist.fw_vendes.length - 1] || null) : null;
  const histRLast = hist ? (hist.fw_ratio[hist.fw_ratio.length - 1] || null) : null;

  // === HTML de cada bloc ===
  function bloc(kind){
    if (kind === 'v') {
      return `<div style="padding:12px;background:var(--bg2);border-radius:10px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <span style="font-size:13px">${vIcon}</span>
          <span style="font-size:11px;font-weight:700;color:var(--fg)">Vendes netes setmanals</span>
        </div>
        <div style="font-size:11px;color:var(--fg);margin-bottom:4px;line-height:1.35">${vFrase}</div>
        <div style="margin:4px 0 2px">${sparkline(fw_v_real, t.tend_v, vColor, proj4v)}</div>
        ${quadruple(vLast, vAvg, histVLast, vProj4, confV.cls !== 'weak', '€', vColor)}
        <div style="font-size:10px;color:var(--sub);margin-top:6px;text-align:right">${confV.label}</div>
      </div>`;
    } else {
      return `<div style="padding:12px;background:var(--bg2);border-radius:10px;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <span style="font-size:13px">${rIcon}</span>
          <span style="font-size:11px;font-weight:700;color:var(--fg)">Ràtio Cost Personal / Vendes netes</span>
        </div>
        <div style="font-size:11px;color:var(--fg);margin-bottom:4px;line-height:1.35">${rFrase}</div>
        <div style="margin:4px 0 2px">${sparkline(fw_r_real, t.tend_r, rColor, proj4r)}</div>
        ${quadruple(rLast, rAvg, histRLast, rProj4, confR.cls !== 'weak', '%', rColor)}
        <div style="font-size:10px;color:var(--sub);margin-top:6px;text-align:right">${confR.label}</div>
      </div>`;
    }
  }

  // === Detalls tècnics (expandible) ===
  const tid = 'tend-tech-' + (loc==='TOTAL' ? 'grup' : loc.replace(/\s/g,'').replace('ò','o').replace('à','a'));
  const technical = `<div id="${tid}" style="display:none;margin-top:8px;padding:10px;background:rgba(0,0,0,.03);border-radius:8px;font-size:10px;color:var(--sub);line-height:1.5">
    <div style="font-weight:700;color:var(--fg);margin-bottom:4px">Detalls tècnics</div>
    <b>Vendes netes:</b> slope = ${t.sl_v>=0?'+':''}${t.sl_v.toLocaleString('ca-ES')}€/setmana · R² = ${t.r2_v.toFixed(3)}<br>
    <b>Ràtio Cost/Vendes:</b> slope = ${t.sl_r>=0?'+':''}${t.sl_r.toFixed(2)}pp/setmana · R² = ${t.r2_r.toFixed(3)}<br>
    <div style="margin-top:6px;font-style:italic">R² = quant s'ajusten els punts reals a la línia de tendència (0 = cap patró, 1 = patró perfecte). Slope = variació estimada per setmana.</div>
    <div style="margin-top:4px;font-style:italic">Projecció fw${fwProj}: extrapolació lineal a 4 setmanes vista des de fw${fwLast}. No considera estacionalitat ni esdeveniments puntuals (festius, promocions).</div>
  </div>`;

  return `<div class="card">
    <div class="ch" style="justify-content:space-between;flex-wrap:wrap;gap:4px">
      <div>
        <div class="ct">📊 Tendències · ${lblLoc} · ${year}</div>
        <div style="font-size:10px;color:var(--sub);font-weight:400;margin-top:2px">Període: ${rangLbl} · ${nW} setmanes</div>
      </div>
      <span onclick="document.getElementById('${tid}').style.display=document.getElementById('${tid}').style.display==='none'?'block':'none'" style="cursor:pointer;font-size:11px;color:var(--sub);user-select:none">ⓘ detalls</span>
    </div>
    <div class="cb" style="padding:10px 12px">
      ${bloc('v')}
      ${bloc('r')}
      ${sugg ? `<div style="margin-top:8px;padding:8px 10px;background:rgba(255,204,0,.1);border-radius:8px;font-size:11px;color:var(--fg);line-height:1.4">${sugg}</div>` : ''}
      ${technical}
    </div>
  </div>`;
}

var curResumPeriod = '2026';

function setResumPeriod(p){
  curResumPeriod = p;
  // Actualitzar botons sticky
  const seg = document.getElementById('resum-period-seg');
  if(seg){
    seg.querySelectorAll('.sb').forEach(b => b.classList.remove('active'));
    const btnIdx = {'2026':0, '2025':1, 'compar':2, 'forecast':3}[p];
    if(btnIdx != null) seg.querySelectorAll('.sb')[btnIdx].classList.add('active');
  }
  renderResum();
}

function renderResum(){
  const el = document.getElementById('resum-detail');
  if(!el) return;
  if(curResumPeriod === '2026') renderResum2026(el);
  else if(curResumPeriod === '2025') renderResum2025(el);
  else if(curResumPeriod === 'compar') renderResumCompar(el);
  else if(curResumPeriod === 'forecast') renderResumForecast(el);
}

    parentEl.innerHTML = `<div style="padding:30px;text-align:center;color:var(--sub)">

function renderResumCompar(parentEl){
  // Vista comparativa enriquida

  html += renderHistKPIsCard('TOTAL', {title:'📅 Comparativa 2025 vs 2026 · Grup'});

  LOCS.forEach(l => {
    if(DV_HIST[l]) html += renderHistKPIsCard(l, {title:`📅 Comparativa 2025 vs 2026 · ${l}`});
  });
  
  // Gràfic comparatiu vendes per setmana (un per local)
  const fws = DV[LOCS[0]].fw_list.map(f => 'fw' + f);

    html += `<div class="card-scroll">

      <div class="cb" style="padding:6px 4px 8px">
        <div class="cw"><canvas id="${cgCmpId}"></canvas></div>
      </div>
    </div>`;
  });

  setTimeout(() => {
    LOCS.forEach((l, idx) => {
      if(!DV_HIST[l]) return;

function renderResumForecast(parentEl){
  if(typeof FORECAST === 'undefined' || !FORECAST || Object.keys(FORECAST).length === 0){
    parentEl.innerHTML = `<div style="padding:30px;text-align:center;color:var(--sub)">Forecast no disponible</div>`;
    return;
  }
  
  let html = '';
  const charts_to_render = [];
  
  // GRUP primer
  if(FORECAST['GRUP']){
    const r = _renderForecastBlock('GRUP', 'Grup (2 locals)', '#555');
    html += r.html;
    if(r.chartData) charts_to_render.push(r.chartData);
  }
  
  // Cada local
  LOCS.forEach(l => {
    if(FORECAST[l]){
      const idx = LOCS.indexOf(l);
      const r = _renderForecastBlock(l, l, GCOLS[idx]);
      html += r.html;
      if(r.chartData) charts_to_render.push(r.chartData);
    }
  });
  
  parentEl.innerHTML = html;
  setTimeout(() => {
    charts_to_render.forEach(_renderForecastChart);
  }, 50);
}

// Helper: renderitza una card mini amb KPIs comparatius 2025 vs 2026 per un local
// loc: local concret o 'TOTAL' (suma de tots)
// returns: HTML string o '' si no hi ha dades 2025
function renderHistKPIsCard(loc, opts){
  opts = opts || {};
  if (typeof DV_HIST === 'undefined' || !DV_HIST) return '';
  
  let v25=0, c25=0, h25=0, v26=0, c26=0, h26=0;
  if(loc === 'TOTAL'){
    LOCS.forEach(l => {
      if(DV_HIST[l]){ v25+=DV_HIST[l].total_vendes||0; c25+=DV_HIST[l].total_cost||0; h25+=DV_HIST[l].total_hores||0; }
      v26+=DV[l].total_vendes||0; c26+=DV[l].total_cost||0; h26+=Math.round((DV[l].total_cost||0)/19);
    });
  } else {
    if(!DV_HIST[loc]) return '';
    v25=DV_HIST[loc].total_vendes||0; c25=DV_HIST[loc].total_cost||0; h25=DV_HIST[loc].total_hores||0;
    v26=DV[loc].total_vendes||0; c26=DV[loc].total_cost||0; h26=Math.round((DV[loc].total_cost||0)/19);
  }
  if(v25 === 0) return '';
  
  const r25 = c25/v25*100;
  const r26 = c26/v26*100;
  
  function delta(cur, hist, unit, higherIsBetter){
    if(!hist || hist === 0) return '<span style="color:var(--sub)">—</span>';
    const d = unit === 'pp' ? (cur - hist) : ((cur - hist) / hist * 100);
    const isGood = higherIsBetter ? d > 0 : d < 0;
    const col = Math.abs(d) < 0.05 ? 'var(--sub)' : isGood ? 'var(--ok)' : 'var(--bad)';
    const sign = d >= 0 ? '+' : '';
    const suf = unit === 'pp' ? 'pp' : '%';
    return `<span style="color:${col};font-weight:700">${sign}${d.toFixed(1)}${suf}</span>`;
  }
  
  // Mini taula amb 4 columnes: Mètrica · 2025 · 2026 · Δ
  const title = opts.title || '📅 Comparativa 2025 vs 2026 · mateix període (fw1-16)';
  return `<div class="card" style="margin-bottom:8px">
    <div class="ch"><span class="ct">${title}</span></div>
    <div class="cb" style="padding:8px 10px">
      <table class="dtbl" style="font-size:11px;width:100%">
        <thead><tr>
          <th style="text-align:left">Mètrica</th>
          <th>2025</th>
          <th>2026</th>
          <th>Δ</th>
        </tr></thead>
        <tbody>
          <tr>
            <td>Vendes netes</td>
            <td>${fmt(v25)}€</td>
            <td style="font-weight:700">${fmt(v26)}€</td>
            <td>${delta(v26, v25, '%', true)}</td>
          </tr>
          <tr>
            <td>Cost personal</td>
            <td>${fmt(c25)}€</td>
            <td style="font-weight:700">${fmt(c26)}€</td>
            <td>${delta(c26, c25, '%', false)}</td>
          </tr>
          <tr>
            <td>Hores treballades</td>
            <td>${fmt(h25)}h</td>
            <td style="font-weight:700">${fmt(h26)}h</td>
            <td>${delta(h26, h25, '%', false)}</td>
          </tr>
          <tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,.02)">
            <td style="font-weight:700">Ràtio P/V</td>
            <td>${r25.toFixed(1)}%</td>
            <td style="font-weight:700;color:${rc(r26)}">${r26.toFixed(1)}%</td>
            <td>${delta(r26, r25, 'pp', false)}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>`;
}

    return;

  const locsWithHist = LOCS.filter(l => DV_HIST[l]);
  if (locsWithHist.length === 0) {
    card.style.display = 'none';
    return;
  }
  card.style.display = '';

  const periodLbl = `fw${DV[LOCS[0]].fw_list[0]}–fw${DV[LOCS[0]].fw_list[DV[LOCS[0]].fw_list.length-1]}`;

  function deltaCell(cur, hist, unit, higherIsBetter){

    const sign = delta > 0 ? '+' : '';

      <td style="font-weight:600">${fmt(d.total_cost)}€</td>

    html += `<tr><td style="padding-left:16px">Hores treballades</td>

      ${deltaCell(dHores, hHores, '%', false)}

    html += `<tr><td style="padding-left:16px">Ràtio Cost/Vendes</td>

      <td style="font-weight:700;color:${rc(d.ratio)}">${d.ratio}%</td>

  html += `</tbody></table>`;
  html += `<div style="font-size:10px;color:var(--sub);margin-top:6px;line-height:1.4">
    <span style="color:var(--ok)">▲ verd</span> = millor que 2025 · <span style="color:var(--bad)">▼ vermell</span> = pitjor que 2025<br>

  cont.innerHTML = html;
}

// Helper inline de delta (% o pp) — color verd/vermell/gris segons higherBetter
function _deltaInline(v26, v25, isPP, higherBetter){
  if(!v25 || v25 === 0) return '<span style="color:var(--sub)">—</span>';
  const d = isPP ? (v26 - v25) : ((v26 - v25) / v25 * 100);
  const isGood = higherBetter ? d > 0 : d < 0;
  const col = Math.abs(d) < 0.05 ? 'var(--sub)' : isGood ? 'var(--ok)' : 'var(--bad)';
  const sign = d >= 0 ? '+' : '';
  return `<span style="color:${col};font-weight:600">${sign}${d.toFixed(1)}${isPP?'pp':'%'}</span>`;
}

// Helper compartit per cel·les comparatives 26/25 + Δ
// retorn: {v26 (gran), v25 (petit a sota), Δ% acolorit}
function _cmpCell(v26, v25, opts){
  opts = opts || {};
  const unit = opts.unit || '€';  // '€', 'h', '%', 'k€', 'p'
  const higherBetter = opts.higherBetter !== false;
  const isPP = unit === 'pp';
  
  function fmtV(v){
    if(v == null) return '—';
    if(unit === '%') return v.toFixed(1) + '%';
    if(unit === 'h') return fmt(v) + 'h';
    if(unit === 'k€') return (v/1000).toFixed(1) + 'k€';
    if(unit === 'pp') return v.toFixed(1) + '%';
    return fmt(v) + '€';
  }
  
  let delta = '';
  if(v25 != null && v25 !== 0 && v26 != null){
    const d = isPP ? (v26 - v25) : ((v26 - v25) / v25 * 100);
    const isGood = higherBetter ? d > 0 : d < 0;
    const col = Math.abs(d) < 0.05 ? 'var(--sub)' : isGood ? 'var(--ok)' : 'var(--bad)';
    const sign = d >= 0 ? '+' : '';
    const suf = isPP ? 'pp' : '%';
    delta = `<div style="font-size:9px;color:${col};font-weight:700;line-height:1">${sign}${d.toFixed(1)}${suf}</div>`;
  } else if(v25 == null || v25 === 0){
    delta = `<div style="font-size:9px;color:var(--sub);line-height:1">—</div>`;
  }
  
  return `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">
    <div style="font-weight:700;line-height:1.1">${fmtV(v26)}</div>
    <div style="font-size:9px;color:var(--sub);line-height:1">${fmtV(v25)}</div>
    ${delta}
  </div>`;
}

      const r26 = d26.heatmap[t] || [0,0,0,0,0,0,0];
      const r25 = d25.heatmap[t] || [0,0,0,0,0,0,0];
      const tot26 = r26.reduce((a,b)=>a+b, 0);
      const tot25 = r25.reduce((a,b)=>a+b, 0);
      if(tot26 === 0 && tot25 === 0) return;
      tHM += `<tr><td style="font-weight:600">${t}</td>`;
      r26.forEach((v26,i) => {
        const v25 = r25[i] || 0;
        tHM += `<td style="text-align:center;padding:2px 4px">${_cmpCell(v26, v25, {unit:'€', higherBetter:true})}</td>`;
      });
      tHM += `<td style="text-align:center;padding:2px 4px">${_cmpCell(tot26, tot25, {unit:'€', higherBetter:true})}</td></tr>`;
    });
    tHM += `</tbody></table>`;
    html += `<div class="card-scroll">
      <div class="ch"><span class="ct">Heatmap vendes torn × dia · 2026 vs 2025</span></div>
      <div class="cb" style="padding:6px 8px;overflow:auto;max-height:55vh">${tHM}</div>
    </div>`;
  }
  
  // Top/Bottom 5 dies — side-by-side
  if(d26.top5 && d25.top5){
    let tTop = `<table class="dtbl" style="font-size:10px;width:100%">
      <thead><tr>
        <th colspan="3" style="text-align:center;background:rgba(31,56,100,.05)">2026</th>
        <th colspan="3" style="text-align:center;background:rgba(0,0,0,.04)">2025</th>
      </tr><tr>
        <th>Data</th><th>Dia</th><th style="text-align:right">Vendes</th>
        <th>Data</th><th>Dia</th><th style="text-align:right">Vendes</th>
      </tr></thead><tbody>`;
    const maxN = Math.max(d26.top5.length, d25.top5.length);
    for(let i = 0; i < maxN; i++){
      const r26 = d26.top5[i]; const r25 = d25.top5[i];
      tTop += `<tr>
        <td>${r26?r26.data:'—'}</td><td style="color:var(--sub)">${r26?r26.dia:'—'}</td><td style="text-align:right;font-weight:700">${r26?fmt(r26.v)+'€':'—'}</td>
        <td>${r25?r25.data:'—'}</td><td style="color:var(--sub)">${r25?r25.dia:'—'}</td><td style="text-align:right;font-weight:600;color:var(--sub)">${r25?fmt(r25.v)+'€':'—'}</td>
      </tr>`;
    }
    tTop += `</tbody></table>`;
    html += `<div class="card"><div class="ch"><span class="ct">🏆 Top 5 dies · 2026 vs 2025</span></div><div class="cb" style="padding:4px 10px;overflow-x:auto">${tTop}</div></div>`;
  }
  
  if(d26.bottom5 && d25.bottom5){
    let tBot = `<table class="dtbl" style="font-size:10px;width:100%">
      <thead><tr>
        <th colspan="3" style="text-align:center;background:rgba(31,56,100,.05)">2026</th>
        <th colspan="3" style="text-align:center;background:rgba(0,0,0,.04)">2025</th>
      </tr><tr>
        <th>Data</th><th>Dia</th><th style="text-align:right">Vendes</th>
        <th>Data</th><th>Dia</th><th style="text-align:right">Vendes</th>
      </tr></thead><tbody>`;
    const maxN = Math.max(d26.bottom5.length, d25.bottom5.length);
    for(let i = 0; i < maxN; i++){
      const r26 = d26.bottom5[i]; const r25 = d25.bottom5[i];
      tBot += `<tr>
        <td>${r26?r26.data:'—'}</td><td style="color:var(--sub)">${r26?r26.dia:'—'}</td><td style="text-align:right;font-weight:700">${r26?fmt(r26.v)+'€':'—'}</td>
        <td>${r25?r25.data:'—'}</td><td style="color:var(--sub)">${r25?r25.dia:'—'}</td><td style="text-align:right;font-weight:600;color:var(--sub)">${r25?fmt(r25.v)+'€':'—'}</td>
      </tr>`;
    }
    tBot += `</tbody></table>`;
    html += `<div class="card"><div class="ch"><span class="ct">📉 Bottom 5 dies · 2026 vs 2025</span></div><div class="cb" style="padding:4px 10px;overflow-x:auto">${tBot}</div></div>`;
  }
  
  // Gràfic comparatiu vendes setmanals
  const cgId = `cg-cmp-${idx}-${loc.replace(/\s+/g,'')}`;
  html += `<div class="card-scroll">
    <div class="ch"><span class="ct">Vendes setmanals 2025 vs 2026</span></div>
    <div class="cb" style="padding:6px 4px 8px">
      <div class="cw"><canvas id="${cgId}"></canvas></div>
    </div>
  </div>`;
  
  // Gràfic comparatiu ràtio acumulat
  const crId = `cr-cmp-${idx}-${loc.replace(/\s+/g,'')}`;
  html += `<div class="card">
    <div class="ch"><span class="ct">Ràtio P/V acumulat 2025 vs 2026</span></div>
    <div class="cb" style="padding:6px 4px 8px">
      <div class="cws"><canvas id="${crId}"></canvas></div>
    </div>
  </div>`;
  
  // Programa renderització dels charts
  if(container){
    container._charts = container._charts || [];
    container._charts.push({cgId, crId, loc, fws, d26, d25, col});
  }
  
  return html;
}

// Helper: formatar percentatge amb signe
function _fmtPct(d){
  if(d == null) return '—';
  return (d >= 0 ? '+' : '') + d.toFixed(1) + '%';
}

// Helper: bloc Forecast complet d'un local (o GRUP)
function _renderForecastBlock(locKey, displayName, color){
  if(typeof FORECAST === 'undefined' || !FORECAST || !FORECAST[locKey]){
    return `<div class="card" style="margin-top:4px">
      <div class="cb" style="padding:30px 20px;text-align:center;color:var(--sub)">
        <div style="font-size:36px;margin-bottom:14px">⚠️</div>
        <div style="font-size:13px">Forecast no disponible per ${displayName}</div>
        <div style="font-size:11px;color:var(--sub);margin-top:6px">Cal recarregar les dades</div>
      </div>
    </div>`;
  }
  
  const f = FORECAST[locKey];
  const lastFw = f.last_real_fw;
  let html = '';
  
  // Banner
  html += `<div class="loc-banner" style="background:${color}12;border-left:4px solid ${color}">
    <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>
    <div style="flex:1">
      <div style="font-size:15px;font-weight:700;color:${color}">🔮 Forecast · ${displayName}</div>
      <div style="font-size:11px;color:${color};opacity:.75">Realitzat fw1–fw${lastFw} · Projecció fw${lastFw+1}–fw52</div>
    </div>
  </div>`;
  
  // Mètode
  html += `<div style="font-size:10px;color:var(--sub);margin-bottom:8px;padding:6px 10px;background:rgba(0,0,0,.03);border-radius:6px">
    ⚙️ <b>Mètode:</b> ${f.method}
    ${f.has_full_2025 ? '' : ' · ⚠️ <span style="color:var(--warn)">No tenim FY 2025 per aquest local — projecció menys precisa</span>'}
  </div>`;
  
  // ════════════ KPIs TY ════════════
  const tyV = f.ty_v_total;
  const tyC = f.ty_c_total;
  const tyR = f.ty_ratio;
  const tyGrowth = f.ty_growth_factor;
  
  html += `<div class="krow k3" style="margin-bottom:8px">
    <div class="kpi">
      <div class="kl">TY Vendes 2026</div>
      <div class="kv" style="font-size:16px">${(tyV/1000).toFixed(0)}k€</div>
      <div style="font-size:9px;color:var(--sub)">Realitzat ${(f.ty_v_real/1000).toFixed(0)}k + proj ${(f.ty_v_proj/1000).toFixed(0)}k</div>
      ${tyGrowth != null ? `<div style="font-size:10px;font-weight:700;color:${tyGrowth>0?'var(--ok)':'var(--bad)'}">${_fmtPct(tyGrowth)} vs 2025 (${(f.ty_v_2025/1000).toFixed(0)}k)</div>` : ''}
    </div>
    <div class="kpi">
      <div class="kl">TY Cost personal 2026</div>
      <div class="kv" style="font-size:16px">${(tyC/1000).toFixed(0)}k€</div>
      <div style="font-size:9px;color:var(--sub)">Realitzat ${(f.ty_c_real/1000).toFixed(0)}k + proj ${(f.ty_c_proj/1000).toFixed(0)}k</div>
    </div>
    <div class="kpi">
      <div class="kl">TY Ràtio P/V 2026</div>
      <div class="kv ${sf(tyR)}" style="font-size:16px">${pc(tyR)} ${si(tyR)}</div>
      <div style="font-size:9px;color:var(--sub)">Estimació basada en ràtio actual</div>
    </div>
  </div>`;
  
  // ════════════ Pròximes 4 setmanes ════════════
  let t4 = `<table class="dtbl" style="font-size:11px;width:100%">
    <thead><tr>
      <th>Setm.</th>
      <th style="text-align:right">Vendes proj.</th>
      <th style="text-align:right">Cost proj.</th>
      <th style="text-align:right">Ràtio proj.</th>
    </tr></thead><tbody>`;
  for(let i = 0; i < f.proj_4w_v.length; i++){
    t4 += `<tr>
      <td style="font-weight:600">${f.proj_4w_labels[i]}</td>
      <td style="text-align:right;font-weight:700">${fmt(f.proj_4w_v[i])}€</td>
      <td style="text-align:right">${fmt(f.proj_4w_c[i])}€</td>
      <td style="text-align:right;font-weight:600;color:${rc(f.proj_4w_r[i])}">${f.proj_4w_r[i]}%</td>
    </tr>`;
  }
  // Total mes
  const totV4 = f.proj_4w_v.reduce((a,b)=>a+b,0);
  const totC4 = f.proj_4w_c.reduce((a,b)=>a+b,0);
  const totR4 = totV4 > 0 ? (totC4/totV4*100).toFixed(1) : 0;
  t4 += `<tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,.03)">
    <td style="font-weight:700">Total mes</td>
    <td style="text-align:right;font-weight:700">${fmt(totV4)}€</td>
    <td style="text-align:right;font-weight:700">${fmt(totC4)}€</td>
    <td style="text-align:right;font-weight:700;color:${rc(totR4)}">${totR4}%</td>
  </tr></tbody></table>`;
  html += `<div class="card">
    <div class="ch"><span class="ct">📅 Projecció pròximes 4 setmanes</span></div>
    <div class="cb" style="padding:6px 10px;overflow-x:auto">${t4}</div>
  </div>`;
  
  // ════════════ Gràfic vendes setmanals (real + projecció) ════════════
  const cgFcId = `cg-fc-${locKey.replace(/\s+/g,'')}`;
  html += `<div class="card-scroll">
    <div class="ch"><span class="ct">📈 Vendes setmanals · Real vs Projecció (fins fw52)</span></div>
    <div class="cb" style="padding:6px 4px 8px">
      <div class="cw" style="height:280px"><canvas id="${cgFcId}"></canvas></div>
      <div style="display:flex;gap:14px;margin-top:6px;font-size:10px;justify-content:center">
        <span><span style="display:inline-block;width:14px;height:2px;background:${color};vertical-align:middle"></span> Realitzat 2026</span>
        <span><span style="display:inline-block;width:14px;height:2px;background:${color};vertical-align:middle;border-top:1px dashed ${color}"></span> Projectat 2026</span>
        ${f.has_full_2025 ? `<span><span style="display:inline-block;width:14px;height:2px;background:#999;vertical-align:middle;border-top:1px dashed #999"></span> Real 2025</span>` : ''}
      </div>
    </div>
  </div>`;
  
  // ════════════ Detall taula completa setmanal — comparativa 2025 vs 2026 ════════════
  const has2025 = f.weekly_2025 && f.weekly_2025.length > 0;
  let tDet = `<table class="dtbl" style="font-size:9px;width:100%">
    <thead>
      <tr>
        <th rowspan="2" style="text-align:left">fw</th>
        <th colspan="${has2025?3:0}" style="text-align:center;background:rgba(150,150,150,.08);border-right:.5px solid var(--sep)">${has2025?'2025 actual':''}</th>
        <th colspan="3" style="text-align:center;background:rgba(0,122,255,.06);border-right:.5px solid var(--sep)">2026 (real + projecció)</th>
        <th colspan="2" style="text-align:center;background:rgba(255,180,0,.08)">Variació 26 vs 25</th>
        <th rowspan="2" style="text-align:center">Tipus</th>
      </tr>
      <tr>
        ${has2025?`
          <th style="text-align:right">Vendes</th>
          <th style="text-align:right">Cost</th>
          <th style="text-align:right;border-right:.5px solid var(--sep)">Ràtio</th>
        `:''}
        <th style="text-align:right">Vendes</th>
        <th style="text-align:right">Cost</th>
        <th style="text-align:right;border-right:.5px solid var(--sep)">Ràtio</th>
        <th style="text-align:right">Δ Vendes</th>
        <th style="text-align:right">Δ Ràtio</th>
      </tr>
    </thead><tbody>`;
  
  const w2025_map = {};
  if(has2025) f.weekly_2025.forEach(w => { w2025_map[w.fw] = w; });
  
  let tot_v_25 = 0, tot_c_25 = 0, tot_v_26 = 0, tot_c_26 = 0;
  // Pre-càlcul total
  f.weekly_proj.forEach(w => {
    tot_v_26 += w.v; tot_c_26 += w.c;
    const w25 = w2025_map[w.fw];
    if(w25) { tot_v_25 += w25.v; tot_c_25 += w25.c; }
  });
  
  // 1) Files mensuals — fw del weekly_proj agrupades per mes
  const fwsFC = f.weekly_proj.map(w => w.fw);
  const mesGroupsFC = mesGroupsForFws(fwsFC, 2026);
  for(const g of mesGroupsFC){
    let v26m=0,c26m=0,v25m=0,c25m=0,nReal=0,nProj=0;
    for(const fw of g.fws){
      const w = f.weekly_proj.find(ww => ww.fw === fw);
      if(!w) continue;
      v26m += w.v; c26m += w.c;
      if(w.source==='real') nReal++; else nProj++;
      const w25 = w2025_map[fw];
      if(w25){ v25m += w25.v; c25m += w25.c; }
    }
    const r26m = v26m > 0 ? round1(c26m/v26m*100) : 0;
    const r25m = v25m > 0 ? round1(c25m/v25m*100) : 0;
    const dV_m = v25m > 0 ? ((v26m - v25m)/v25m*100) : null;
    const dR_m = (r25m && r26m) ? (r26m - r25m) : null;
    const partial = !g.complet;
    const tag = nProj===0 
      ? '<span style="font-size:8px;padding:1px 5px;background:rgba(52,199,89,.12);color:var(--ok);border-radius:3px;font-weight:600">REAL</span>'
      : (nReal===0 
        ? '<span style="font-size:8px;padding:1px 5px;background:rgba(0,122,255,.12);color:var(--accent);border-radius:3px;font-weight:600">PROJ</span>'
        : '<span style="font-size:8px;padding:1px 5px;background:rgba(255,159,10,.12);color:#cb8400;border-radius:3px;font-weight:600">MIXT</span>');
    let row = `<tr style="background:rgba(44,62,80,.08);font-weight:700;border-bottom:1px solid var(--sep)"><td style="font-weight:800;${partial?'font-style:italic':''}">${g.label}</td>`;
    if(has2025){
      row += `<td style="text-align:right;color:var(--sub)">${v25m > 0 ? fmt(v25m) : '—'}</td>`;
      row += `<td style="text-align:right;color:var(--sub)">${c25m > 0 ? fmt(c25m) : '—'}</td>`;
      row += `<td style="text-align:right;color:var(--sub);border-right:.5px solid var(--sep)">${r25m > 0 ? r25m+'%' : '—'}</td>`;
    }
    row += `<td style="text-align:right">${fmt(v26m)}</td>`;
    row += `<td style="text-align:right">${fmt(c26m)}</td>`;
    row += `<td style="text-align:right;color:${rc(r26m)};border-right:.5px solid var(--sep)">${r26m}%</td>`;
    row += `<td style="text-align:right;color:${dV_m != null ? (dV_m>=0?'var(--ok)':'var(--bad)') : 'var(--sub)'}">${dV_m != null ? (dV_m>=0?'+':'')+dV_m.toFixed(1)+'%' : '—'}</td>`;
    row += `<td style="text-align:right;color:${dR_m != null ? (dR_m<=0?'var(--ok)':'var(--bad)') : 'var(--sub)'}">${dR_m != null ? (dR_m>=0?'+':'')+dR_m.toFixed(1)+'pp' : '—'}</td>`;
    row += `<td style="text-align:center">${tag}</td></tr>`;
    tDet += row;
  }
  
  // 2) Total
  const dV_tot = tot_v_25 > 0 ? ((tot_v_26 - tot_v_25) / tot_v_25 * 100) : null;
  const r25_tot = tot_v_25 > 0 ? round1(tot_c_25 / tot_v_25 * 100) : null;
  const r26_tot = tot_v_26 > 0 ? round1(tot_c_26 / tot_v_26 * 100) : null;
  const dR_tot = (r25_tot != null && r26_tot != null) ? r26_tot - r25_tot : null;
  tDet += `<tr style="border-top:1.5px solid var(--accent);border-bottom:1.5px solid var(--accent);background:rgba(0,122,255,.06)">
    <td style="font-weight:800;color:var(--accent)">TY Total</td>`;
  if(has2025){
    tDet += `<td style="text-align:right;font-weight:700;color:var(--sub)">${fmt(tot_v_25)}</td>`;
    tDet += `<td style="text-align:right;font-weight:700;color:var(--sub)">${fmt(tot_c_25)}</td>`;
    tDet += `<td style="text-align:right;font-weight:700;color:var(--sub);border-right:.5px solid var(--sep)">${r25_tot != null ? r25_tot+'%' : '—'}</td>`;
  }
  tDet += `<td style="text-align:right;font-weight:800;color:var(--accent)">${fmt(tyV)}</td>`;
  tDet += `<td style="text-align:right;font-weight:800;color:var(--accent)">${fmt(tyC)}</td>`;
  tDet += `<td style="text-align:right;font-weight:800;color:${rc(tyR)};border-right:.5px solid var(--sep)">${tyR}%</td>`;
  tDet += `<td style="text-align:right;font-weight:700;color:${dV_tot != null ? (dV_tot>=0?'var(--ok)':'var(--bad)') : 'var(--sub)'}">${dV_tot != null ? (dV_tot>=0?'+':'')+dV_tot.toFixed(1)+'%' : '—'}</td>`;
  tDet += `<td style="text-align:right;font-weight:700;color:${dR_tot != null ? (dR_tot<=0?'var(--ok)':'var(--bad)') : 'var(--sub)'}">${dR_tot != null ? (dR_tot>=0?'+':'')+dR_tot.toFixed(1)+'pp' : '—'}</td>`;
  tDet += `<td></td></tr>`;
  
  // 3) Detall setmanal
  f.weekly_proj.forEach(w => {
    const isReal = w.source === 'real';
    const bg = isReal ? '' : 'background:rgba(0,122,255,.04)';
    const tag = isReal 
      ? '<span style="font-size:8px;padding:1px 5px;background:rgba(52,199,89,.12);color:var(--ok);border-radius:3px;font-weight:600">REAL</span>'
      : '<span style="font-size:8px;padding:1px 5px;background:rgba(0,122,255,.12);color:var(--accent);border-radius:3px;font-weight:600">PROJ</span>';
    const w25 = w2025_map[w.fw];
    const dV = w25 && w25.v > 0 ? ((w.v - w25.v) / w25.v * 100) : null;
    const dR = w25 && w25.r > 0 ? (w.r - w25.r) : null;
    let row = `<tr style="${bg}"><td style="font-weight:600;color:var(--sub)">fw${w.fw}</td>`;
    if(has2025){
      row += `<td style="text-align:right;color:var(--sub)">${w25 && w25.v ? fmt(w25.v) : '—'}</td>`;
      row += `<td style="text-align:right;color:var(--sub)">${w25 && w25.c ? fmt(w25.c) : '—'}</td>`;
      row += `<td style="text-align:right;color:var(--sub);border-right:.5px solid var(--sep)">${w25 && w25.r ? w25.r+'%' : '—'}</td>`;
    }
    row += `<td style="text-align:right;${isReal?'font-weight:600':''}">${fmt(w.v)}</td>`;
    row += `<td style="text-align:right">${fmt(w.c)}</td>`;
    row += `<td style="text-align:right;color:${rc(w.r)};font-weight:600;border-right:.5px solid var(--sep)">${w.r}%</td>`;
    row += `<td style="text-align:right;font-weight:600;color:${dV != null ? (dV>=0?'var(--ok)':'var(--bad)') : 'var(--sub)'}">${dV != null ? (dV>=0?'+':'')+dV.toFixed(1)+'%' : '—'}</td>`;
    row += `<td style="text-align:right;font-weight:600;color:${dR != null ? (dR<=0?'var(--ok)':'var(--bad)') : 'var(--sub)'}">${dR != null ? (dR>=0?'+':'')+dR.toFixed(1)+'pp' : '—'}</td>`;
    row += `<td style="text-align:center">${tag}</td></tr>`;
    tDet += row;
  });
  
  tDet += `</tbody></table>`;
  if(mesGroupsFC.some(g=>!g.complet)){
    tDet += `<div style="font-size:9px;color:var(--sub);font-style:italic;padding:4px 0">* Mes incomplet (no totes les setmanes del mes tenen dades disponibles)</div>`;
  }
  
  html += `<div class="card-scroll">
    <div class="ch"><span class="ct">📋 Detall setmanal · 2025 actual vs 2026 (real + projecció) fw1–fw52</span></div>
    <div class="cb" style="padding:6px 10px;overflow:auto;max-height:65vh">${tDet}</div>
  </div>`;
  
  return {html, chartData: {cgFcId, color, weekly: f.weekly_proj, lastRealFw: lastFw, has_full_2025: f.has_full_2025, locKey}};
}

// Helper: renderitzar el chart de Forecast amb 3 series (real 2026, proj 2026, real 2025)
function _renderForecastChart(chartData){
  const ctx = document.getElementById(chartData.cgFcId);
  if(!ctx) return;
  dk(chartData.cgFcId);
  
  const labels = chartData.weekly.map(w => 'fw' + w.fw);
  
  // Series 2026 real (fins lastRealFw)
  const data26Real = chartData.weekly.map(w => w.source === 'real' ? w.v : null);
  // Series 2026 proj (a partir de lastRealFw)
  const data26Proj = chartData.weekly.map(w => w.source !== 'real' ? w.v : null);
  
  // Connectar la transició: el primer valor proj agafa també l'últim real
  const lastRealIdx = chartData.weekly.findIndex(w => w.source !== 'real');
  if(lastRealIdx > 0) data26Proj[lastRealIdx - 1] = chartData.weekly[lastRealIdx - 1].v;
  
  const datasets = [
    {label:'Realitzat 2026', data:data26Real, borderColor:chartData.color, backgroundColor:'transparent', borderWidth:2.5, pointRadius:2.5, tension:.3, spanGaps:false},
    {label:'Projectat 2026', data:data26Proj, borderColor:chartData.color, backgroundColor:'transparent', borderWidth:2, borderDash:[6,3], pointRadius:1.5, tension:.3, spanGaps:false},
  ];
  
  // 2025 real (si tenim FY) — agafa de DV_HIST si existeix
  if(chartData.has_full_2025 && chartData.locKey !== 'GRUP' && typeof FORECAST !== 'undefined' && FORECAST[chartData.locKey] && FORECAST[chartData.locKey].ty_v_2025){
    // Reconstruir FY 2025 desde el backend (passat indirectament a través del weekly)
    // Per simplificar: agafem nomes les dades 2025 fw1-16 que tenim de DV_HIST
    if(typeof DV_HIST !== 'undefined' && DV_HIST[chartData.locKey]){
      const dv25 = DV_HIST[chartData.locKey];
      const map25 = {};
      dv25.fw_list.forEach((fw, i) => { map25[fw] = dv25.fw_vendes[i]; });
      const data25 = chartData.weekly.map(w => map25[w.fw] != null ? map25[w.fw] : null);
      datasets.push({label:'Real 2025 (fw1-16)', data:data25, borderColor:'#999', backgroundColor:'transparent', borderWidth:1.5, borderDash:[3,3], pointRadius:1, tension:.3, spanGaps:false});
    }
  }
  
  charts[chartData.cgFcId] = new Chart(ctx.getContext('2d'), {
    type:'line',
    data:{labels, datasets},
    options:{responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw!=null?fmt(ctx.raw)+'€':'—'}`}}},
      scales:{x:{grid:{display:false}, ticks:{font:{size:8}, maxRotation:0, autoSkip:true, maxTicksLimit:12}}, y:{grid:{color:'rgba(0,0,0,0.03)'}, ticks:{font:{size:8}, callback:v=>(v/1000).toFixed(0)+'k€'}}}
    }
  });
}

// Helper: panel resumit per un sol local 2025
function _renderLocPanelSingle(parentEl, loc, d, year){
  const idx = LOCS.indexOf(loc);

    </div>
  </div>`;
  
  // KPIs principals
  html += `<div class="krow k3" style="margin-bottom:8px">
    <div class="kpi"><div class="kl">Vendes netes</div><div class="kv" style="font-size:16px">${fmt(d.total_vendes)}€</div></div>
    <div class="kpi"><div class="kl">Cost personal</div><div class="kv" style="font-size:16px">${(d.total_cost/1000).toFixed(1)}k€</div></div>

  </div>`;
  
  // Mini taula vendes setmanals — ordre: mesos | Total | fw
  let tH = `<table class="dtbl"><thead><tr><th>fw / Mes</th><th>Vendes</th><th>Cost</th><th>Ràtio</th></tr></thead><tbody>`;
  const fwsNumsRL = fws.map(f => typeof f === 'number' ? f : parseInt(String(f).replace('fw','')));
  const yearRL = parseInt(year);
  const mesGroupsRL = mesGroupsForFws(fwsNumsRL, yearRL);
  
  // 1) Files mensuals
  for(const g of mesGroupsRL){
    let vm=0, cm=0;
    for(const fw of g.fws){
      const i = fwsNumsRL.indexOf(fw);
      if(i < 0) continue;
      vm += d.fw_vendes[i] || 0;
      cm += d.fw_cost[i] || 0;
    }
    const rm = vm > 0 ? round1(cm/vm*100) : 0;
    const partial = !g.complet;
    tH += `<tr style="background:rgba(44,62,80,.08);font-weight:700;border-bottom:1px solid var(--sep)">
      <td style="font-weight:800;${partial?'font-style:italic':''}">${g.label}</td>
      <td>${fmt(vm)}€</td>
      <td>${fmt(cm)}€</td>
      <td style="color:${rc(rm)}">${rm}%</td>
    </tr>`;
  }
  // 2) Total
  tH += `<tr style="border-top:1.5px solid var(--accent);border-bottom:1.5px solid var(--accent);background:rgba(0,122,255,.06)">
    <td style="font-weight:800;color:var(--accent)">Total</td>
    <td style="font-weight:800;color:var(--accent)">${fmt(d.total_vendes)}€</td>
    <td style="font-weight:800;color:var(--accent)">${fmt(d.total_cost)}€</td>
    <td style="font-weight:800;color:${rc(d.ratio)}">${pc(d.ratio)}</td>
  </tr>`;
  // 3) Detall fw
  fws.forEach((fw, i) => {
    const v = d.fw_vendes[i];
    const c = d.fw_cost[i];
    const r = d.fw_ratio[i];
    tH += `<tr><td style="font-weight:600;color:var(--sub)">${fw}</td><td>${fmt(v)}€</td><td>${fmt(c)}€</td><td style="color:${rc(r)};font-weight:600">${r}%</td></tr>`;
  });
  tH += `</tbody></table>`;
  if(mesGroupsRL.some(g=>!g.complet)){
    tH += `<div style="font-size:9px;color:var(--sub);font-style:italic;padding:4px 0">* Mes incomplet (no totes les setmanes del mes tenen dades disponibles)</div>`;
  }
  html += `<div class="card"><div class="ch"><span class="ct">Vendes/Cost setmanals · ${year}</span></div><div class="cb" style="padding:6px 8px;overflow-x:auto">${tH}</div></div>`;
  
  // Heatmap si existeix
  if(d.heatmap){
    const turns = Object.keys(d.heatmap);
    const dies = ['Dl','Dt','Dc','Dj','Dv','Ds','Dg'];
    let tH2 = `<table class="dtbl" style="font-size:10px"><thead><tr><th>Torn</th>${dies.map(d=>`<th>${d}</th>`).join('')}<th>Total</th></tr></thead><tbody>`;
    let totV = 0; const totDia = [0,0,0,0,0,0,0];
    turns.forEach(t => {
      const row = d.heatmap[t];
      const tot = row.reduce((a,b)=>a+b,0);
      totV += tot;
      row.forEach((v,i) => totDia[i] += v);
      if(tot === 0) return;  // amaga torns buits (Picu Sabadell matí/tarda)
      tH2 += `<tr><td style="font-weight:600">${t}</td>`;
      row.forEach((v,i) => {
        // Color heatmap: del cel a vermell segons valor
        const max = Math.max(...turns.flatMap(tt=>d.heatmap[tt]));
        const intensity = max > 0 ? v/max : 0;
        const bg = `rgba(31,56,100,${intensity*0.7})`;
        const fg = intensity > 0.5 ? '#fff' : 'var(--text)';
        tH2 += `<td style="background:${bg};color:${fg};text-align:center">${v>0?fmt(v):'—'}</td>`;
      });
      tH2 += `<td style="font-weight:700">${fmt(tot)}</td></tr>`;
    });
    tH2 += `<tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,.02)">
      <td style="font-weight:700">Total</td>${totDia.map(v=>`<td style="font-weight:700;text-align:center">${fmt(v)}</td>`).join('')}<td style="font-weight:700">${fmt(totV)}</td>
    </tr></tbody></table>`;
    html += `<div class="card-scroll"><div class="ch"><span class="ct">Heatmap vendes torn × dia · ${year}</span></div><div class="cb" style="padding:6px 8px;overflow-x:auto">${tH2}</div></div>`;
  }
  
  // Top/Bottom 5
  if(d.top5 && d.top5.length){
    let tT = '<table class="dtbl"><thead><tr><th>Data</th><th>Dia</th><th>Vendes</th><th>Ràtio</th></tr></thead><tbody>';
    d.top5.forEach(r => {
      tT += `<tr><td>${r.data}</td><td style="color:var(--sub)">${r.dia}</td><td style="font-weight:700">${fmt(r.v)}€</td><td style="color:${rc(r.r)};font-weight:600">${r.r}%</td></tr>`;
    });
    tT += '</tbody></table>';
    html += `<div class="card"><div class="ch"><span class="ct">🏆 Top 5 dies · ${year}</span></div><div class="cb" style="padding:4px 10px">${tT}</div></div>`;
  }
  if(d.bottom5 && d.bottom5.length){
    let tB = '<table class="dtbl"><thead><tr><th>Data</th><th>Dia</th><th>Vendes</th><th>Ràtio</th></tr></thead><tbody>';
    d.bottom5.forEach(r => {
      tB += `<tr><td>${r.data}</td><td style="color:var(--sub)">${r.dia}</td><td style="font-weight:700">${fmt(r.v)}€</td><td style="color:${rc(r.r)};font-weight:600">${r.r}%</td></tr>`;
    });
    tB += '</tbody></table>';
    html += `<div class="card"><div class="ch"><span class="ct">📉 Bottom 5 dies · ${year}</span></div><div class="cb" style="padding:4px 10px">${tB}</div></div>`;
  }
  
  parentEl.innerHTML = html;
}

function renderLocDetail2026(year){
  // year='2026' (default) o '2025'. Aliasem dades segons l'any per reusar el mateix codi.
  year = year || '2026';
  const _DV = (year === '2025') ? (typeof DV_HIST !== 'undefined' ? DV_HIST : {}) : DV;
  const _LOCS = LOCS.filter(l => _DV[l]);  // només locals amb dades a aquest any
  // GRUP_* recalculats segons any
  let _GRUP_V, _GRUP_C, _GRUP_RATIO, _GRUP_ACUM;
  if(year === '2025'){
    if(_LOCS.length === 0){
      document.getElementById('loc-detail').innerHTML = `<div style="padding:30px;text-align:center;color:var(--sub)">No hi ha dades 2025</div>`;
      return;
    }
    const NW = _DV[_LOCS[0]].fw_list.length;
    _GRUP_V = Array(NW).fill(0).map((_,i) => _LOCS.reduce((s,l)=>s+(_DV[l].fw_vendes[i]||0), 0));
    _GRUP_C = Array(NW).fill(0).map((_,i) => _LOCS.reduce((s,l)=>s+(_DV[l].fw_cost[i]||0), 0));
    _GRUP_RATIO = _GRUP_V.map((v,i) => v>0 ? round1(_GRUP_C[i]/v*100) : 0);
    let av=0, ac=0;
    _GRUP_ACUM = _GRUP_V.map((v,i) => { av+=v; ac+=_GRUP_C[i]; return av>0 ? round1(ac/av*100) : 0; });
  } else {
    _GRUP_V = GRUP_V; _GRUP_C = GRUP_C; _GRUP_RATIO = GRUP_RATIO; _GRUP_ACUM = GRUP_ACUM;
  }
  
  if(curLoc==='TOTAL'){
    const totV=_LOCS.reduce((s,l)=>s+(_DV[l]?_DV[l].total_vendes:0),0);

      tw+=`<td class="mes-col" style="background:rgba(44,62,80,.05);color:${rc(r)};border-left:1.5px solid var(--sep);border-right:1.5px solid var(--sep);${isPart?'font-style:italic;opacity:.85':''}">${r}%</td>`;
    });
    tw+=`<td class="tot-col" style="color:${rc(d.ratio)};font-weight:700">${pc(d.ratio)}</td>`;
    d.fw_ratio_acum.forEach(r=>tw+=`<td style="color:${rc(r)}">${r}%</td>`);
    tw+=`</tr>`;
    tw+='</tbody></table>';
    if(groupsLM.some(g=>!g.complet)){
      tw += `<div style="font-size:9px;color:var(--sub);font-style:italic;padding:4px 0">* Mes incomplet (no totes les setmanes del mes tenen dades disponibles)</div>`;
    }
    document.getElementById('lm-taula').innerHTML=tw;

    dk('cld');
    charts['cld']=new Chart(document.getElementById('c-ld').getContext('2d'),{
      type:'bar',
      data:{labels:DIES,datasets:[
        {type:'bar',label:'Vendes',data:d.avg_dia_vendes,backgroundColor:DIES.map((_,i)=>i>=4?col+'ee':col+'66'),borderRadius:4,borderSkipped:false,yAxisID:'y'},
        {type:'line',label:'Ràtio %',data:d.avg_dia_ratio,borderColor:'#ff9f0a',backgroundColor:'transparent',borderWidth:2.5,pointRadius:4,pointBackgroundColor:d.avg_dia_ratio.map(r=>rc(r)),tension:.3,yAxisID:'y2'},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'bottom',labels:{font:{size:9},boxWidth:9,padding:4}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label==='Ràtio %'?`Ràtio: ${ctx.raw}%`:`Vendes: ${fmt(ctx.raw)}€`}}},
        scales:{x:{grid:{display:false},ticks:{font:{size:10}},categoryPercentage:0.6,barPercentage:0.8},y:{position:'left',grid:{color:'rgba(0,0,0,0.03)'},ticks:{font:{size:8},callback:v=>fmt(v)+'€'}},y2:{position:'right',grid:{display:false},ticks:{font:{size:8},callback:v=>v+'%'},min:20}}
      }
    });

    const hm=d.heatmap;
    const ta=TORNS_V.filter(t=>hm[t]&&hm[t].some(v=>v>0));
    const totPerDia=DIES.map((_,di)=>ta.reduce((s,t)=>s+(hm[t][di]||0),0));
    const totGeneral=totPerDia.reduce((a,b)=>a+b,0);
    let tdT=`<table class="dtbl"><thead><tr><th>Torn</th>${DIES.map(di=>`<th>${di}</th>`).join('')}<th class="tot-col">Total</th></tr></thead><tbody>`;
    ta.forEach(t=>{
      const totT=hm[t].reduce((a,b)=>a+b,0);
      tdT+=`<tr><td style="color:${col};font-weight:700">${t}</td>`;
      hm[t].forEach(v=>tdT+=`<td>${v>0?fmt(v)+'€':'—'}</td>`);
      tdT+=`<td class="tot-col" style="font-weight:700">${fmt(totT)}€</td></tr>`;
    });
    tdT+=`<tr class="row-total" style="border-top:.5px solid var(--sep)"><td style="font-weight:700">Total</td>`;
    totPerDia.forEach(v=>tdT+=`<td style="font-weight:700">${fmt(v)}€</td>`);
    tdT+=`<td class="tot-col" style="font-weight:700">${fmt(totGeneral)}€</td></tr>`;
    tdT+=ratioGrid(d);
    tdT+='</tbody></table>';
    document.getElementById('ld-taula').innerHTML=tdT;
  },50);
}

function ratioGrid(d){
  const avgRatio=d.avg_dia_ratio.reduce((a,b)=>a+b,0)/d.avg_dia_ratio.length;
  const cells=d.avg_dia_ratio.map(r=>`<td style="padding:3px 2px;text-align:center;font-weight:700;color:${rc(r)};background:${rcbg(r)}">${r.toFixed(1)}%</td>`).join('');
  return`<tr style="border-top:1px solid var(--sep)"><td style="padding:3px 2px;font-weight:600;font-size:9px;color:var(--sub)">Ràtio P/V</td>${cells}<td class="tot-col" style="font-weight:700;color:${rc(avgRatio)};background:${rcbg(avgRatio)};text-align:center">${avgRatio.toFixed(1)}%</td></tr>`;
}

function topRows(rows,bad){
  return rows.map(r=>`<div class="day-row">
    <div style="display:flex;justify-content:space-between">
      <span style="font-size:12px;font-weight:700">${r.data} <span style="color:var(--sub);font-size:10px">${r.dia}</span></span>
      <span style="font-size:12px;font-weight:700">${fmt(r.v)}€</span>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:1px">
      <span style="font-size:10px;color:var(--sub)">${CTX[r.data]||''}</span>
      <span style="font-size:11px;font-weight:600;color:${bad?'var(--bad)':rc(r.r)}">${r.r}%</span>
    </div>
  </div>`).join('');
}

  // KPIs cost / ràtio
  const dCost = p25.tot_cost>0 ? ((p26.tot_cost-p25.tot_cost)/p25.tot_cost*100) : 0;
  const dRatio = ratio26 - ratio25;
  html += `<div class="krow k2" style="margin-bottom:8px">

  // Hores per torn comparatiu (cuina + sala) - columnes separades
  const torns = ['Matí','Migdia','Tarda','Nit'];
  let tT = `<table class="dtbl" style="font-size:10px;width:100%"><thead><tr>

    <th style="text-align:right">2026</th><th style="text-align:right">2025</th><th style="text-align:right">Δ</th>
  </tr></thead><tbody>`;
  torns.forEach(t => {
    const c26 = p26.torn_coc[t]||0; const c25 = p25.torn_coc[t]||0;
    const s26 = p26.torn_sal[t]||0; const s25 = p25.torn_sal[t]||0;
    const t26 = c26+s26; const t25 = c25+s25;
    if(t26===0 && t25===0) return;
    tT += `<tr>

  });
  tT += `<tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,.03)">
    <td style="font-weight:700">Total</td>
    <td style="text-align:right;font-weight:700">${fmt(p26.tot_hcoc)}h</td>
    <td style="text-align:right;color:var(--sub);font-weight:600">${fmt(p25.tot_hcoc)}h</td>
    <td style="text-align:right">${_deltaInline(p26.tot_hcoc, p25.tot_hcoc, false, false)}</td>
    <td style="text-align:right;font-weight:700">${fmt(p26.tot_hsal)}h</td>
    <td style="text-align:right;color:var(--sub);font-weight:600">${fmt(p25.tot_hsal)}h</td>
    <td style="text-align:right">${_deltaInline(p26.tot_hsal, p25.tot_hsal, false, false)}</td>
    <td style="text-align:right;font-weight:700">${fmt(p26.tot_h)}h</td>
    <td style="text-align:right;color:var(--sub);font-weight:600">${fmt(p25.tot_h)}h</td>
    <td style="text-align:right">${_deltaInline(p26.tot_h, p25.tot_h, false, false)}</td>
  </tr></tbody></table>`;
  html += `<div class="card-scroll"><div class="ch"><span class="ct">Hores per torn · Cuina/Sala · 2026 vs 2025</span></div><div class="cb" style="padding:6px 10px;overflow-x:auto">${tT}</div></div>`;
  
  // Hores setmanals comparatives - columnes separades — ordre: mesos | Total | fw
  let tS = `<table class="dtbl" style="font-size:10px;width:100%"><thead><tr>
    <th rowspan="2">fw / Mes</th>
    <th colspan="3" style="text-align:center;background:rgba(31,56,100,.05)">H.Cuina</th>
    <th colspan="3" style="text-align:center;background:rgba(31,56,100,.05)">H.Sala</th>
    <th colspan="3" style="text-align:center;background:rgba(0,0,0,.04)">H.Total</th>
    <th colspan="3" style="text-align:center;background:rgba(0,0,0,.04)">Cost</th>
  </tr><tr>
    <th style="text-align:right">2026</th><th style="text-align:right">2025</th><th style="text-align:right">Δ</th>
    <th style="text-align:right">2026</th><th style="text-align:right">2025</th><th style="text-align:right">Δ</th>
    <th style="text-align:right">2026</th><th style="text-align:right">2025</th><th style="text-align:right">Δ</th>
    <th style="text-align:right">2026</th><th style="text-align:right">2025</th><th style="text-align:right">Δ</th>
  </tr></thead><tbody>`;
  
  const fwsNumsPP = fws.map(f => typeof f === 'number' ? f : parseInt(String(f).replace('fw','')));
  const mesGroupsPP = mesGroupsForFws(fwsNumsPP, 2026);
  
  // 1) Files mensuals
  for(const g of mesGroupsPP){
    let hc26m=0,hc25m=0,hs26m=0,hs25m=0,ht26m=0,ht25m=0,c26m=0,c25m=0;
    for(const fw of g.fws){
      const i = fwsNumsPP.indexOf(fw);
      if(i < 0) continue;
      hc26m += p26.fw_hcoc[i]||0; hc25m += (p25.fw_hcoc && p25.fw_hcoc[i])||0;
      hs26m += p26.fw_hsal[i]||0; hs25m += (p25.fw_hsal && p25.fw_hsal[i])||0;
      ht26m += p26.fw_htot[i]||0; ht25m += (p25.fw_htot && p25.fw_htot[i])||0;
      c26m  += p26.fw_cost_p[i]||0; c25m  += (p25.fw_cost_p && p25.fw_cost_p[i])||0;
    }
    const partial = !g.complet;
    tS += `<tr style="background:rgba(44,62,80,.08);font-weight:700;border-bottom:1px solid var(--sep)">

    <td style="text-align:right;font-weight:800;color:var(--accent)">${fmt(p26.tot_hcoc)}h</td>
    <td style="text-align:right;color:var(--sub);font-weight:600">${fmt(p25.tot_hcoc)}h</td>
    <td style="text-align:right">${_deltaInline(p26.tot_hcoc, p25.tot_hcoc, false, false)}</td>
    <td style="text-align:right;font-weight:800;color:var(--accent)">${fmt(p26.tot_hsal)}h</td>

    <td style="text-align:right;color:var(--sub);font-weight:600">${(p25.tot_cost/1000).toFixed(1)}k€</td>
    <td style="text-align:right">${_deltaInline(p26.tot_cost, p25.tot_cost, false, false)}</td>
  </tr>`;
  // 3) Detall fw
  fws.forEach((fw, i) => {
    const hc26 = p26.fw_hcoc[i]||0; const hc25 = (p25.fw_hcoc && p25.fw_hcoc[i])||0;

      <td style="text-align:right;color:var(--sub)">${ht25}h</td>
      <td style="text-align:right">${_deltaInline(ht26, ht25, false, false)}</td>

      <td style="text-align:right">${_deltaInline(c26, c25, false, false)}</td>
    </tr>`;
  });
  tS += `</tbody></table>`;
  if(mesGroupsPP.some(g=>!g.complet)){
    tS += `<div style="font-size:9px;color:var(--sub);font-style:italic;padding:4px 0">* Mes incomplet (no totes les setmanes del mes tenen dades disponibles)</div>`;
  }
  html += `<div class="card-scroll"><div class="ch"><span class="ct">Hores i cost setmanals · 2026 vs 2025</span></div><div class="cb" style="padding:6px 10px;overflow:auto;max-height:65vh">${tS}</div></div>`;
  
  // Absències comparatives (si tots dos anys en tenen)
  if(p26.absencies && p25.absencies){
    const a26 = p26.absencies; const a25 = p25.absencies;
    let tA = `<table class="dtbl" style="font-size:10px"><thead><tr>
      <th>Tipus</th>
      <th style="text-align:right">Hores</th>
      <th style="text-align:right">Cost</th>
    </tr></thead><tbody>`;
    if(a26.tot_baixa>0 || a25.tot_baixa>0){
      tA += `<tr><td>Baixa malaltia</td>
        <td>${_cmpCell(a26.tot_baixa, a25.tot_baixa, {unit:'h', higherBetter:false})}</td>

  }
  
  // Gràfic comparatiu hores/cost setmanal
  const cphCmpId = `cph-cmp-${idx}-${loc.replace(/\s+/g,'')}`;
  html += `<div class="card-scroll">
    <div class="ch"><span class="ct">Hores i cost personal setmanal · 2025 vs 2026</span></div>
    <div class="cb" style="padding:6px 4px 8px">
      <div class="cw" style="height:280px"><canvas id="${cphCmpId}"></canvas></div>
    </div>
  </div>`;
  
  if(container){
    container._charts = container._charts || [];
    container._charts.push({cphCmpId, loc, fws, p26, p25, col});
  }
  
  return html;
}

            {type:'line', label:'Cost 2026', data:c.p26.fw_cost_p, borderColor:c.col, backgroundColor:'transparent', borderWidth:2.5, pointRadius:3, tension:.3, yAxisID:'yC', order:1},

          options:{responsive:true, maintainAspectRatio:false,

              tooltip:{callbacks:{label:ctx=>{
                const v = ctx.raw;

                return `${ctx.dataset.label}: ${fmt(v)}€`;

              yH:{position:'left', title:{display:true,text:'Hores',font:{size:9}}, grid:{color:'rgba(0,0,0,0.03)'}, ticks:{font:{size:9},callback:v=>fmt(v)+'h'}, beginAtZero:true},
              yC:{position:'right', title:{display:true,text:'Cost €',font:{size:9}}, grid:{display:false}, ticks:{font:{size:9},callback:v=>fmt(v)+'€'}, beginAtZero:true}

        });

    });
  }, 50);
}

    el.innerHTML = `<div style="padding:30px;text-align:center;color:var(--sub)">Forecast no disponible</div>`;
    return;
  }

    <div class="kpi">
      <div class="kl">TY Cost personal</div>
      <div class="kv" style="font-size:16px">${(tyC/1000).toFixed(0)}k€</div>
      <div style="font-size:9px;color:var(--sub)">Realitzat ${(f.ty_c_real/1000).toFixed(0)}k + proj ${(f.ty_c_proj/1000).toFixed(0)}k</div>
    </div>
    <div class="kpi">
      <div class="kl">TY Ràtio P/V</div>
      <div class="kv ${sf(tyR)}" style="font-size:16px">${pc(tyR)} ${si(tyR)}</div>
      <div style="font-size:9px;color:var(--sub)">${tyV>0?'sobre '+(tyV/1000).toFixed(0)+'k€ vendes':'—'}</div>
    </div>
  </div>`;
  
  // Pròximes 4 setmanes (projecció hores i cost)
  let t4 = `<table class="dtbl" style="font-size:11px;width:100%">
    <thead><tr>
      <th>Setm.</th>
      <th style="text-align:right">Hores proj.</th>
      <th style="text-align:right">Cost proj.</th>
      <th style="text-align:right">Vendes proj.</th>
      <th style="text-align:right">Ràtio</th>
    </tr></thead><tbody>`;
