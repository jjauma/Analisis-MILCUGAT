];

let SESSION = null;

function initAuth(){
  const saved = localStorage.getItem('mg_session');
  if(saved){
    try{
      const s = JSON.parse(saved);
      const u = USERS.find(u=>u.pin===s.pin && u.nom===s.nom);
      if(u){ SESSION=u; applySession(); return; }
    }catch(e){}
  }
  document.getElementById('login-overlay').style.display='flex';
}

function doLogin(){
  const pin = document.getElementById('login-pin').value.trim();
  const u = USERS.find(u=>u.pin===pin);
  if(!u){ document.getElementById('login-error').textContent='PIN incorrecte'; return; }
  localStorage.setItem('mg_session', JSON.stringify({pin:u.pin,nom:u.nom}));
  SESSION = u;
  document.getElementById('login-overlay').style.display='none';
  applySession();
}

function doLogout(){
  localStorage.removeItem('mg_session');
  SESSION=null;
  location.reload();
}

function applySession(){
  const u = SESSION;
  document.getElementById('user-label').textContent = u.nom;
  ['resum','locals','personal','productes'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    if(el) el.style.display = u.tabs.includes(t)?'':'none';
  });
  if(u.local){ curLoc = u.local; curPer = u.local; }
  const primera = u.tabs[0];
  showPage(primera);
  if(!u.local) renderResum();
}

function ratioGrid(d){
  const avgRatio=d.avg_dia_ratio.reduce((a,b)=>a+b,0)/d.avg_dia_ratio.length;
  const cells=d.avg_dia_ratio.map(r=>`<td style="padding:3px 2px;text-align:center;font-weight:700;color:${rc(r)};background:${rcbg(r)}">${r.toFixed(1)}%</td>`).join('');
  return`<tr style="border-top:1px solid var(--sep)"><td style="padding:3px 2px;font-weight:600;font-size:9px;color:var(--sub)">Ràtio P/V</td>${cells}<td class="tot-col" style="font-weight:700;color:${rc(avgRatio)};background:${rcbg(avgRatio)};text-align:center">${avgRatio.toFixed(1)}%</td></tr>`;
}

function topRows(rows,bad){
  return rows.map(r=>`<div class="day-row">
    <div style="display:flex;justify-content:space-between">
      <span style="font-size:12px;font-weight:700">${r.data} <span style="color:var(--sub);font-size:10px">${r.dia}</span></span>
      <span style="font-size:12px;font-weight:700">${fmt(r.v)}€</span>

    <div style="display:flex;justify-content:space-between;margin-top:1px">

      <span style="font-size:11px;font-weight:600;color:${bad?'var(--bad)':rc(r.r)}">${r.r}%</span>
    </div>
  </div>`).join('');
}

    th+='</tbody></table>';

      type:'bar',
      data:{labels:DIES,datasets:[
        {label:'Cuina',data:p.avg_dia_hcoc,backgroundColor:col+'cc',borderRadius:3,borderSkipped:false,stack:'h'},
        {label:'Sala',data:p.avg_dia_hsal,backgroundColor:col+'55',borderRadius:3,borderSkipped:false,stack:'h'},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'bottom',labels:{font:{size:9},boxWidth:9,padding:5}}},
        scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:10}},categoryPercentage:0.6,barPercentage:0.8},y:{stacked:true,grid:{color:'rgba(0,0,0,0.03)'},ticks:{font:{size:8},callback:v=>v+'h'}}}
      }

  },50);
}

function lvRender(sec, unit, loc, col){
  const el = document.getElementById('lv-taula');
  if(!el || !LD.locals[loc]) return;
  const d = LD.locals[loc];
  const fws = LD.weeks.map(w=>'fw'+w);
  const isEur = unit==='eur';

  let items, dataObj, mitjaObj;
  if(sec==='fam'){
    items = d.fam.order;
    dataObj = isEur ? d.fam.eur : d.fam.uni;
    mitjaObj = isEur ? d.fam.mitja_eur : d.fam.mitja_uni;
  } else {
    const secMap = {men:'MENJAR',pos:'POSTRES',beg:'BEGUDES'};
    const s = secMap[sec];
    items = d.art[s].order;
    dataObj = isEur ? d.art[s].eur : d.art[s].uni;
    mitjaObj = isEur ? d.art[s].mitja_eur : d.art[s].mitja_uni;
  }

  function cellColor(val, mitja){
    if(mitja===0) return '';
    const p = (val-mitja)/mitja;
    if(p>0.20) return 'background:#2E7D32;color:#fff';
    if(p>0.10) return 'background:#81C784;color:#1B5E20';
    if(p>=-0.10) return 'background:#FFF9C4;color:#5D4037';
    if(p>=-0.20) return 'background:#FFB74D;color:#4E2600';
    return 'background:#C62828;color:#fff';
  }
  function wkCol(w){ return w<=4?'#1A5276':w<=9?'#1A7A5E':'#5B3A8C'; }

  const MITJA_LEFT = 130, ACUM_LEFT = 176;
  let tbl = `<table style="border-collapse:collapse;font-size:9px;width:100%">
    <thead><tr>
      <th style="text-align:left;padding:3px 6px;position:sticky;left:0;z-index:3;background:#fff;min-width:130px;font-size:8px;color:var(--sub)">Article / Família</th>
      <th style="padding:3px 4px;text-align:right;font-size:8px;color:var(--sub);white-space:nowrap;position:sticky;left:${MITJA_LEFT}px;z-index:3;background:#fff;border-right:.5px solid var(--sep)">Mitja/fw</th>
      <th style="padding:3px 4px;text-align:right;font-size:8px;color:var(--sub);white-space:nowrap;position:sticky;left:${ACUM_LEFT}px;z-index:3;background:#f5f5f7;min-width:50px;border-right:1px solid var(--sep)">Acum.</th>`;
  fws.forEach((fw,i)=>{ tbl+=`<th style="padding:2px 3px;text-align:right;background:${wkCol(LD.weeks[i])};color:#fff;font-size:8px;min-width:28px">${fw}</th>`; });
  tbl+=`</tr></thead><tbody>`;

  items.forEach((item,ri)=>{
    const vals = dataObj[item] || [];
    const mitja = mitjaObj[item] || 0;
    const acum = vals.reduce((a,b)=>a+b,0);
    const bgCol = ri%2===0?'#fff':'#f8f8f8';
    const bgAcum = ri%2===0?'#f5f5f7':'#ececf0';
    tbl+=`<tr><td style="padding:3px 6px;font-weight:600;font-size:8.5px;position:sticky;left:0;z-index:2;background:${bgCol};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px">${item}</td>`;
    tbl+=`<td style="padding:3px 4px;text-align:right;font-weight:700;font-size:8px;position:sticky;left:${MITJA_LEFT}px;z-index:2;background:${bgCol};border-right:.5px solid var(--sep)">${isEur?fmt(Math.round(mitja))+'€':fmt(Math.round(mitja))}</td>`;
    tbl+=`<td style="padding:3px 4px;text-align:right;font-weight:700;font-size:8px;position:sticky;left:${ACUM_LEFT}px;z-index:2;background:${bgAcum};border-right:1px solid var(--sep)">${isEur?fmt(Math.round(acum))+'€':fmt(Math.round(acum))}</td>`;
    vals.forEach((v,wi)=>{
      const style = cellColor(v, mitja);
      tbl+=`<td style="padding:2px 3px;text-align:right;font-size:8px;${style}">${isEur?fmt(Math.round(v))+'€':fmt(v)}</td>`;
    });
    tbl+=`</tr>`;
  });

  if(isEur){
    if(sec!=='fam'){
      const secKey = {men:'MENJAR',pos:'POSTRES',beg:'BEGUDES'}[sec];
      const locIdx = LOCS.indexOf(loc);
      const k = ['sar','sbd','psb','psc'][locIdx] || 'sar';
      const pct = PD.cov[k+'_'+secKey]||0;
      const cls = pct>=85?'ok':pct>=70?'warn':'bad';
      tbl+=`<tr style="border-top:1px solid var(--sep);background:rgba(0,0,0,.03)">
        <td style="position:sticky;left:0;z-index:2;background:rgba(245,245,245,1);padding:3px 6px;font-size:8px;font-weight:600;color:var(--sub)">% cobertura ≥100€/fw</td>
        <td style="position:sticky;left:${MITJA_LEFT}px;z-index:2;background:rgba(240,240,240,1);text-align:right;font-size:9px;font-weight:700;color:var(--${cls});border-right:.5px solid var(--sep)">${pct}%</td>
        <td style="position:sticky;left:${ACUM_LEFT}px;z-index:2;background:rgba(236,236,240,1);border-right:1px solid var(--sep)"></td>
        <td colspan="${fws.length}" style="font-size:8px;color:var(--sub);padding:3px 6px">articles ≥100€/fw de mitjana</td>
      </tr>`;
    } else {
      const locIdx = LOCS.indexOf(loc);
      const k = ['sar','sbd','psb','psc'][locIdx] || 'sar';
      [['MENJAR','🍽'],['POSTRES','🍮'],['BEGUDES','🍺']].forEach(([secKey,ic])=>{
        const pct = PD.cov[k+'_'+secKey]||100;
        const cls = pct>=85?'ok':pct>=70?'warn':'bad';
        tbl+=`<tr style="background:rgba(0,0,0,.02)">
          <td style="position:sticky;left:0;z-index:2;background:rgba(248,248,248,1);padding:3px 6px;font-size:8px;color:var(--sub)">${ic} Cob. ${secKey.charAt(0)+secKey.slice(1).toLowerCase()}</td>
          <td style="position:sticky;left:${MITJA_LEFT}px;z-index:2;background:rgba(245,245,245,1);text-align:right;font-size:9px;font-weight:700;color:var(--${cls});border-right:.5px solid var(--sep)">${pct}%</td>
          <td style="position:sticky;left:${ACUM_LEFT}px;z-index:2;background:rgba(242,242,242,1);border-right:1px solid var(--sep)"></td>
          <td colspan="${fws.length}"></td>
        </tr>`;
      });
    }
  }

  tbl+=`</tbody></table>`;
  el.innerHTML = tbl;
}

function renderProdArticles(){
  if(typeof _artUnit==='undefined') window._artUnit='eur';
  const isEur=_artUnit==='eur';
  const visLocs = (SESSION&&SESSION.local) ? PROD_LOCS.filter(l=>l===SESSION.local) : PROD_LOCS;
  const visKeys = visLocs.map(l=>PROD_KEYS[PROD_LOCS.indexOf(l)]);
  const visCols = visLocs.map(l=>PROD_COLS[l]);
  const visShort = visLocs.map(l=>PROD_SHORT[l]);
  function covClass(pct){return pct>=85?'ok':pct>=70?'warn':'bad';}
  function artRows(list, secKey){
    const secTotal=list.reduce((s,a)=>s+a.tot,0);
    const maxTot=list[0]?.tot||1;
    const rows=list.map(a=>{
      const pctTot=secTotal>0?Math.round(a.tot/secTotal*100):0;
      const bars=visLocs.map((l,i)=>{const v=a[visKeys[i]];if(!v)return'';return`<div style="width:${Math.round(v/maxTot*100)}%;background:${visCols[i]}99;height:100%"></div>`;}).join('');
      let vals;
      if(isEur){
        vals=visLocs.map((l,i)=>`<td style="text-align:right;font-size:8px;color:${visCols[i]}">${a[visKeys[i]]>0?fmt(a[visKeys[i]])+'€':'—'}</td>`).join('');
      } else {
        vals=visLocs.map((l,i)=>{
          const d=LD&&LD.locals[l];
          let uni=null;
          if(d){
            for(const s2 of ['MENJAR','POSTRES','BEGUDES']){
              if(d.art&&d.art[s2]&&d.art[s2].mitja_uni&&d.art[s2].mitja_uni[a.art]!==undefined){
                uni=Math.round(d.art[s2].mitja_uni[a.art]);break;
              }
            }
          }
          return`<td style="text-align:right;font-size:8px;color:${visCols[i]}">${uni!==null?uni:'—'}</td>`;
        }).join('');
      }
      const totVal=isEur?fmt(a.tot)+'€':'—';
      return`<tr>
        <td style="max-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:9px;font-weight:600">${a.art}</td>
        ${vals}
        <td style="padding:3px 4px;min-width:40px"><div style="display:flex;height:8px;border-radius:3px;overflow:hidden;background:#eee">${bars}</div></td>
        <td style="text-align:right;font-weight:700;font-size:9px">${totVal}</td>
        <td style="text-align:right;font-size:8px;color:var(--sub)">${pctTot}%</td>
      </tr>`;
    }).join('');
    const covVals=visLocs.map((l,i)=>{const p=PD.cov[visKeys[i]+'_'+secKey]||0;const c=covClass(p);return`<td style="text-align:right;font-size:9px;font-weight:700;color:var(--${c})">${p}%</td>`;}).join('');
    const covRow=`<tr style="border-top:1px solid var(--sep);background:rgba(0,0,0,.03)">
      <td style="font-size:8px;font-weight:600;color:var(--sub)">% cobertura ≥100€/fw</td>
      ${covVals}<td></td><td></td><td></td></tr>`;
    return rows+covRow;
  }
  const locHdrs=visLocs.map((l,i)=>`<th style="color:${visCols[i]};font-size:8px;min-width:44px;width:44px;text-align:right">${visShort[i]}</th>`).join('');
  const legend=visLocs.map((l,i)=>`<span style="font-size:8px;color:${visCols[i]};font-weight:600">■ ${visShort[i]}</span>`).join(' ');
  const ctrlBar=`<div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap">
    <div style="display:flex;gap:3px">
      <button class="sb${isEur?' active':''}" onclick="setArtUnit('eur')">\u20AC Euros</button>
      <button class="sb${!isEur?' active':''}" onclick="setArtUnit('uni')">Unitats</button>
    </div>
  </div>`;
  const seccions=[{label:'🍽 Menjar',list:PD.top_menjar,key:'MENJAR',color:'#1A3A5C'},{label:'🍮 Postres',list:PD.top_postres,key:'POSTRES',color:'#6E2F1A'},{label:'🍺 Begudes',list:PD.top_begudes,key:'BEGUDES',color:'#1A5C3A'}];
  return seccions.map((s,i)=>`
    <div class="card" style="margin-top:${i===0?4:0}px">
      <div class="ch" style="flex-direction:column;align-items:flex-start;gap:4px">
        <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
          <span class="ct" style="color:${s.color}">${s.label} · mitja setmanal</span>
          ${i===0?ctrlBar:''}
        </div>
        <div style="font-size:8px;color:var(--sub)">${legend}</div>
      </div>
      <div class="cb" style="padding:4px 8px 8px;overflow-x:auto">
        <table class="dtbl" style="width:100%;table-layout:fixed">
          <thead><tr>
            <th style="text-align:left;width:120px">Article</th>
            ${locHdrs}
            <th style="min-width:30px"></th>
            <th style="min-width:44px;text-align:right">Total</th>
            <th style="min-width:32px;text-align:right;color:var(--sub)">%</th>
          </tr></thead>
          <tbody>${artRows(s.list,s.key)}</tbody>
        </table>
      </div>
    </div>`).join('');
}

function renderProdFamilies(){
  if(typeof _famUnit==='undefined') window._famUnit='eur';
  const isEur=_famUnit==='eur';
  const visLocs = (SESSION&&SESSION.local) ? PROD_LOCS.filter(l=>l===SESSION.local) : PROD_LOCS;
  const visKeys = visLocs.map(l=>PROD_KEYS[PROD_LOCS.indexOf(l)]);
  const visCols = visLocs.map(l=>PROD_COLS[l]);
  const visShort = visLocs.map(l=>PROD_SHORT[l]);
  const maxVal=Math.max(...PD.fam_comp.map(f=>visLocs.reduce((s,l,i)=>s+f[visKeys[i]],0)));
  const totPerLoc=visLocs.map((l,i)=>PD.fam_comp.reduce((s,f)=>s+f[visKeys[i]],0));
  const totGeneral=PD.fam_comp.reduce((s,f)=>s+visLocs.reduce((ss,l,i)=>ss+f[visKeys[i]],0),0);
  const rows=PD.fam_comp.map(f=>{
    const tot=visLocs.reduce((s,l,i)=>s+f[visKeys[i]],0);
    const pctTotal=totGeneral>0?Math.round(tot/totGeneral*100):0;
    const bars=visLocs.map((l,i)=>{const v=f[visKeys[i]];if(!v)return'';return`<div style="width:${Math.round(v/maxVal*100)}%;background:${visCols[i]}bb;height:100%"></div>`;}).join('');
    const vals=visLocs.map((l,i)=>`<td style="text-align:right;font-size:8px;color:${visCols[i]}">${f[visKeys[i]]>0?fmt(f[visKeys[i]])+(isEur?'€':''):'—'}</td>`).join('');
    return`<tr>
      <td style="font-size:9px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px">${f.fam}</td>
      <td style="padding:3px 3px;min-width:50px"><div style="display:flex;height:10px;border-radius:3px;overflow:hidden;background:#f0f0f0">${bars}</div></td>
      ${vals}
      <td style="text-align:right;font-weight:700;font-size:9px">${fmt(tot)}${isEur?'€':''}</td>
      <td style="text-align:right;font-size:8px;color:var(--sub)">${pctTotal}%</td>
    </tr>`;
  }).join('');
  const locHdrs=visLocs.map((l,i)=>`<th style="color:${visCols[i]};font-size:8px;min-width:44px;width:44px;text-align:right">${visShort[i]}</th>`).join('');
  const legend=visLocs.map((l,i)=>`<span style="font-size:8px;color:${visCols[i]};font-weight:600">■ ${visShort[i]}</span>`).join(' ');
  const totRow=`<tr style="border-top:1px solid var(--sep);background:rgba(0,0,0,.03)">
    <td style="font-size:9px;font-weight:700">TOTAL</td><td></td>
    ${visLocs.map((l,i)=>`<td style="text-align:right;font-size:9px;font-weight:700;color:${visCols[i]}">${fmt(totPerLoc[i])}${isEur?'€':''}</td>`).join('')}
    <td style="text-align:right;font-weight:700;font-size:9px">${fmt(totGeneral)}${isEur?'€':''}</td>
    <td style="text-align:right;font-size:8px;color:var(--sub)">100%</td>
  </tr>`;
  function covRow(secKey){
    const pctsLoc=visLocs.map((l,i)=>PD.cov[visKeys[i]+'_'+secKey]||0);
    const mitjaCov=Math.round(pctsLoc.reduce((a,b)=>a+b,0)/pctsLoc.length);
    const cls=mitjaCov>=85?'ok':mitjaCov>=70?'warn':'bad';
    const cels=visLocs.map((l,i)=>{const p=pctsLoc[i];const c2=p>=85?'ok':p>=70?'warn':'bad';return`<td style="text-align:right;font-size:9px;font-weight:700;color:var(--${c2})">${p}%</td>`;}).join('');
    return`<tr style="background:rgba(0,0,0,.02)">
      <td style="font-size:8px;font-weight:600;color:var(--sub)">Cob. ${secKey.charAt(0)+secKey.slice(1).toLowerCase()}</td>
      <td></td>${cels}
      <td style="text-align:right;font-size:9px;font-weight:700;color:var(--${cls})">${mitjaCov}%</td>
      <td></td>
    </tr>`;
  }
  const unitSel=`<div style="display:flex;gap:4px;margin-top:4px">
    <button class="sb${isEur?' active':''}" onclick="setFamUnit('eur')">\u20AC Euros</button>
    <button class="sb${!isEur?' active':''}" onclick="setFamUnit('uni')">Unitats</button>
  </div>`;
  return`<div class="card" style="margin-top:4px">
    <div class="ch" style="flex-direction:column;align-items:flex-start;gap:4px">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
        <span class="ct">Vendes per família · mitja setmanal</span>
        ${unitSel}
      </div>
      <div style="font-size:8px;color:var(--sub);display:flex;gap:6px;flex-wrap:wrap">${legend}</div>
    </div>
    <div class="cb" style="padding:4px 8px 8px">
      <table class="dtbl" style="width:100%">
        <thead><tr><th style="text-align:left">Família</th><th></th>${locHdrs}<th>Total</th><th>%</th></tr></thead>
        <tbody>${rows}${totRow}${covRow('MENJAR')}${covRow('POSTRES')}${covRow('BEGUDES')}</tbody>
      </table>
    </div>
  </div>
  <div class="card">
    <div class="ch"><span class="ct">Comparativa visual · top 8 famílies</span></div>
    <div class="cb" style="padding:6px 4px 8px"><div style="position:relative;height:220px"><canvas id="c-prod-fam"></canvas></div></div>
  </div>`;
}
function initFamiliesChart(){const ctx=document.getElementById('c-prod-fam');if(!ctx)return;if(charts['pf'])charts['pf'].destroy();const top8=PD.fam_comp.slice(0,8);charts['pf']=new Chart(ctx,{type:'bar',data:{labels:top8.map(f=>f.fam),datasets:PROD_LOCS.map((l,i)=>({label:PROD_SHORT[l],data:top8.map(f=>f[PROD_KEYS[i]]),backgroundColor:PROD_COLS[l]+'cc'}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:9},boxWidth:10}}},scales:{x:{ticks:{font:{size:8},maxRotation:30}},y:{ticks:{font:{size:9},callback:v=>v+'€'}}}}});}
function setArtUnit(u){window._artUnit=u;document.getElementById('prod-detail').innerHTML=renderProdArticles();}
function setFamUnit(u){window._famUnit=u;document.getElementById('prod-detail').innerHTML=renderProdFamilies();setTimeout(initFamiliesChart,0);}

initAuth();
</script>
</body>
</html>
