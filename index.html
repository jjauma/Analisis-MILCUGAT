*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);padding-bottom:60px;font-size:14px}
.topbar{position:sticky;top:0;z-index:99;background:rgba(242,242,247,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:8px 14px 6px;border-bottom:.5px solid var(--sep);display:flex;align-items:center;justify-content:space-between}
.topbar-left h1{font-size:15px;font-weight:700;letter-spacing:-.3px}

.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:99;background:rgba(248,248,248,.97);backdrop-filter:blur(16px);border-top:.5px solid var(--sep);display:flex;height:56px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9px;color:var(--sub);cursor:pointer;border:none;background:none;transition:color .15s}
.tab.active{color:var(--accent)}.tab svg{width:20px;height:20px}
.page{display:none;padding:8px 10px 4px;animation:fi .18s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
/* card-scroll: contenidor pare per cards amb taules scrollables sticky.
   IMPORTANT: NO té overflow:hidden perquè trencaria el sticky del fill .cb */
.card-scroll{background:var(--card);border-radius:var(--r);margin-bottom:8px;border:1px solid var(--sep)}
.ch{padding:8px 12px 7px;border-bottom:.5px solid var(--sep);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.4px}
.cb{padding:10px 12px}
.krow{display:grid;gap:6px;margin-bottom:8px}
.k2{grid-template-columns:1fr 1fr}.k3{grid-template-columns:1fr 1fr 1fr}
.kpi{background:var(--card);border-radius:var(--r);padding:8px 10px}
.kl{font-size:10px;color:var(--sub);margin-bottom:2px}
.kv{font-size:20px;font-weight:700;letter-spacing:-.7px;line-height:1.1}
.kv.ok{color:var(--ok)}.kv.warn{color:var(--warn)}.kv.bad{color:var(--bad)}
.ks{font-size:10px;color:var(--sub);margin-top:1px}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600}
.pill.ok{background:rgba(52,199,89,.14);color:#1a7a37}
.pill.warn{background:rgba(255,159,10,.14);color:#b36b00}
.pill.bad{background:rgba(255,59,48,.14);color:#c0392b}
.loc-sticky{position:sticky;top:52px;z-index:50;padding:6px 10px;background:rgba(242,242,247,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:.5px solid var(--sep);margin:0 -10px 10px}
.seg{display:flex;background:rgba(118,118,128,.12);border-radius:8px;padding:2px}
.sb{flex:1;padding:5px 2px;border:none;background:none;font-size:10px;font-weight:500;color:var(--sub);border-radius:6px;cursor:pointer;transition:all .15s;text-align:center}
.sb:hover:not(.active){background:rgba(255,255,255,.5);color:var(--text)}
.sb.active{background:#1F3864;color:#fff;font-weight:700;box-shadow:0 2px 6px rgba(31,56,100,.35);transform:scale(1.02)}
.loc-banner{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;margin-bottom:8px}
.cw{position:relative;height:190px}
.cws{position:relative;height:160px}
.cwm{position:relative;height:175px}
.dtbl{width:100%;border-collapse:separate;border-spacing:0;font-size:10px}
.dtbl th{color:var(--sub);font-weight:600;padding:3px 2px 4px;text-align:center;border-bottom:.5px solid var(--sep);white-space:nowrap;font-size:9px;background:#fff}
.dtbl th:first-child{text-align:left;padding-left:6px;min-width:42px;position:sticky;left:0;z-index:3;background:#fff;box-shadow:1px 0 0 var(--sep)}
.dtbl td{padding:3px 2px;text-align:center;border-bottom:.5px solid var(--sep);font-size:9px;background:#fff}
.dtbl td:first-child{text-align:left;padding-left:6px;font-weight:600;font-size:9px;white-space:nowrap;position:sticky;left:0;z-index:2;box-shadow:1px 0 0 var(--sep)}
.dtbl tr:last-child td{border-bottom:none}
.dtbl .tot-col{font-weight:700;border-left:.5px solid var(--sep)}
/* Files amb background especial: pintar abans la cel·la sticky perquè heretí el color */
.dtbl tr td:first-child{background:var(--row-bg, #fff)}
/* Marcar fila i propagar el background a la cel·la sticky via CSS variable */
.dtbl tr.row-total td{--row-bg:#f5f5f7}
.dtbl tr.row-section td{--row-bg:rgba(0,0,0,.05)}
.dtbl tr.row-bold td{--row-bg:rgba(0,0,0,.03)}
.dtbl tr.row-final td{--row-bg:#dde7f7}
.dtbl tr.row-projeccio td{--row-bg:rgba(0,122,255,.04)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:5px 8px;border-bottom:.5px solid var(--sep);text-align:right}
.tbl th:first-child{text-align:left}
.tbl td{padding:6px 8px;border-bottom:.5px solid var(--sep);text-align:right}
.tbl td:first-child{text-align:left;font-weight:500}
.tbl tr:last-child td{border-bottom:none}
.hm{display:grid;gap:2px}
.hml{color:var(--sub);display:flex;align-items:center;font-size:9px;font-weight:600}
.hmc{border-radius:4px;height:26px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}

.abs-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid var(--sep)}

<script>
const USERS = [
  {nom:'Josep Maria', pin:'1234', rol:'admin',   local:null,            tabs:['resum','alertes','locals','personal','productes','compar'], seccions:[]},
  {nom:'Soci',        pin:'5678', rol:'soci',    local:null,            tabs:['resum','alertes','locals','productes','compar'],            seccions:[]},
  {nom:'Mgr.Sarrià',  pin:'9111', rol:'manager', local:'SM Sarrià',    tabs:['alertes','locals','personal','productes','compar'],          seccions:[]},
  {nom:'Mgr.PSbd',    pin:'9333', rol:'manager', local:'Picu Sabadell',tabs:['alertes','locals','personal','productes','compar'],          seccions:[]},
];

let SESSION = null;

function initAuth(){
  const saved = localStorage.getItem('mg_session');
  if(saved){
    try{
      const s = JSON.parse(saved);
      const u = USERS.find(u=>u.pin===s.pin && u.nom===s.nom);
      if(u){ SESSION=u; applySession(); return; }
    }catch(e){}
  }
  document.getElementById('login-overlay').style.display='flex';
}

function doLogin(){
  const pin = document.getElementById('login-pin').value.trim();
  const u = USERS.find(u=>u.pin===pin);
  if(!u){ document.getElementById('login-error').textContent='PIN incorrecte'; return; }
  localStorage.setItem('mg_session', JSON.stringify({pin:u.pin,nom:u.nom}));
  SESSION = u;
  document.getElementById('login-overlay').style.display='none';
  applySession();
}

function doLogout(){
  localStorage.removeItem('mg_session');
  SESSION=null;
  location.reload();
}

function applySession(){
  const u = SESSION;
  document.getElementById('user-label').textContent = u.nom;
  ['resum','alertes','locals','personal','productes','compar'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    if(el) el.style.display = u.tabs.includes(t)?'':'none';
  });
  if(u.local){ curLoc = u.local; curPer = u.local; }
  const primera = u.tabs[0];
  showPage(primera);
  if(!u.local) renderResum();
  // Actualitzar badge de la tab Alertes
  updateAlertBadge();

function showPage(p){
  if(!SESSION) return;
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  const pageEl=document.getElementById('page-'+p);
  const tabEl=document.getElementById('tab-'+p);
  if(pageEl) pageEl.classList.add('active');
  if(tabEl) tabEl.classList.add('active');
  if(SESSION.local){ curLoc=SESSION.local; curPer=SESSION.local; }
  if(p==='resum')renderResum();
  if(p==='alertes')renderAlertes();
  if(p==='compar')renderCompar();
  if(p==='locals'){
    buildSeg('loc-seg',curLoc,selLocal);
    if(SESSION.local) document.getElementById('loc-seg').style.display='none';
    renderLocDetail();
  }
  if(p==='personal'){
    if(!SESSION.local && curPer!=='TOTAL' && !LOCS.includes(curPer)) curPer='TOTAL';
    buildSeg('per-seg',curPer,selPer);
    if(SESSION.local) document.getElementById('per-seg').style.display='none';
    renderPerDetail();
  }
  if(p==='productes'){
    curProdSec='articles';
    renderProductes();
  }
  window.scrollTo(0,0);
}

function buildSeg(id,cur,fn){
  const esLocal=fn===selLocal, esPer=fn===selPer, esProd=fn===selProdLoc;
  let llista;
  if(SESSION&&SESSION.local){
    llista=[SESSION.local];
  } else if(esLocal){
    llista=LOCS_ALL;
  } else if(esPer || esProd){
    llista=['TOTAL',...LOCS];
  } else {
    llista=LOCS;
  }
  const colMap={'TOTAL':'#555','SM Sarrià':'#1F3864','Picu Sabadell':'#E07B30'};
  document.getElementById(id).innerHTML=llista.map(l=>{
    const label=l==='TOTAL'?'Grup':l.replace('SM Sarrià','S.Sarrià').replace('Picu Sabadell','P.Sbd');
    return`<button class="sb${l===cur?' active':''}" onclick="${fn.name}('${l}')">${label}</button>`;
  }).join('');
}
function selLocal(l){curLoc=l;buildSeg('loc-seg',l,selLocal);renderLocDetail();window.scrollTo(0,52);}

let curComparSec = 'articles';

function showComparSec(sec){
  curComparSec = sec;
  document.querySelectorAll('#compar-seg .sb').forEach(b=>b.classList.remove('active'));
  if(event && event.target) event.target.classList.add('active');
  renderCompar();
}

function renderCompar(){
  const el = document.getElementById('compar-detail');
  if(!el) return;
  if(typeof COMPAR === 'undefined' || Object.keys(COMPAR).length === 0){
    el.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--sub);font-size:12px">
      <div style="font-size:32px;margin-bottom:10px">📆</div>
      <div style="font-weight:600;color:var(--fg);margin-bottom:4px">Comparativa 2025 vs 2026</div>
      <div>Encara no hi ha dades disponibles del 2025 per cap local.</div>
      <div style="margin-top:8px;font-size:11px">Quan puguis carregar les dades històriques, aquesta pestanya mostrarà comparatives d'articles i famílies.</div>
    </div>`;
    return;
  }

  let locals;
  if(SESSION && SESSION.local){ locals = [SESSION.local]; }
  else { locals = Object.keys(COMPAR); }
  locals = locals.filter(l => COMPAR[l]);

  if(locals.length === 0){
    el.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--sub);font-size:12px">
      <div style="font-size:32px;margin-bottom:10px">📆</div>
      <div style="font-weight:600;color:var(--fg);margin-bottom:4px">Sense dades comparables</div>
      <div>El teu local encara no té dades del 2025 carregades.</div>
    </div>`;
    return;
  }

  let html = '';
  locals.forEach(loc => {
    const c = COMPAR[loc];
    const s = c.summary;
    const tot25 = s.total_brut_25 || s.total_25;
    const tot26 = s.total_brut_26 || s.total_26;
    const dTot = tot26 - tot25;
    const dPct = tot25 > 0 ? (dTot / tot25 * 100) : 0;
    const col = dPct >= 0 ? 'var(--ok)' : 'var(--bad)';

    html += `<div class="card">
      <div class="ch" style="border-left:4px solid ${(GCOLS[LOCS.indexOf(loc)]||'#555')}">
        <span class="ct">${loc}</span>
        <span style="font-size:10px;color:var(--sub);font-weight:500">fw1–fw${s.weeks||16} · 2026 vs 2025</span>
      </div>
      <div class="cb" style="padding:10px 12px">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px">
          <div style="text-align:center;padding:8px;background:var(--bg2);border-radius:8px">
            <div style="font-size:10px;color:var(--sub)">Total 2025</div>
            <div style="font-size:14px;font-weight:700">${fmt(s.total_brut_25||s.total_25)}€</div>
            ${s.cobertura_25 ? `<div style="font-size:9px;color:var(--sub);margin-top:1px">cobertura ${s.cobertura_25}%</div>` : ''}
          </div>
          <div style="text-align:center;padding:8px;background:var(--bg2);border-radius:8px">
            <div style="font-size:10px;color:var(--sub)">Total 2026</div>
            <div style="font-size:14px;font-weight:700">${fmt(s.total_brut_26||s.total_26)}€</div>
            ${s.cobertura_26 ? `<div style="font-size:9px;color:var(--sub);margin-top:1px">cobertura ${s.cobertura_26}%</div>` : ''}
          </div>
          <div style="text-align:center;padding:8px;background:var(--bg2);border-radius:8px">
            <div style="font-size:10px;color:var(--sub)">Variació total</div>
            <div style="font-size:14px;font-weight:700;color:${col}">${dPct>=0?'+':''}${dPct.toFixed(1)}%</div>
          </div>
        </div>
        <div style="font-size:10px;color:var(--sub);line-height:1.5">
          ${s.n_common} articles comuns · ${s.n_nous||0} 🆕 nous · ${s.n_antics||0} 🗑️ antics
          ${s.n_auto_matches ? `<br><span style="color:var(--ok)">🔗 ${s.n_auto_matches} articles '(borrado)' matched automàticament amb el seu equivalent 2026</span>` : ''}
          ${s.n_filtered ? `<br><span style="color:#999">⚠️ ${s.n_filtered} articles filtrats (vendes &lt; ${s.min_eur_per_week||100}€/setm mitjana)</span>` : ''}
        </div>
      </div>
    </div>`;

    if(curComparSec === 'articles'){
      html += renderComparArticles(c);
    } else if(curComparSec === 'families'){
      html += renderComparFamilies(c);
    }
  });

  el.innerHTML = html;
}

function renderComparArticles(c){
  if(!c.articles || c.articles.length === 0){
    return `<div class="card"><div class="cb" style="padding:20px;text-align:center;color:var(--sub);font-size:11px">Cap article a mostrar.</div></div>`;
  }
  // Top 15 creixement (d_abs positiu) i top 15 decreixement (d_abs negatiu)
  // Ordenats per impacte absolut per veure el que realment mou la facturació
  const up = c.articles.filter(a => a.d_abs > 0).sort((a,b) => b.d_abs - a.d_abs).slice(0, 15);
  const down = c.articles.filter(a => a.d_abs < 0).sort((a,b) => a.d_abs - b.d_abs).slice(0, 15);

  function tagBadge(tag){
    if(tag === 'nou') return `<span style="display:inline-block;padding:1px 5px;background:rgba(52,199,89,.15);color:var(--ok);border-radius:4px;font-size:9px;font-weight:700;margin-left:4px">🆕 NOU</span>`;
    if(tag === 'antic') return `<span style="display:inline-block;padding:1px 5px;background:rgba(142,142,147,.15);color:#8e8e93;border-radius:4px;font-size:9px;font-weight:700;margin-left:4px">🗑️ ANTIC</span>`;
    return '';
  }

  function tableRows(arr){
    return arr.map(a => {
      const col = a.d_abs >= 0 ? 'var(--ok)' : 'var(--bad)';
      let deltaTxt;
      if(a.tag === 'nou'){
        deltaTxt = `<span style="color:var(--ok);font-weight:700">+${fmt(a.imp_26)}€</span>`;
      } else if(a.tag === 'antic'){
        deltaTxt = `<span style="color:var(--bad);font-weight:700">-${fmt(a.imp_25)}€</span>`;
      } else if(a.d_pct !== null){
        deltaTxt = `<span style="color:${col};font-weight:700">${a.d_pct>=0?'+':''}${a.d_pct.toFixed(1)}%</span>`;
      } else {
        deltaTxt = '—';
      }

      // Valors — si tag nou, 2025 mostrem '—'; si tag antic, 2026 mostrem '—'
      const u25 = (a.tag === 'nou') ? '—' : a.cant_25;
      const e25 = (a.tag === 'nou') ? '—' : fmt(a.imp_25)+'€';
      const u26 = (a.tag === 'antic') ? '—' : a.cant_26;
      const e26 = (a.tag === 'antic') ? '—' : fmt(a.imp_26)+'€';

      return `<tr style="border-top:1px solid var(--br)">
        <td style="padding:6px 8px;font-size:11px">
          <div style="font-weight:600;color:var(--fg)">${a.art}${tagBadge(a.tag)}</div>
          <div style="font-size:9px;color:var(--sub)">${a.fam || '—'}</div>
        </td>
        <td style="padding:6px 4px;text-align:right;font-size:10px;color:var(--sub)">${u25}</td>
        <td style="padding:6px 8px;text-align:right;font-size:11px;color:var(--sub)">${e25}</td>
        <td style="padding:6px 4px;text-align:right;font-size:10px;font-weight:600">${u26}</td>
        <td style="padding:6px 8px;text-align:right;font-size:11px;font-weight:700">${e26}</td>
        <td style="padding:6px 8px;text-align:right;font-size:11px">${deltaTxt}</td>
      </tr>`;
    }).join('');
  }

  function tableHead(){
    return `<thead>
      <tr style="color:var(--sub);font-weight:600;font-size:9px;background:var(--bg2)">
        <td style="padding:6px 8px" rowspan="2">Article</td>
        <td style="padding:4px 4px;text-align:center;border-bottom:1px solid var(--br)" colspan="2">2025</td>
        <td style="padding:4px 4px;text-align:center;border-bottom:1px solid var(--br)" colspan="2">2026</td>
        <td style="padding:6px 8px;text-align:right" rowspan="2">Δ</td>
      </tr>
      <tr style="color:var(--sub);font-weight:600;font-size:9px;background:var(--bg2)">
        <td style="padding:3px 4px;text-align:right">Unit.</td>
        <td style="padding:3px 8px;text-align:right">€</td>
        <td style="padding:3px 4px;text-align:right">Unit.</td>
        <td style="padding:3px 8px;text-align:right">€</td>
      </tr>
    </thead>`;
  }

  let h = '';
  if(up.length > 0){
    h += `<div class="card">
      <div class="ch"><span class="ct">🟢 Top creixement</span><span style="font-size:10px;color:var(--sub)">per impacte €</span></div>
      <div class="cb" style="padding:0;overflow-x:auto"><table style="width:100%;border-collapse:collapse">
        ${tableHead()}
        <tbody>${tableRows(up)}</tbody>
      </table></div>
    </div>`;
  }
  if(down.length > 0){
    h += `<div class="card">
      <div class="ch"><span class="ct">🔴 Top decreixement</span><span style="font-size:10px;color:var(--sub)">per impacte €</span></div>
      <div class="cb" style="padding:0;overflow-x:auto"><table style="width:100%;border-collapse:collapse">
        ${tableHead()}
        <tbody>${tableRows(down)}</tbody>
      </table></div>
    </div>`;
  }
  h += `<div class="card"><div class="cb" style="padding:10px 12px;font-size:10px;color:var(--sub);line-height:1.5">
    📊 Articles amb ≥100€/setm mitjana. Mostrem top 15 que pugen i top 15 que baixen per impacte absolut en €. Etiquetes: 🆕 nou (només 2026), 🗑️ antic (només 2025). Els canvis de carta queden integrats al rànquing.
  </div></div>`;
  return h;
}

function renderComparFamilies(c){
  if(!c.families || c.families.length === 0){
    return `<div class="card"><div class="cb" style="padding:20px;text-align:center;color:var(--sub);font-size:11px">Sense dades de famílies.</div></div>`;
  }
  const rel = c.families.filter(f => (f.imp_25 + f.imp_26) > 100);
  const rows = rel.map(f => {

// === Sparkline SVG (dades reals + línia de tendència + projecció) ===
function sparkline(vals, tend, color, proj4){
  const W = 280, H = 50, P = 4;  // width, height, padding
  const all = [...vals, ...tend, ...(proj4 || [])];
  const mn = Math.min(...all), mx = Math.max(...all);
  const range = mx - mn || 1;
  const n = vals.length;
  const projN = (proj4 || []).length;
  const totalPoints = n + projN;
  const stepX = (W - 2*P) / Math.max(1, totalPoints - 1);
  const toY = v => H - P - ((v - mn) / range) * (H - 2*P);

  // Línia tendència (sobre els punts reals)
  const tendPath = tend.map((v, i) => `${i===0?'M':'L'}${P + i*stepX},${toY(v)}`).join(' ');

  // Línia projecció (continuació punts nous + l'últim de tendència)
  let projPath = '';
  if (projN > 0) {
    const lastX = P + (n - 1) * stepX;
    const lastY = toY(tend[tend.length - 1]);
    projPath = `M${lastX},${lastY}`;
    proj4.forEach((v, i) => {
      const x = P + (n + i) * stepX;
      projPath += ` L${x},${toY(v)}`;
    });
  }

  // Punts reals (cercles)
  const dots = vals.map((v, i) => `<circle cx="${P + i*stepX}" cy="${toY(v)}" r="1.8" fill="#6b6b6b"/>`).join('');

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:50px;display:block">
    <path d="${tendPath}" fill="none" stroke="${color}" stroke-width="2" opacity="0.75"/>
    ${projPath ? `<path d="${projPath}" fill="none" stroke="${color}" stroke-width="1.8" stroke-dasharray="3,3" opacity="0.6"/>` : ''}
    ${dots}
  </svg>`;
}

// Traduir R² a etiqueta humana
function confLabel(r2){
  if (r2 > 0.6) return {label:'Patró molt clar', cls:'strong'};
  if (r2 > 0.3) return {label:'Tendència probable', cls:'medium'};
  return {label:'Sense patró clar', cls:'weak'};
}

function renderTendenciaCard(loc, year){
  year = year || '2026';
  if(typeof TRENDS === 'undefined') return '';
  // Selector de fonts segons any
  const _TRENDS = year === '2025' ? (typeof TRENDS_HIST !== 'undefined' ? TRENDS_HIST : null) : TRENDS;
  if(!_TRENDS) return '';
  const _DV = year === '2025' ? (typeof DV_HIST !== 'undefined' ? DV_HIST : {}) : DV;
  const _HIST_ref = year === '2025' ? null : (typeof HIST !== 'undefined' ? HIST : null);  // 2025 no té any anterior disponible
  
  const key = loc==='TOTAL' ? 'GRUP' : loc;
  const t = _TRENDS[key];
  if(!t) return '';

  const lblLoc = loc==='TOTAL' ? 'Grup' : loc;

  // Dades actuals (de l'any seleccionat)
  const dv = loc==='TOTAL' ? null : _DV[loc];
  if(loc !== 'TOTAL' && !dv) return '';  // no hi ha dades aquest any
  
  let fw_v_real, fw_r_real, fw_list;
  if(loc === 'TOTAL'){
    // Recalcular GRUP per any
    const locsAv = LOCS.filter(l => _DV[l]);
    if(locsAv.length === 0) return '';
    fw_list = _DV[locsAv[0]].fw_list;
    fw_v_real = fw_list.map((_,i) => locsAv.reduce((s,l)=>s+(_DV[l].fw_vendes[i]||0), 0));
    const fw_c = fw_list.map((_,i) => locsAv.reduce((s,l)=>s+(_DV[l].fw_cost[i]||0), 0));
    fw_r_real = fw_v_real.map((v,i) => v>0 ? round1(fw_c[i]/v*100) : 0);
  } else {
    fw_v_real = dv.fw_vendes;
    fw_r_real = dv.fw_ratio;
    fw_list = dv.fw_list;
  }
  
  const nW = fw_v_real.length;
  const fwFirst = fw_list[0];
  const fwLast = fw_list[fw_list.length-1];
  const fwProj = fwLast + 4;
  const rangLbl = `fw${fwFirst}–fw${fwLast}`;

  // Última setmana
  const vLast = fw_v_real[nW - 1];
  const rLast = fw_r_real[nW - 1];

  // Mitjana del període (només setmanes amb dades)
  const vValid = fw_v_real.filter(v => v > 0);
  const vAvg = vValid.length ? vValid.reduce((a,b)=>a+b,0) / vValid.length : 0;
  const rValid = fw_r_real.filter(r => r > 0);
  const rAvg = rValid.length ? rValid.reduce((a,b)=>a+b,0) / rValid.length : 0;

  // Projecció a 4 setmanes (extrapolant la recta de regressió)
  const lastTendV = t.tend_v[t.tend_v.length - 1];
  const lastTendR = t.tend_r[t.tend_r.length - 1];
  const proj4v = [1,2,3,4].map(i => lastTendV + t.sl_v * i);
  const proj4r = [1,2,3,4].map(i => lastTendR + t.sl_r * i);
  const vProj4 = Math.max(0, Math.round(proj4v[3]));
  const rProj4 = Math.max(0, proj4r[3]);

  // === Vendes: classificar direcció de negoci ===
  const confV = confLabel(t.r2_v);
  let vIcon, vFrase, vColor;
  if (confV.cls === 'weak') {
    vIcon = '💤';
    vFrase = 'Sense direcció clara · variació elevada setmana a setmana';
    vColor = '#8e8e93';
  } else if (t.sl_v > 0) {
    vIcon = '🟢';
    vFrase = confV.cls === 'strong' ? 'Creixent de forma sòlida' : 'Tendència probable a créixer';
    vColor = 'var(--ok)';
  } else {
    vIcon = confV.cls === 'strong' ? '🔴' : '🟡';
    vFrase = confV.cls === 'strong' ? 'Decreixent de forma sòlida' : 'Tendència probable a baixar';
    vColor = confV.cls === 'strong' ? 'var(--bad)' : 'var(--warn)';
  }

  // === Ràtio: classificar direcció de negoci (pujar = dolent) ===
  const confR = confLabel(t.r2_r);
  let rIcon, rFrase, rColor;
  if (confR.cls === 'weak') {
    rIcon = '💤';
    rFrase = 'Sense direcció clara · variació elevada setmana a setmana';
    rColor = '#8e8e93';
  } else if (t.sl_r < 0) {
    rIcon = '🟢';
    rFrase = confR.cls === 'strong' ? 'Millorant de forma sòlida' : 'Tendència probable a millorar';
    rColor = 'var(--ok)';
  } else {
    rIcon = confR.cls === 'strong' ? '🔴' : '🟡';
    rFrase = confR.cls === 'strong' ? 'Empitjorant de forma sòlida' : 'Tendència probable a empitjorar';
    rColor = confR.cls === 'strong' ? 'var(--bad)' : 'var(--warn)';
  }

  // === Suggeriment d'acció (només si alguna mètrica té senyal clar) ===
  const rSevIsBad = (rIcon === '🔴');
  const rSevIsWarn = (rIcon === '🟡');
  const rSevIsGood = (rIcon === '🟢');
  const vSevIsGood = (vIcon === '🟢' && confV.cls === 'strong');
  let sugg = '';
  if (rSevIsBad) {
    sugg = '💡 Revisar urgentment mix hores cuina/sala i productivitat dels torns més carregats.';
  } else if (rSevIsWarn) {
    sugg = '💡 Tendència a confirmar: monitoritzar les pròximes 2-3 setmanes abans d\'intervenir.';
  } else if (rSevIsGood && vSevIsGood) {
    sugg = '💡 Trajectòria molt positiva: mantenir la gestió actual d\'equips i patró d\'obertura.';
  } else if (rSevIsGood) {
    sugg = '💡 Ràtio millorant: mantenir control de costs laborals actual.';
  }

  // === HTML: fila de 4 números amb etiquetes (afegeix 2025 si hi ha HIST) ===
  // Comportament: si HIST té aquest local, mostrem la columna "Mateixa setm. 2025"
  //  amb delta vs 2025 al peu. Si no, la columna es suprimeix i tornem a 3 columnes.
  const hasHist = year === '2026' && typeof HIST !== 'undefined' && HIST && HIST[loc];
  const hist = hasHist ? HIST[loc] : null;

  function quadruple(lastVal, avgVal, histVal, projVal, showProj, unit, projColor){
    const fmtVal = unit === '€' ? `${fmt(lastVal)}€` : `${lastVal.toFixed(1)}%`;
    const fmtAvg = unit === '€' ? `${fmt(avgVal)}€` : `${avgVal.toFixed(1)}%`;
    const fmtProj = unit === '€' ? `~${fmt(projVal)}€` : `~${projVal.toFixed(1)}%`;

    // Calcular delta vs 2025
    let fmtHist = '—';
    let fmtDelta = '';
    if (histVal !== null && histVal !== undefined && histVal > 0) {
      fmtHist = unit === '€' ? `${fmt(histVal)}€` : `${histVal.toFixed(1)}%`;
      if (unit === '€') {
        const deltaPct = ((lastVal - histVal) / histVal) * 100;
        const sign = deltaPct > 0 ? '+' : '';
        const color = deltaPct > 0 ? 'var(--ok)' : deltaPct < 0 ? 'var(--bad)' : 'var(--sub)';
        fmtDelta = `<div style="font-size:9px;color:${color};font-weight:600;margin-top:1px">${sign}${deltaPct.toFixed(1)}% vs 2025</div>`;
      } else {
        // Per ràtio, la diferència en pp (no %)
        const deltaPp = lastVal - histVal;
        const sign = deltaPp > 0 ? '+' : '';
        // En ràtio: baixar és bo (verd), pujar és dolent (vermell)
        const color = deltaPp < 0 ? 'var(--ok)' : deltaPp > 0 ? 'var(--bad)' : 'var(--sub)';
        fmtDelta = `<div style="font-size:9px;color:${color};font-weight:600;margin-top:1px">${sign}${deltaPp.toFixed(1)}pp vs 2025</div>`;
      }
    }

    const cols = hasHist ? '1fr 1fr 1fr 1fr' : '1fr 1fr 1fr';
    const histBlock = hasHist ? `<div style="text-align:center;padding:5px 4px;background:#fff;border-radius:6px">
        <div style="color:var(--sub);font-size:9px;margin-bottom:2px">Mateixa setm. (fw${fwLast} 2025)</div>
        <div style="font-weight:700;font-size:12px;color:var(--fg)">${fmtHist}</div>
        ${fmtDelta}
      </div>` : '';

    return `<div style="display:grid;grid-template-columns:${cols};gap:6px;font-size:10px;margin-top:6px">
      <div style="text-align:center;padding:5px 4px;background:#fff;border-radius:6px">
        <div style="color:var(--sub);font-size:9px;margin-bottom:2px">Última setm. (fw${fwLast})</div>
        <div style="font-weight:700;font-size:12px;color:var(--fg)">${fmtVal}</div>
      </div>
      <div style="text-align:center;padding:5px 4px;background:#fff;border-radius:6px">
        <div style="color:var(--sub);font-size:9px;margin-bottom:2px">Mitjana ${rangLbl}</div>
        <div style="font-weight:700;font-size:12px;color:var(--fg)">${fmtAvg}</div>
      </div>
      ${histBlock}
      <div style="text-align:center;padding:5px 4px;background:#fff;border-radius:6px;${!showProj?'opacity:.35':''}">
        <div style="color:var(--sub);font-size:9px;margin-bottom:2px">Projecció fw${fwProj}</div>
        <div style="font-weight:700;font-size:12px;color:${showProj?projColor:'var(--sub)'}">${showProj?fmtProj:'—'}</div>
      </div>
    </div>`;
  }

  // Valors històrics per la mateixa setmana (fw1-16 2025)
  const histVLast = hist ? (hist.fw_vendes[hist.fw_vendes.length - 1] || null) : null;
  const histRLast = hist ? (hist.fw_ratio[hist.fw_ratio.length - 1] || null) : null;

  // === HTML de cada bloc ===
  function bloc(kind){
    if (kind === 'v') {
      return `<div style="padding:12px;background:var(--bg2);border-radius:10px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <span style="font-size:13px">${vIcon}</span>
          <span style="font-size:11px;font-weight:700;color:var(--fg)">Vendes netes setmanals</span>
        </div>
        <div style="font-size:11px;color:var(--fg);margin-bottom:4px;line-height:1.35">${vFrase}</div>
        <div style="margin:4px 0 2px">${sparkline(fw_v_real, t.tend_v, vColor, proj4v)}</div>
        ${quadruple(vLast, vAvg, histVLast, vProj4, confV.cls !== 'weak', '€', vColor)}
        <div style="font-size:10px;color:var(--sub);margin-top:6px;text-align:right">${confV.label}</div>
      </div>`;
    } else {
      return `<div style="padding:12px;background:var(--bg2);border-radius:10px;margin-bottom:4px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <span style="font-size:13px">${rIcon}</span>
          <span style="font-size:11px;font-weight:700;color:var(--fg)">Ràtio Cost Personal / Vendes netes</span>
        </div>
        <div style="font-size:11px;color:var(--fg);margin-bottom:4px;line-height:1.35">${rFrase}</div>
        <div style="margin:4px 0 2px">${sparkline(fw_r_real, t.tend_r, rColor, proj4r)}</div>
        ${quadruple(rLast, rAvg, histRLast, rProj4, confR.cls !== 'weak', '%', rColor)}
        <div style="font-size:10px;color:var(--sub);margin-top:6px;text-align:right">${confR.label}</div>
      </div>`;
    }
  }

  // === Detalls tècnics (expandible) ===
  const tid = 'tend-tech-' + (loc==='TOTAL' ? 'grup' : loc.replace(/\s/g,'').replace('ò','o').replace('à','a'));
  const technical = `<div id="${tid}" style="display:none;margin-top:8px;padding:10px;background:rgba(0,0,0,.03);border-radius:8px;font-size:10px;color:var(--sub);line-height:1.5">
    <div style="font-weight:700;color:var(--fg);margin-bottom:4px">Detalls tècnics</div>
    <b>Vendes netes:</b> slope = ${t.sl_v>=0?'+':''}${t.sl_v.toLocaleString('ca-ES')}€/setmana · R² = ${t.r2_v.toFixed(3)}<br>
    <b>Ràtio Cost/Vendes:</b> slope = ${t.sl_r>=0?'+':''}${t.sl_r.toFixed(2)}pp/setmana · R² = ${t.r2_r.toFixed(3)}<br>
    <div style="margin-top:6px;font-style:italic">R² = quant s'ajusten els punts reals a la línia de tendència (0 = cap patró, 1 = patró perfecte). Slope = variació estimada per setmana.</div>
    <div style="margin-top:4px;font-style:italic">Projecció fw${fwProj}: extrapolació lineal a 4 setmanes vista des de fw${fwLast}. No considera estacionalitat ni esdeveniments puntuals (festius, promocions).</div>
  </div>`;

  return `<div class="card">
    <div class="ch" style="justify-content:space-between;flex-wrap:wrap;gap:4px">
      <div>
        <div class="ct">📊 Tendències · ${lblLoc} · ${year}</div>
        <div style="font-size:10px;color:var(--sub);font-weight:400;margin-top:2px">Període: ${rangLbl} · ${nW} setmanes</div>
      </div>
      <span onclick="document.getElementById('${tid}').style.display=document.getElementById('${tid}').style.display==='none'?'block':'none'" style="cursor:pointer;font-size:11px;color:var(--sub);user-select:none">ⓘ detalls</span>
    </div>
    <div class="cb" style="padding:10px 12px">
      ${bloc('v')}
      ${bloc('r')}
      ${sugg ? `<div style="margin-top:8px;padding:8px 10px;background:rgba(255,204,0,.1);border-radius:8px;font-size:11px;color:var(--fg);line-height:1.4">${sugg}</div>` : ''}
      ${technical}
    </div>
  </div>`;
}

// Variable global per la sub-pestanya actual de Resum
var curResumPeriod = '2026';

function setResumPeriod(p){
  curResumPeriod = p;
  // Actualitzar botons sticky
  const seg = document.getElementById('resum-period-seg');
  if(seg){
    seg.querySelectorAll('.sb').forEach(b => b.classList.remove('active'));
    const btnIdx = {'2026':0, '2025':1, 'compar':2, 'forecast':3}[p];
    if(btnIdx != null) seg.querySelectorAll('.sb')[btnIdx].classList.add('active');
  }
  renderResum();
}

function renderResum(){
  const el = document.getElementById('resum-detail');
  if(!el) return;
  if(curResumPeriod === '2026') renderResum2026(el);
  else if(curResumPeriod === '2025') renderResum2025(el);
  else if(curResumPeriod === 'compar') renderResumCompar(el);
  else if(curResumPeriod === 'forecast') renderResumForecast(el);
}

// ════════════════════════════════════════════════════════════════
// Helper: pinta el conjunt de cards (taula + gràfics) per un dataset
// dataset: dict {loc: {total_vendes, total_cost, ratio, dies, fw_list, fw_vendes, fw_cost, fw_ratio, fw_ratio_acum}}
// year: 2026 o 2025 (només per labels)
// ════════════════════════════════════════════════════════════════
function _renderResumPanel(parentEl, dataset, year){
  const locsAvailable = LOCS.filter(l => dataset[l]);
  if(locsAvailable.length === 0){
    parentEl.innerHTML = `<div style="padding:30px;text-align:center;color:var(--sub)">
      <div style="font-size:36px;margin-bottom:10px">📭</div>
      <div>No hi ha dades disponibles per ${year}</div>
    </div>`;
    return;
  }
  
  const totV = locsAvailable.reduce((s,l) => s + (dataset[l].total_vendes||0), 0);
  const totC = locsAvailable.reduce((s,l) => s + (dataset[l].total_cost||0), 0);
  const totR = totV > 0 ? totC/totV*100 : 0;
  
  const fws = (dataset[locsAvailable[0]].fw_list || []).map(f => 'fw' + f);
  const NW = fws.length;
  
  // Sumes per fw del grup
  const grupV = fws.map((_,i) => locsAvailable.reduce((s,l) => s + (dataset[l].fw_vendes[i]||0), 0));
  const grupC = fws.map((_,i) => locsAvailable.reduce((s,l) => s + (dataset[l].fw_cost[i]||0), 0));
  const grupR = grupV.map((v,i) => v > 0 ? round1(grupC[i]/v*100) : 0);
  // Ràtio acum del grup
  let av=0, ac=0;
  const grupAcum = grupV.map((v,i) => { av+=v; ac+=grupC[i]; return av>0 ? round1(ac/av*100) : 0; });
  
  // Identificadors de canvas únics per any (per evitar conflictes)
  const cgId = `cg-${year}`;
  const crId = `cr-${year}`;
  
  // ═══ Taula resum + cards ═══
  let html = `<div class="card" style="margin-top:4px">
    <div class="ch"><span class="ct">Resum per local · ${fws[0]}–${fws[fws.length-1]} · ${year}</span></div>
    <div class="cb" style="padding:8px 10px"><table class="dtbl" style="font-size:11px">
      <thead><tr>
        <th style="text-align:left">Local</th>
        <th>Vendes netes</th><th>Personal</th><th>Ràtio P/V</th><th>Dies</th>
      </tr></thead><tbody>`;
  locsAvailable.forEach(l => {
    const d = dataset[l];
    const i = LOCS.indexOf(l);
    html += `<tr style="cursor:pointer" onclick="selLocal('${l}');showPage('locals')">
      <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${GCOLS[i]};margin-right:4px"></span>${l}</td>
      <td style="font-weight:600">${fmt(d.total_vendes)}€</td>
      <td>${fmt(d.total_cost)}€</td>
      <td style="font-weight:700;color:${rc(d.ratio)}">${pc(d.ratio)} ${si(d.ratio)}</td>
      <td style="color:var(--sub)">${d.dies||'—'}</td>
    </tr>`;
  });
  html += `<tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,0.02)">
    <td style="font-weight:700">TOTAL</td>
    <td style="font-weight:700">${fmt(totV)}€</td>
    <td style="font-weight:700">${fmt(totC)}€</td>
    <td style="font-weight:700;color:${rc(totR)}">${pc(totR)} ${si(totR)}</td>
    <td style="color:var(--sub)">—</td>
  </tr></tbody></table></div></div>`;
  
  // Gràfic vendes setmanals
  html += `<div class="card-scroll">
    <div class="ch"><span class="ct">Vendes netes setmanals per local · ${year} (€)</span></div>
    <div class="cb" style="padding:6px 4px 8px">
      <div class="cw"><canvas id="${cgId}"></canvas></div>
      <div id="${cgId}-taula" style="margin-top:6px;overflow-x:auto"></div>
    </div>
  </div>`;
  
  // Gràfic ràtio acumulat
  html += `<div class="card">
    <div class="ch"><span class="ct">Ràtio P/V acumulat per local · fw1→fwN · ${year} (%)</span></div>
    <div class="cb" style="padding:6px 4px 8px">
      <div class="cws"><canvas id="${crId}"></canvas></div>
      <div id="${crId}-taula" style="margin-top:6px;overflow-x:auto"></div>
      <div style="display:flex;gap:10px;margin-top:4px;font-size:10px;padding-left:2px">
        <span style="color:var(--ok)">▬ ≤35%</span><span style="color:var(--warn)">▬ 35–38%</span><span style="color:var(--bad)">▬ >38%</span>
      </div>
    </div>
  </div>`;
  
  parentEl.innerHTML = html;
  
  // ═══ Renderitzar gràfics ═══
  const mitjes = {};
  locsAvailable.forEach(l => { mitjes[l] = (dataset[l].fw_vendes.reduce((a,b)=>a+b,0))/NW; });
  
  setTimeout(() => {
    dk(cgId);
    if(document.getElementById(cgId)){
      charts[cgId] = new Chart(document.getElementById(cgId).getContext('2d'), {
        type:'line',
        data:{labels:fws, datasets:[
          ...locsAvailable.map((l) => ({label:l, data:dataset[l].fw_vendes, borderColor:GCOLS[LOCS.indexOf(l)], backgroundColor:'transparent', borderWidth:2, pointRadius:2, tension:.3, yAxisID:'y'})),
          {label:'Total grup', data:grupV, borderColor:'#aaa', backgroundColor:'transparent', borderWidth:1.5, borderDash:[4,3], pointRadius:2, tension:.3, yAxisID:'y2'}
        ]},
        options:{responsive:true, maintainAspectRatio:false,
          plugins:{legend:{display:true, position:'bottom', labels:{font:{size:9},boxWidth:8,padding:5}}, tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.raw)}€`}}},
          scales:{
            x:{grid:{display:false}, ticks:{font:{size:8}}},
            y:{position:'left', grid:{color:'rgba(0,0,0,0.03)'}, ticks:{font:{size:8}, callback:v=>fmt(v)+'€'}, title:{display:true, text:'Per local', font:{size:8}, color:'var(--sub)'}},
            y2:{position:'right', grid:{display:false}, ticks:{font:{size:8}, callback:v=>(v/1000).toFixed(0)+'k€'}, title:{display:true, text:'Grup', font:{size:8}, color:'#aaa'}}
          }
        }
      });
    }
    
    // Taula vendes
    let tV = `<table class="dtbl"><thead><tr><th>Local</th><th class="tot-col">Mitja/fw</th>${fws.map(f=>`<th>${f}</th>`).join('')}<th class="tot-col">Total</th></tr></thead><tbody>`;
    locsAvailable.forEach(l => {
      const i = LOCS.indexOf(l);
      const mitja = mitjes[l];
      tV += `<tr><td style="color:${GCOLS[i]}">${l.replace('SM ','').replace('Picu ','P.')}</td>`;
      tV += `<td class="tot-col" style="color:var(--sub);font-weight:600">${(mitja/1000).toFixed(1)}k</td>`;
      dataset[l].fw_vendes.forEach(v => {
        const p = (v - mitja) / mitja;
        const bg = p > 0.1 ? 'rgba(52,199,89,.15)' : p > -0.1 ? '' : 'rgba(255,59,48,.13)';
        const tc = p > 0.1 ? '#1a7a37' : p > -0.1 ? 'var(--text)' : '#c0392b';
        tV += `<td style="background:${bg};color:${tc}${p!==0?';font-weight:600':''}">${(v/1000).toFixed(0)}k</td>`;
      });
      tV += `<td class="tot-col" style="font-weight:700">${(dataset[l].total_vendes/1000).toFixed(0)}k</td></tr>`;
    });
    const gTot = grupV.reduce((a,b)=>a+b, 0);
    const gMitja = gTot/NW;
    tV += `<tr style="border-top:.5px solid var(--sep)"><td style="font-weight:700">Grup</td>`;
    tV += `<td class="tot-col" style="color:var(--sub);font-weight:600">${(gMitja/1000).toFixed(1)}k</td>`;
    grupV.forEach(v => tV += `<td style="font-weight:600">${(v/1000).toFixed(0)}k</td>`);
    tV += `<td class="tot-col" style="font-weight:700">${(gTot/1000).toFixed(0)}k</td></tr></tbody></table>`;
    const cgTaulaEl = document.getElementById(`${cgId}-taula`);
    if(cgTaulaEl) cgTaulaEl.innerHTML = tV;
    
    // Gràfic ràtio
    dk(crId);
    if(document.getElementById(crId)){
      charts[crId] = new Chart(document.getElementById(crId).getContext('2d'), {
        type:'line',
        data:{labels:fws, datasets:locsAvailable.map(l => ({label:l, data:dataset[l].fw_ratio_acum||[], borderColor:GCOLS[LOCS.indexOf(l)], backgroundColor:'transparent', borderWidth:2, pointRadius:2, tension:.3}))},
        options:{responsive:true, maintainAspectRatio:false,
          plugins:{legend:{display:true, position:'bottom', labels:{font:{size:9},boxWidth:8,padding:5}}, tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw}%`}}},
          scales:{x:{grid:{display:false}, ticks:{font:{size:8}}}, y:{grid:{color:'rgba(0,0,0,0.03)'}, ticks:{font:{size:8}, callback:v=>v+'%'}, min:20, max:65}}
        }
      });
    }
    
    // Taula ràtio
    let tR = `<table class="dtbl"><thead><tr><th>Local</th>${fws.map(f=>`<th>${f}</th>`).join('')}<th class="tot-col">Acum.</th></tr></thead><tbody>`;
    locsAvailable.forEach(l => {
      const i = LOCS.indexOf(l);
      tR += `<tr><td style="color:${GCOLS[i]}">${l.replace('SM ','').replace('Picu ','P.')}</td>`;
      (dataset[l].fw_ratio||[]).forEach(r => tR += `<td style="color:${rc(r)};font-weight:600">${r}%</td>`);
      tR += `<td class="tot-col" style="font-weight:700;color:${rc(dataset[l].ratio)}">${pc(dataset[l].ratio)}</td></tr>`;
    });
    tR += `<tr><td colspan="${NW+2}" style="padding:0"><div style="height:8px"></div></td></tr>`;
    tR += `<tr><td colspan="${NW+2}" style="padding:3px 0;border-bottom:.5px solid var(--sep);font-size:9px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.3px">Ràtio acumulat (fw1→fwN)</td></tr>`;
    locsAvailable.forEach(l => {
      const i = LOCS.indexOf(l);
      tR += `<tr><td style="color:${GCOLS[i]}">${l.replace('SM ','').replace('Picu ','P.')}</td>`;
      (dataset[l].fw_ratio_acum||[]).forEach(r => tR += `<td style="color:${rc(r)};font-weight:600">${r}%</td>`);
      tR += `<td class="tot-col" style="font-weight:700;color:${rc(dataset[l].ratio)}">${pc(dataset[l].ratio)}</td></tr>`;
    });
    tR += `<tr style="border-top:.5px solid var(--sep)"><td style="font-weight:700">Grup</td>`;
    grupAcum.forEach(r => tR += `<td style="color:${rc(r)};font-weight:600">${r}%</td>`);
    tR += `<td class="tot-col" style="font-weight:700;color:${rc(grupAcum[grupAcum.length-1])}">${pc(grupAcum[grupAcum.length-1])}</td></tr>`;
    tR += `</tbody></table>`;
    const crTaulaEl = document.getElementById(`${crId}-taula`);
    if(crTaulaEl) crTaulaEl.innerHTML = tR;
  }, 50);
}

// Helper de redondeig
function round1(v){ return Math.round(v*10)/10; }

// ════════════════════════════════════════════════════════════════
// Sub-pestanyes Resum
// ════════════════════════════════════════════════════════════════
function renderResum2026(parentEl){
  _renderResumPanel(parentEl, DV, '2026');
}

function renderResum2025(parentEl){
  if(typeof DV_HIST === 'undefined' || !DV_HIST){
    parentEl.innerHTML = `<div style="padding:30px;text-align:center;color:var(--sub)">No hi ha dades 2025</div>`;
    return;
  }
  _renderResumPanel(parentEl, DV_HIST, '2025');
}

function renderResumCompar(parentEl){
  // Vista comparativa enriquida
  if(typeof DV_HIST === 'undefined' || !DV_HIST){
    parentEl.innerHTML = `<div style="padding:30px;text-align:center;color:var(--sub)">No hi ha dades 2025 per comparar</div>`;
    return;
  }
  
  let html = '';
  // KPIs comparatius globals (Grup)
  html += renderHistKPIsCard('TOTAL', {title:'📅 Comparativa 2025 vs 2026 · Grup'});
  // KPIs per local
  LOCS.forEach(l => {
    if(DV_HIST[l]) html += renderHistKPIsCard(l, {title:`📅 Comparativa 2025 vs 2026 · ${l}`});
  });
  
  // Gràfic comparatiu vendes per setmana (un per local)
  const fws = DV[LOCS[0]].fw_list.map(f => 'fw' + f);
  LOCS.forEach((l, idx) => {
    if(!DV_HIST[l]) return;
    const cgCmpId = `cg-cmp-${idx}`;
    html += `<div class="card-scroll">
      <div class="ch"><span class="ct">${l} · Vendes setmanals 2025 vs 2026</span></div>
      <div class="cb" style="padding:6px 4px 8px">
        <div class="cw"><canvas id="${cgCmpId}"></canvas></div>
      </div>
    </div>`;
  });
  
  parentEl.innerHTML = html;
  
  // Renderitzar gràfics comparatius
  setTimeout(() => {
    LOCS.forEach((l, idx) => {
      if(!DV_HIST[l]) return;
      const cgCmpId = `cg-cmp-${idx}`;
      const ctx = document.getElementById(cgCmpId);
      if(!ctx) return;
      dk(cgCmpId);
      const col26 = GCOLS[idx];
      const col25 = '#999';
      charts[cgCmpId] = new Chart(ctx.getContext('2d'), {
        type:'line',
        data:{labels:fws, datasets:[
          {label:'2025', data:DV_HIST[l].fw_vendes, borderColor:col25, backgroundColor:'transparent', borderWidth:1.5, borderDash:[5,3], pointRadius:2, tension:.3},
          {label:'2026', data:DV[l].fw_vendes, borderColor:col26, backgroundColor:'transparent', borderWidth:2.5, pointRadius:3, tension:.3},
        ]},
        options:{responsive:true, maintainAspectRatio:false,
          plugins:{legend:{display:true, position:'bottom', labels:{font:{size:10},boxWidth:10,padding:6}}, tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.raw)}€`}}},
          scales:{x:{grid:{display:false}, ticks:{font:{size:9}}}, y:{grid:{color:'rgba(0,0,0,0.03)'}, ticks:{font:{size:9}, callback:v=>fmt(v)+'€'}}}
        }
      });
    });
  }, 50);
}

function renderResumForecast(parentEl){
  if(typeof FORECAST === 'undefined' || !FORECAST || Object.keys(FORECAST).length === 0){
    parentEl.innerHTML = `<div style="padding:30px;text-align:center;color:var(--sub)">Forecast no disponible</div>`;
    return;
  }
  
  let html = '';
  const charts_to_render = [];
  
  // GRUP primer
  if(FORECAST['GRUP']){
    const r = _renderForecastBlock('GRUP', 'Grup (2 locals)', '#555');
    html += r.html;
    if(r.chartData) charts_to_render.push(r.chartData);
  }
  
  // Cada local
  LOCS.forEach(l => {
    if(FORECAST[l]){
      const idx = LOCS.indexOf(l);
      const r = _renderForecastBlock(l, l, GCOLS[idx]);
      html += r.html;
      if(r.chartData) charts_to_render.push(r.chartData);
    }
  });
  
  parentEl.innerHTML = html;
  setTimeout(() => {
    charts_to_render.forEach(_renderForecastChart);
  }, 50);
}

// Funció ORIGINAL renderResum mantinguda per retrocompatibilitat,
// però redirigida al nou sistema de sub-pestanyes
function renderResum_LEGACY(){

// Helper: renderitza una card mini amb KPIs comparatius 2025 vs 2026 per un local
// loc: local concret o 'TOTAL' (suma de tots)
// returns: HTML string o '' si no hi ha dades 2025
function renderHistKPIsCard(loc, opts){
  opts = opts || {};
  if (typeof DV_HIST === 'undefined' || !DV_HIST) return '';
  
  let v25=0, c25=0, h25=0, v26=0, c26=0, h26=0;
  if(loc === 'TOTAL'){
    LOCS.forEach(l => {
      if(DV_HIST[l]){ v25+=DV_HIST[l].total_vendes||0; c25+=DV_HIST[l].total_cost||0; h25+=DV_HIST[l].total_hores||0; }
      v26+=DV[l].total_vendes||0; c26+=DV[l].total_cost||0; h26+=Math.round((DV[l].total_cost||0)/19);
    });
  } else {
    if(!DV_HIST[loc]) return '';
    v25=DV_HIST[loc].total_vendes||0; c25=DV_HIST[loc].total_cost||0; h25=DV_HIST[loc].total_hores||0;
    v26=DV[loc].total_vendes||0; c26=DV[loc].total_cost||0; h26=Math.round((DV[loc].total_cost||0)/19);
  }
  if(v25 === 0) return '';
  
  const r25 = c25/v25*100;
  const r26 = c26/v26*100;
  
  function delta(cur, hist, unit, higherIsBetter){
    if(!hist || hist === 0) return '<span style="color:var(--sub)">—</span>';
    const d = unit === 'pp' ? (cur - hist) : ((cur - hist) / hist * 100);
    const isGood = higherIsBetter ? d > 0 : d < 0;
    const col = Math.abs(d) < 0.05 ? 'var(--sub)' : isGood ? 'var(--ok)' : 'var(--bad)';
    const sign = d >= 0 ? '+' : '';
    const suf = unit === 'pp' ? 'pp' : '%';
    return `<span style="color:${col};font-weight:700">${sign}${d.toFixed(1)}${suf}</span>`;
  }
  
  // Mini taula amb 4 columnes: Mètrica · 2025 · 2026 · Δ
  const title = opts.title || '📅 Comparativa 2025 vs 2026 · mateix període (fw1-16)';
  return `<div class="card" style="margin-bottom:8px">
    <div class="ch"><span class="ct">${title}</span></div>
    <div class="cb" style="padding:8px 10px">
      <table class="dtbl" style="font-size:11px;width:100%">
        <thead><tr>
          <th style="text-align:left">Mètrica</th>
          <th>2025</th>
          <th>2026</th>
          <th>Δ</th>
        </tr></thead>
        <tbody>
          <tr>
            <td>Vendes netes</td>
            <td>${fmt(v25)}€</td>
            <td style="font-weight:700">${fmt(v26)}€</td>
            <td>${delta(v26, v25, '%', true)}</td>
          </tr>
          <tr>
            <td>Cost personal</td>
            <td>${fmt(c25)}€</td>
            <td style="font-weight:700">${fmt(c26)}€</td>
            <td>${delta(c26, c25, '%', false)}</td>
          </tr>
          <tr>
            <td>Hores treballades</td>
            <td>${fmt(h25)}h</td>
            <td style="font-weight:700">${fmt(h26)}h</td>
            <td>${delta(h26, h25, '%', false)}</td>
          </tr>
          <tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,.02)">
            <td style="font-weight:700">Ràtio P/V</td>
            <td>${r25.toFixed(1)}%</td>
            <td style="font-weight:700;color:${rc(r26)}">${r26.toFixed(1)}%</td>
            <td>${delta(r26, r25, 'pp', false)}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderHistComparativa(){
  const card = document.getElementById('resum-hist-card');
  const cont = document.getElementById('resum-hist');
  if (!card || !cont) return;
  if (typeof DV_HIST === 'undefined' || !DV_HIST || Object.keys(DV_HIST).length === 0) {
    card.style.display = 'none';
    return;
  }
  const locsWithHist = LOCS.filter(l => DV_HIST[l]);
  if (locsWithHist.length === 0) {
    card.style.display = 'none';
    return;
  }
  card.style.display = '';

  const periodLbl = `fw${DV[LOCS[0]].fw_list[0]}–fw${DV[LOCS[0]].fw_list[DV[LOCS[0]].fw_list.length-1]}`;

  function deltaCell(cur, hist, unit, higherIsBetter){
    if (hist === null || hist === undefined || hist === 0) return '<td style="color:var(--sub)">—</td>';
    const delta = unit === 'pp' ? (cur - hist) : ((cur - hist) / hist * 100);
    const sign = delta > 0 ? '+' : '';
    const isGood = higherIsBetter ? delta > 0 : delta < 0;
    const color = Math.abs(delta) < 0.01 ? 'var(--sub)' : isGood ? 'var(--ok)' : 'var(--bad)';
    const suffix = unit === 'pp' ? 'pp' : '%';
    return `<td style="font-weight:700;color:${color}">${sign}${delta.toFixed(1)}${suffix}</td>`;
  }

  let html = `<div style="font-size:10px;color:var(--sub);margin-bottom:6px">Mateix període ${periodLbl} · 2026 vs 2025</div>`;
  html += `<table class="dtbl" style="font-size:11px">
    <thead><tr>
      <th style="text-align:left">Local · Mètrica</th>
      <th>2025</th>
      <th>2026</th>
      <th>Δ</th>
    </tr></thead><tbody>`;

  locsWithHist.forEach((loc, i) => {

    html += `<tr style="background:rgba(0,0,0,0.02)"><td colspan="4" style="font-weight:700;padding:6px 6px 2px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${colCol};margin-right:4px"></span>${loc}</td></tr>`;

    html += `<tr><td style="padding-left:16px">Vendes netes acum.</td>
      <td>${fmt(h.total_vendes)}€</td>
      <td style="font-weight:600">${fmt(d.total_vendes)}€</td>
      ${deltaCell(d.total_vendes, h.total_vendes, '%', true)}
    </tr>`;
    html += `<tr><td style="padding-left:16px">Cost personal acum.</td>
      <td>${fmt(h.total_cost)}€</td>
      <td style="font-weight:600">${fmt(d.total_cost)}€</td>
      ${deltaCell(d.total_cost, h.total_cost, '%', false)}
    </tr>`;
    const hHores = h.total_hores || 0;
    const dHores = Math.round((d.total_cost || 0) / 19);
    html += `<tr><td style="padding-left:16px">Hores treballades</td>
      <td>${fmt(hHores)}h</td>
      <td style="font-weight:600">${fmt(dHores)}h</td>
      ${deltaCell(dHores, hHores, '%', false)}
    </tr>`;
    html += `<tr><td style="padding-left:16px">Ràtio Cost/Vendes</td>
      <td>${h.ratio}%</td>
      <td style="font-weight:700;color:${rc(d.ratio)}">${d.ratio}%</td>
      ${deltaCell(d.ratio, h.ratio, 'pp', false)}
    </tr>`;
  });

  html += `</tbody></table>`;
  html += `<div style="font-size:10px;color:var(--sub);margin-top:6px;line-height:1.4">
    <span style="color:var(--ok)">▲ verd</span> = millor que 2025 · <span style="color:var(--bad)">▼ vermell</span> = pitjor que 2025<br>
    Δ vendes/cost/hores en % relatiu · Δ ràtio en punts percentuals (pp)
  </div>`;

  cont.innerHTML = html;
}

// Helper inline de delta (% o pp) — color verd/vermell/gris segons higherBetter
function _deltaInline(v26, v25, isPP, higherBetter){
  if(!v25 || v25 === 0) return '<span style="color:var(--sub)">—</span>';
  const d = isPP ? (v26 - v25) : ((v26 - v25) / v25 * 100);
  const isGood = higherBetter ? d > 0 : d < 0;
  const col = Math.abs(d) < 0.05 ? 'var(--sub)' : isGood ? 'var(--ok)' : 'var(--bad)';
  const sign = d >= 0 ? '+' : '';
  return `<span style="color:${col};font-weight:600">${sign}${d.toFixed(1)}${isPP?'pp':'%'}</span>`;
}

// Helper compartit per cel·les comparatives 26/25 + Δ
// retorn: {v26 (gran), v25 (petit a sota), Δ% acolorit}
function _cmpCell(v26, v25, opts){
  opts = opts || {};
  const unit = opts.unit || '€';  // '€', 'h', '%', 'k€', 'p'
  const higherBetter = opts.higherBetter !== false;
  const isPP = unit === 'pp';
  
  function fmtV(v){
    if(v == null) return '—';
    if(unit === '%') return v.toFixed(1) + '%';
    if(unit === 'h') return fmt(v) + 'h';
    if(unit === 'k€') return (v/1000).toFixed(1) + 'k€';
    if(unit === 'pp') return v.toFixed(1) + '%';
    return fmt(v) + '€';
  }
  
  let delta = '';
  if(v25 != null && v25 !== 0 && v26 != null){
    const d = isPP ? (v26 - v25) : ((v26 - v25) / v25 * 100);
    const isGood = higherBetter ? d > 0 : d < 0;
    const col = Math.abs(d) < 0.05 ? 'var(--sub)' : isGood ? 'var(--ok)' : 'var(--bad)';
    const sign = d >= 0 ? '+' : '';
    const suf = isPP ? 'pp' : '%';
    delta = `<div style="font-size:9px;color:${col};font-weight:700;line-height:1">${sign}${d.toFixed(1)}${suf}</div>`;
  } else if(v25 == null || v25 === 0){
    delta = `<div style="font-size:9px;color:var(--sub);line-height:1">—</div>`;
  }
  
  return `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">
    <div style="font-weight:700;line-height:1.1">${fmtV(v26)}</div>
    <div style="font-size:9px;color:var(--sub);line-height:1">${fmtV(v25)}</div>
    ${delta}
  </div>`;
}

  fws.forEach((fw, i) => {
    const v26 = d26.fw_vendes[i] || 0;
    const v25 = (d25.fw_vendes && d25.fw_vendes[i]) || 0;
    const c26 = d26.fw_cost[i] || 0;
    const c25 = (d25.fw_cost && d25.fw_cost[i]) || 0;
    const r26 = d26.fw_ratio[i] || 0;
    const r25 = (d25.fw_ratio && d25.fw_ratio[i]) || 0;
    tV += `<tr>
      <td style="font-weight:600">${fw}</td>
      <td style="text-align:right;font-weight:600">${fmt(v26)}€</td>
      <td style="text-align:right;color:var(--sub)">${fmt(v25)}€</td>
      <td style="text-align:right">${_deltaInline(v26, v25, false, true)}</td>
      <td style="text-align:right;font-weight:600">${fmt(c26)}€</td>
      <td style="text-align:right;color:var(--sub)">${fmt(c25)}€</td>
      <td style="text-align:right">${_deltaInline(c26, c25, false, false)}</td>
      <td style="text-align:right;font-weight:600;color:${rc(r26)}">${r26}%</td>
      <td style="text-align:right;color:var(--sub)">${r25}%</td>
      <td style="text-align:right">${_deltaInline(r26, r25, true, false)}</td>
    </tr>`;
  });
  // Total
  tV += `<tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,.03)">
    <td style="font-weight:700">Total</td>
    <td style="text-align:right;font-weight:700">${fmt(d26.total_vendes)}€</td>
    <td style="text-align:right;color:var(--sub);font-weight:600">${fmt(d25.total_vendes)}€</td>
    <td style="text-align:right">${_deltaInline(d26.total_vendes, d25.total_vendes, false, true)}</td>
    <td style="text-align:right;font-weight:700">${fmt(d26.total_cost)}€</td>
    <td style="text-align:right;color:var(--sub);font-weight:600">${fmt(d25.total_cost)}€</td>
    <td style="text-align:right">${_deltaInline(d26.total_cost, d25.total_cost, false, false)}</td>
    <td style="text-align:right;font-weight:700;color:${rc(d26.ratio)}">${d26.ratio}%</td>
    <td style="text-align:right;color:var(--sub);font-weight:600">${d25.ratio}%</td>
    <td style="text-align:right">${_deltaInline(d26.ratio, d25.ratio, true, false)}</td>
  </tr></tbody></table>`;
  html += `<div class="card-scroll">
    <div class="ch"><span class="ct">Vendes/Cost/Ràtio setmanals · 2026 vs 2025</span></div>
    <div class="cb" style="padding:6px 10px;overflow:auto;max-height:65vh">${tV}</div>
  </div>`;
  
  // Heatmap comparatiu (mostra 2 heatmaps superposats)
  if(d26.heatmap && d25.heatmap){
    const turns = Object.keys(d26.heatmap);
    const dies = ['Dl','Dt','Dc','Dj','Dv','Ds','Dg'];
    let tHM = `<table class="dtbl" style="font-size:9px"><thead><tr><th>Torn</th>${dies.map(d=>`<th>${d}</th>`).join('')}<th>Total</th></tr></thead><tbody>`;
    turns.forEach(t => {
      const r26 = d26.heatmap[t] || [0,0,0,0,0,0,0];
      const r25 = d25.heatmap[t] || [0,0,0,0,0,0,0];
      const tot26 = r26.reduce((a,b)=>a+b, 0);
      const tot25 = r25.reduce((a,b)=>a+b, 0);
      if(tot26 === 0 && tot25 === 0) return;
      tHM += `<tr><td style="font-weight:600">${t}</td>`;
      r26.forEach((v26,i) => {
        const v25 = r25[i] || 0;
        tHM += `<td style="text-align:center;padding:2px 4px">${_cmpCell(v26, v25, {unit:'€', higherBetter:true})}</td>`;
      });
      tHM += `<td style="text-align:center;padding:2px 4px">${_cmpCell(tot26, tot25, {unit:'€', higherBetter:true})}</td></tr>`;
    });
    tHM += `</tbody></table>`;
    html += `<div class="card-scroll">
      <div class="ch"><span class="ct">Heatmap vendes torn × dia · 2026 vs 2025</span></div>
      <div class="cb" style="padding:6px 8px;overflow:auto;max-height:55vh">${tHM}</div>
    </div>`;
  }
  
  // Top/Bottom 5 dies — side-by-side
  if(d26.top5 && d25.top5){
    let tTop = `<table class="dtbl" style="font-size:10px;width:100%">
      <thead><tr>
        <th colspan="3" style="text-align:center;background:rgba(31,56,100,.05)">2026</th>
        <th colspan="3" style="text-align:center;background:rgba(0,0,0,.04)">2025</th>
      </tr><tr>
        <th>Data</th><th>Dia</th><th style="text-align:right">Vendes</th>
        <th>Data</th><th>Dia</th><th style="text-align:right">Vendes</th>
      </tr></thead><tbody>`;
    const maxN = Math.max(d26.top5.length, d25.top5.length);
    for(let i = 0; i < maxN; i++){
      const r26 = d26.top5[i]; const r25 = d25.top5[i];
      tTop += `<tr>
        <td>${r26?r26.data:'—'}</td><td style="color:var(--sub)">${r26?r26.dia:'—'}</td><td style="text-align:right;font-weight:700">${r26?fmt(r26.v)+'€':'—'}</td>
        <td>${r25?r25.data:'—'}</td><td style="color:var(--sub)">${r25?r25.dia:'—'}</td><td style="text-align:right;font-weight:600;color:var(--sub)">${r25?fmt(r25.v)+'€':'—'}</td>
      </tr>`;
    }
    tTop += `</tbody></table>`;
    html += `<div class="card"><div class="ch"><span class="ct">🏆 Top 5 dies · 2026 vs 2025</span></div><div class="cb" style="padding:4px 10px;overflow-x:auto">${tTop}</div></div>`;
  }
  
  if(d26.bottom5 && d25.bottom5){
    let tBot = `<table class="dtbl" style="font-size:10px;width:100%">
      <thead><tr>
        <th colspan="3" style="text-align:center;background:rgba(31,56,100,.05)">2026</th>
        <th colspan="3" style="text-align:center;background:rgba(0,0,0,.04)">2025</th>
      </tr><tr>
        <th>Data</th><th>Dia</th><th style="text-align:right">Vendes</th>
        <th>Data</th><th>Dia</th><th style="text-align:right">Vendes</th>
      </tr></thead><tbody>`;
    const maxN = Math.max(d26.bottom5.length, d25.bottom5.length);
    for(let i = 0; i < maxN; i++){
      const r26 = d26.bottom5[i]; const r25 = d25.bottom5[i];
      tBot += `<tr>
        <td>${r26?r26.data:'—'}</td><td style="color:var(--sub)">${r26?r26.dia:'—'}</td><td style="text-align:right;font-weight:700">${r26?fmt(r26.v)+'€':'—'}</td>
        <td>${r25?r25.data:'—'}</td><td style="color:var(--sub)">${r25?r25.dia:'—'}</td><td style="text-align:right;font-weight:600;color:var(--sub)">${r25?fmt(r25.v)+'€':'—'}</td>
      </tr>`;
    }
    tBot += `</tbody></table>`;
    html += `<div class="card"><div class="ch"><span class="ct">📉 Bottom 5 dies · 2026 vs 2025</span></div><div class="cb" style="padding:4px 10px;overflow-x:auto">${tBot}</div></div>`;
  }
  
  // Gràfic comparatiu vendes setmanals
  const cgId = `cg-cmp-${idx}-${loc.replace(/\s+/g,'')}`;
  html += `<div class="card-scroll">
    <div class="ch"><span class="ct">Vendes setmanals 2025 vs 2026</span></div>
    <div class="cb" style="padding:6px 4px 8px">
      <div class="cw"><canvas id="${cgId}"></canvas></div>
    </div>
  </div>`;
  
  // Gràfic comparatiu ràtio acumulat
  const crId = `cr-cmp-${idx}-${loc.replace(/\s+/g,'')}`;
  html += `<div class="card">
    <div class="ch"><span class="ct">Ràtio P/V acumulat 2025 vs 2026</span></div>
    <div class="cb" style="padding:6px 4px 8px">
      <div class="cws"><canvas id="${crId}"></canvas></div>
    </div>
  </div>`;
  
  // Programa renderització dels charts
  if(container){
    container._charts = container._charts || [];
    container._charts.push({cgId, crId, loc, fws, d26, d25, col});
  }
  
  return html;
}

function renderLocDetailCompar(){
  const el = document.getElementById('loc-detail');
  if(!el) return;
  if(typeof DV_HIST === 'undefined' || !DV_HIST){
    el.innerHTML = `<div style="padding:30px;text-align:center;color:var(--sub)">No hi ha dades 2025 per comparar</div>`;
    return;
  }
  const locsToShow = curLoc === 'TOTAL' ? LOCS.filter(l => DV_HIST[l]) : (DV_HIST[curLoc] ? [curLoc] : []);
  if(locsToShow.length === 0){
    el.innerHTML = `<div style="padding:30px;text-align:center;color:var(--sub)">${curLoc} no té dades 2025 per comparar</div>`;
    return;
  }
  
  const ctxStore = {_charts: []};
  let html = '';
  
  // Si TOTAL, primer un resum del grup
  if(curLoc === 'TOTAL'){
    const totV26 = locsToShow.reduce((s,l)=>s+DV[l].total_vendes,0);
    const totC26 = locsToShow.reduce((s,l)=>s+DV[l].total_cost,0);
    const totR26 = totV26>0 ? totC26/totV26*100 : 0;
    const totV25 = locsToShow.reduce((s,l)=>s+DV_HIST[l].total_vendes,0);
    const totC25 = locsToShow.reduce((s,l)=>s+DV_HIST[l].total_cost,0);
    const totR25 = totV25>0 ? totC25/totV25*100 : 0;
    const dV = (totV26-totV25)/totV25*100;
    const dC = (totC26-totC25)/totC25*100;
    const dR = totR26-totR25;
    
    html += `<div class="loc-banner" style="background:#55555512;border-left:4px solid #555">
      <div style="width:10px;height:10px;border-radius:50%;background:#555;flex-shrink:0"></div>
      <div style="flex:1"><div style="font-size:15px;font-weight:700;color:#555">📊 Grup · Comparativa 2026 vs 2025</div>
      <div style="font-size:11px;color:#555;opacity:.75">${locsToShow.length} locals · fw1–fw16</div></div>
    </div>
    <div class="krow k3" style="margin-bottom:8px">
      <div class="kpi">
        <div class="kl">Vendes Grup</div>
        <div class="kv" style="font-size:15px">${fmt(totV26)}€</div>
        <div style="font-size:9px;color:var(--sub)">vs ${fmt(totV25)}€ '25</div>
        <div style="font-size:10px;font-weight:700;color:${dV>0?'var(--ok)':'var(--bad)'}">${dV>=0?'+':''}${dV.toFixed(1)}%</div>
      </div>
      <div class="kpi">
        <div class="kl">Cost Grup</div>
        <div class="kv" style="font-size:15px">${(totC26/1000).toFixed(1)}k€</div>
        <div style="font-size:9px;color:var(--sub)">vs ${(totC25/1000).toFixed(1)}k '25</div>
        <div style="font-size:10px;font-weight:700;color:${dC<0?'var(--ok)':'var(--bad)'}">${dC>=0?'+':''}${dC.toFixed(1)}%</div>
      </div>
      <div class="kpi">
        <div class="kl">Ràtio Grup</div>
        <div class="kv ${sf(totR26)}" style="font-size:15px">${pc(totR26)}</div>
        <div style="font-size:9px;color:var(--sub)">vs ${pc(totR25)} '25</div>
        <div style="font-size:10px;font-weight:700;color:${dR<0?'var(--ok)':'var(--bad)'}">${dR>=0?'+':''}${dR.toFixed(1)}pp</div>
      </div>
    </div>`;
    
    // Taula resum per local 2026 vs 2025
    let tL = `<table class="dtbl" style="font-size:10px"><thead><tr><th>Local</th><th style="text-align:right">Vendes</th><th style="text-align:right">Cost</th><th style="text-align:right">Ràtio</th></tr></thead><tbody>`;
    locsToShow.forEach(l => {
      const i = LOCS.indexOf(l);
      const d26 = DV[l]; const d25 = DV_HIST[l];
      tL += `<tr>
        <td style="color:${GCOLS[i]};font-weight:600">${l.replace('SM ','').replace('Picu ','P.')}</td>
        <td>${_cmpCell(d26.total_vendes, d25.total_vendes, {unit:'€', higherBetter:true})}</td>
        <td>${_cmpCell(d26.total_cost, d25.total_cost, {unit:'€', higherBetter:false})}</td>
        <td>${_cmpCell(d26.ratio, d25.ratio, {unit:'%', higherBetter:false})}</td>
      </tr>`;
    });
    tL += `<tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,.03)">
      <td style="font-weight:700">Grup</td>
      <td>${_cmpCell(totV26, totV25, {unit:'€', higherBetter:true})}</td>
      <td>${_cmpCell(totC26, totC25, {unit:'€', higherBetter:false})}</td>
      <td>${_cmpCell(totR26, totR25, {unit:'%', higherBetter:false})}</td>
    </tr></tbody></table>`;
    html += `<div class="card"><div class="ch"><span class="ct">Resum per local · 2026 vs 2025</span></div><div class="cb" style="padding:6px 10px;overflow-x:auto">${tL}</div></div>`;
  }
  
  // Per cada local, bloc complet comparatiu
  locsToShow.forEach(l => {
    html += _renderLocCompar(l, ctxStore);
  });
  
  el.innerHTML = html;
  
  // Render dels charts
  setTimeout(() => {
    ctxStore._charts.forEach(c => {
      const ctx = document.getElementById(c.cgId);
      if(ctx){
        dk(c.cgId);
        charts[c.cgId] = new Chart(ctx.getContext('2d'), {
          type:'line',
          data:{labels:c.fws, datasets:[
            {label:'2025', data:c.d25.fw_vendes, borderColor:'#999', backgroundColor:'transparent', borderWidth:1.5, borderDash:[5,3], pointRadius:2, tension:.3},
            {label:'2026', data:c.d26.fw_vendes, borderColor:c.col, backgroundColor:'transparent', borderWidth:2.5, pointRadius:3, tension:.3},
          ]},
          options:{responsive:true, maintainAspectRatio:false,
            plugins:{legend:{display:true,position:'bottom',labels:{font:{size:10},boxWidth:10,padding:6}}, tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.raw)}€`}}},
            scales:{x:{grid:{display:false},ticks:{font:{size:9}}}, y:{grid:{color:'rgba(0,0,0,0.03)'},ticks:{font:{size:9},callback:v=>fmt(v)+'€'}}}
          }
        });
      }
      const ctx2 = document.getElementById(c.crId);
      if(ctx2){
        dk(c.crId);
        charts[c.crId] = new Chart(ctx2.getContext('2d'), {
          type:'line',
          data:{labels:c.fws, datasets:[
            {label:'Ràtio acum 2025', data:c.d25.fw_ratio_acum||[], borderColor:'#999', backgroundColor:'transparent', borderWidth:1.5, borderDash:[5,3], pointRadius:2, tension:.3},
            {label:'Ràtio acum 2026', data:c.d26.fw_ratio_acum||[], borderColor:c.col, backgroundColor:'transparent', borderWidth:2.5, pointRadius:3, tension:.3},
          ]},
          options:{responsive:true, maintainAspectRatio:false,
            plugins:{legend:{display:true,position:'bottom',labels:{font:{size:10},boxWidth:10,padding:6}}, tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw}%`}}},
            scales:{x:{grid:{display:false},ticks:{font:{size:9}}}, y:{grid:{color:'rgba(0,0,0,0.03)'},ticks:{font:{size:9},callback:v=>v+'%'}}}
          }
        });
      }
    });
  }, 50);
}
