<style>
:root{--bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--sub:#8e8e93;--sep:rgba(60,60,67,.1);--accent:#007aff;--ok:#34c759;--warn:#ff9f0a;--bad:#ff3b30;--r:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);padding-bottom:60px;font-size:14px}
.topbar{position:sticky;top:0;z-index:99;background:rgba(242,242,247,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:8px 14px 6px;border-bottom:.5px solid var(--sep);display:flex;align-items:center;justify-content:space-between}
.topbar-left h1{font-size:15px;font-weight:700;letter-spacing:-.3px}
.topbar-left p{font-size:11px;color:var(--sub)}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:99;background:rgba(248,248,248,.97);backdrop-filter:blur(16px);border-top:.5px solid var(--sep);display:flex;height:56px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9px;color:var(--sub);cursor:pointer;border:none;background:none;transition:color .15s}
.tab.active{color:var(--accent)}.tab svg{width:20px;height:20px}
.page{display:none;padding:8px 10px 4px;animation:fi .18s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.ch{padding:8px 12px 7px;border-bottom:.5px solid var(--sep);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.4px}
.cb{padding:10px 12px}
.krow{display:grid;gap:6px;margin-bottom:8px}
.k2{grid-template-columns:1fr 1fr}.k3{grid-template-columns:1fr 1fr 1fr}
.kpi{background:var(--card);border-radius:var(--r);padding:8px 10px}
.kl{font-size:10px;color:var(--sub);margin-bottom:2px}
.kv{font-size:20px;font-weight:700;letter-spacing:-.7px;line-height:1.1}
.kv.ok{color:var(--ok)}.kv.warn{color:var(--warn)}.kv.bad{color:var(--bad)}
.ks{font-size:10px;color:var(--sub);margin-top:1px}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600}
.pill.ok{background:rgba(52,199,89,.14);color:#1a7a37}
.pill.warn{background:rgba(255,159,10,.14);color:#b36b00}
.pill.bad{background:rgba(255,59,48,.14);color:#c0392b}
.loc-sticky{position:sticky;top:52px;z-index:50;padding:6px 10px;background:rgba(242,242,247,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:.5px solid var(--sep);margin:0 -10px 10px}
.seg{display:flex;background:rgba(118,118,128,.12);border-radius:8px;padding:2px}
.sb{flex:1;padding:5px 2px;border:none;background:none;font-size:10px;font-weight:500;color:var(--sub);border-radius:6px;cursor:pointer;transition:all .15s;text-align:center}
.sb.active{background:var(--card);color:var(--text);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.loc-banner{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;margin-bottom:8px}
.cw{position:relative;height:190px}
.cws{position:relative;height:160px}
.cwm{position:relative;height:175px}
/* Taules dades */
.dtbl{width:100%;border-collapse:collapse;font-size:10px}
.dtbl th{color:var(--sub);font-weight:600;padding:3px 2px 4px;text-align:center;border-bottom:.5px solid var(--sep);white-space:nowrap;font-size:9px}
.dtbl th:first-child{text-align:left;padding-left:2px;min-width:42px}
.dtbl td{padding:3px 2px;text-align:center;border-bottom:.5px solid var(--sep);font-size:9px}
.dtbl td:first-child{text-align:left;padding-left:2px;font-weight:600;font-size:9px;white-space:nowrap}
.dtbl tr:last-child td{border-bottom:none}
.dtbl .tot-col{font-weight:700;border-left:.5px solid var(--sep)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:5px 8px;border-bottom:.5px solid var(--sep);text-align:right}
.tbl th:first-child{text-align:left}
.tbl td{padding:6px 8px;border-bottom:.5px solid var(--sep);text-align:right}
.tbl td:first-child{text-align:left;font-weight:500}
.tbl tr:last-child td{border-bottom:none}
.hm{display:grid;gap:2px}
.hml{color:var(--sub);display:flex;align-items:center;font-size:9px;font-weight:600}
.hmc{border-radius:4px;height:26px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.rg{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;text-align:center}
.rg .lbl{font-size:9px;font-weight:600;color:var(--sub);display:flex;align-items:center;font-size:9px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.day-row{display:flex;flex-direction:column;padding:5px 0;border-bottom:.5px solid var(--sep)}
.day-row:last-child{border-bottom:none}
.abs-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid var(--sep)}
.abs-row:last-child{border-bottom:none}
</style>

// pin: codi numèric | rol: admin / soci / director / manager

// tabs: pestanyes visibles a la barra inferior
// seccions: [] = totes | llista = les permeses a Locals/Personal
const USERS = [
  {nom:'Josep Maria', pin:'1234', rol:'admin',   local:null,            tabs:['resum','locals','personal','productes'], seccions:[]},
  {nom:'Soci',        pin:'5678', rol:'soci',    local:null,            tabs:['resum','locals','productes'],            seccions:[]},
  {nom:'Mgr.Sarrià',  pin:'9111', rol:'manager', local:'SM Sarrià',    tabs:['locals','personal','productes'],          seccions:[]},
  {nom:'Mgr.Sabadell',pin:'9222', rol:'manager', local:'SM Sabadell',  tabs:['locals','personal','productes'],          seccions:[]},
  {nom:'Mgr.PSbd',    pin:'9333', rol:'manager', local:'Picu Sabadell',tabs:['locals','personal','productes'],          seccions:[]},
  {nom:'Mgr.PStC',    pin:'9444', rol:'manager', local:'Picu StCugat', tabs:['locals','personal','productes'],          seccions:[]},
];

let SESSION = null;

function initAuth(){
  const saved = localStorage.getItem('mg_session');
  if(saved){
    try{
      const s = JSON.parse(saved);
      const u = USERS.find(u=>u.pin===s.pin && u.nom===s.nom);
      if(u){ SESSION=u; applySession(); return; }
    }catch(e){}
  }
  document.getElementById('login-overlay').style.display='flex';
}

function doLogin(){
  const pin = document.getElementById('login-pin').value.trim();
  const u = USERS.find(u=>u.pin===pin);
  if(!u){ document.getElementById('login-error').textContent='PIN incorrecte'; return; }
  localStorage.setItem('mg_session', JSON.stringify({pin:u.pin,nom:u.nom}));
  SESSION = u;
  document.getElementById('login-overlay').style.display='none';
  applySession();
}

function doLogout(){
  localStorage.removeItem('mg_session');
  SESSION=null;
  location.reload();
}

function applySession(){
  const u = SESSION;
  // Nom usuari al topbar
  document.getElementById('user-label').textContent = u.nom;

  // Mostrar/amagar pestanyes de la tabbar
  ['resum','locals','personal','productes'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    if(el) el.style.display = u.tabs.includes(t)?'':'none';
  });

  // Si manager: fixar local
  if(u.local){
    curLoc = u.local;
    curPer = u.local;
  }

  // Pestanya inicial = primera visible
  const primera = u.tabs[0];
  showPage(primera);

  // Iniciar app (només si admin/soci veuen el resum complet)
  if(!u.local) renderResum();
}

function showPage(p){
  if(!SESSION) return;
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  const pageEl=document.getElementById('page-'+p);
  const tabEl=document.getElementById('tab-'+p);
  if(pageEl) pageEl.classList.add('active');
  if(tabEl) tabEl.classList.add('active');
  // Si manager: forçar el seu local
  if(SESSION.local){ curLoc=SESSION.local; curPer=SESSION.local; }
  if(p==='resum')renderResum();
  if(p==='locals'){
    buildSeg('loc-seg',curLoc,selLocal);
    if(SESSION.local) document.getElementById('loc-seg').style.display='none';
    renderLocDetail();
  }
  if(p==='personal'){
    // Personal té Grup + 4 locals (o 1 si manager)
    if(!SESSION.local && curPer!=='TOTAL' && !LOCS.includes(curPer)) curPer='TOTAL';
    buildSeg('per-seg',curPer,selPer);
    if(SESSION.local) document.getElementById('per-seg').style.display='none';
    renderPerDetail();
  }
  if(p==='productes'){
    curProdSec='articles';
    renderProductes();
  }
  window.scrollTo(0,0);
}

function buildSeg(id,cur,fn){
  const esLocal=fn===selLocal, esPer=fn===selPer;
  let llista;
  if(SESSION&&SESSION.local){
    llista=[SESSION.local];
  } else if(esLocal){
    llista=LOCS_ALL;
  } else if(esPer){
    llista=['TOTAL',...LOCS];
  } else {
    llista=LOCS;
  }
  const colMap={'TOTAL':'#555','SM Sarrià':'#1F3864','SM Sabadell':'#1E6B3C','Picu Sabadell':'#E07B30','Picu StCugat':'#9B6BD4'};
  document.getElementById(id).innerHTML=llista.map(l=>{
    const label=l==='TOTAL'?'Grup':l.replace('SM Sarrià','S.Sarrià').replace('SM Sabadell','S.Sbd').replace('Picu Sabadell','P.Sbd').replace('Picu StCugat','P.StC');
    return`<button class="sb${l===cur?' active':''}" onclick="${fn.name}('${l}')">${label}</button>`;
  }).join('');
}
function selLocal(l){curLoc=l;buildSeg('loc-seg',l,selLocal);renderLocDetail();window.scrollTo(0,52);}
function selPer(l){curPer=l;buildSeg('per-seg',l,selPer);renderPerDetail();window.scrollTo(0,52);}

function renderResum(){
  const totV=Object.values(DV).reduce((s,d)=>s+d.total_vendes,0);
  const totC=Object.values(DV).reduce((s,d)=>s+d.total_cost,0);
  const totR=totC/totV*100;

  // Taula resum: Local | Vendes | Cost | Ràtio | Dies
  let html=`<table class="dtbl" style="font-size:11px">
    <thead><tr>
      <th style="text-align:left">Local</th>
      <th>Vendes netes</th><th>Personal</th><th>Ràtio P/V</th><th>Dies</th>
    </tr></thead><tbody>`;
  LOCS.forEach((l,i)=>{
    const d=DV[l];
    html+=`<tr style="cursor:pointer" onclick="selLocal('${l}');showPage('locals')">
      <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${GCOLS[i]};margin-right:4px"></span>${l}</td>
      <td style="font-weight:600">${fmt(d.total_vendes)}€</td>
      <td>${fmt(d.total_cost)}€</td>
      <td style="font-weight:700;color:${rc(d.ratio)}">${pc(d.ratio)} ${si(d.ratio)}</td>
      <td style="color:var(--sub)">${d.dies}</td>
    </tr>`;
  });
  html+=`<tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,0.02)">
    <td style="font-weight:700">TOTAL</td>
    <td style="font-weight:700">${fmt(totV)}€</td>
    <td style="font-weight:700">${fmt(totC)}€</td>
    <td style="font-weight:700;color:${rc(totR)}">${pc(totR)} ${si(totR)}</td>
    <td style="color:var(--sub)">—</td>
  </tr></tbody></table>`;
  document.getElementById('resum-taula').innerHTML=html;

  const fws=DV['SM Sarrià'].fw_list.map(f=>'fw'+f);
  const mitjes=LOCS.reduce((o,l)=>{const fw=DV[l].fw_vendes;o[l]=fw.reduce((a,b)=>a+b,0)/fw.length;return o},{});

  // Gràfic vendes: línies per local + línia total grup (eix secundari per no desvirtuar)
  dk('cg');
  charts['cg']=new Chart(document.getElementById('cg').getContext('2d'),{
    type:'line',
    data:{labels:fws,datasets:[
      ...LOCS.map((l,i)=>({label:l,data:DV[l].fw_vendes,borderColor:GCOLS[i],backgroundColor:'transparent',borderWidth:2,pointRadius:2,tension:.3,yAxisID:'y'})),
      {label:'Total grup',data:GRUP_V,borderColor:'#aaa',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,3],pointRadius:2,tension:.3,yAxisID:'y2'}

    tw+=`<tr><td style="color:#ff9f0a">Ràtio</td>${d.fw_ratio.map(r=>`<td style="color:${rc(r)};font-weight:600">${r}%</td>`).join('')}<td class="tot-col" style="color:${rc(d.ratio)};font-weight:700">${pc(d.ratio)}</td></tr>`;
    tw+=`<tr><td style="color:#aaa">Acum.</td>${d.fw_ratio_acum.map(r=>`<td style="color:${rc(r)}">${r}%</td>`).join('')}<td class="tot-col" style="color:${rc(d.ratio)};font-weight:700">${pc(d.ratio)}</td></tr>`;
    tw+='</tbody></table>';
    document.getElementById('lm-taula').innerHTML=tw;

    // Gràfic dies barres+línia
    dk('cld');
    charts['cld']=new Chart(document.getElementById('c-ld').getContext('2d'),{
      type:'bar',
      data:{labels:DIES,datasets:[
        {type:'bar',label:'Vendes',data:d.avg_dia_vendes,backgroundColor:DIES.map((_,i)=>i>=4?col+'ee':col+'66'),borderRadius:4,borderSkipped:false,yAxisID:'y'},

        scales:{x:{grid:{display:false},ticks:{font:{size:10}},categoryPercentage:0.6,barPercentage:0.8},y:{position:'left',grid:{color:'rgba(0,0,0,0.03)'},ticks:{font:{size:8},callback:v=>fmt(v)+'€'}},y2:{position:'right',grid:{display:false},ticks:{font:{size:8},callback:v=>v+'%'},min:20}}
      }
    });

    // Taula torn x dia amb totals per dia i per torn
    const hm=d.heatmap;
    const ta=TORNS_V.filter(t=>hm[t]&&hm[t].some(v=>v>0));
    // Totals per dia (suma de tots els torns)
    const totPerDia=DIES.map((_,di)=>ta.reduce((s,t)=>s+(hm[t][di]||0),0));
    const totGeneral=totPerDia.reduce((a,b)=>a+b,0);
    let tdT=`<table class="dtbl"><thead><tr><th>Torn</th>${DIES.map(di=>`<th>${di}</th>`).join('')}<th class="tot-col">Total</th></tr></thead><tbody>`;
    ta.forEach(t=>{
      const totT=hm[t].reduce((a,b)=>a+b,0);
      tdT+=`<tr><td style="color:${col};font-weight:700">${t}</td>`;
      hm[t].forEach(v=>tdT+=`<td>${v>0?fmt(v)+'€':'—'}</td>`);
      tdT+=`<td class="tot-col" style="font-weight:700">${fmt(totT)}€</td></tr>`;
    });
    // Fila total dies
    tdT+=`<tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,0.02)"><td style="font-weight:700">Total</td>`;
    totPerDia.forEach(v=>tdT+=`<td style="font-weight:700">${fmt(v)}€</td>`);
    tdT+=`<td class="tot-col" style="font-weight:700">${fmt(totGeneral)}€</td></tr>`;
    tdT+=ratioGrid(d);
    tdT+='</tbody></table>';
    document.getElementById('ld-taula').innerHTML=tdT;
    renderLocVendesDetail(curLoc, col);
  
  },50);
}

function ratioGrid(d){
  const avgRatio=d.avg_dia_ratio.reduce((a,b)=>a+b,0)/d.avg_dia_ratio.length;
  const cells=d.avg_dia_ratio.map(r=>`<td style="padding:3px 2px;text-align:center;font-weight:700;color:${rc(r)};background:${rcbg(r)}">${r.toFixed(1)}%</td>`).join('');
  return`<tr style="border-top:1px solid var(--sep)"><td style="padding:3px 2px;font-weight:600;font-size:9px;color:var(--sub)">Ràtio P/V</td>${cells}<td class="tot-col" style="font-weight:700;color:${rc(avgRatio)};background:${rcbg(avgRatio)};text-align:center">${avgRatio.toFixed(1)}%</td></tr>`;
}

function topRows(rows,bad){
  return rows.map(r=>`<div class="day-row">
    <div style="display:flex;justify-content:space-between">
      <span style="font-size:12px;font-weight:700">${r.data} <span style="color:var(--sub);font-size:10px">${r.dia}</span></span>
      <span style="font-size:12px;font-weight:700">${fmt(r.v)}€</span>

      <span style="font-size:10px;color:var(--sub)">${CTX[r.data]||''}</span>
      <span style="font-size:11px;font-weight:600;color:${bad?'var(--bad)':rc(r.r)}">${r.r}%</span>
    </div>
  </div>`).join('');
}

function tornTaula(p,col){
  const torns=['Matí','Migdia','Tarda','Nit'];
  const actius=torns.filter(t=>(p.torn_coc[t]||0)+(p.torn_sal[t]||0)>0);
  const totVac=p.tot_hvac||0;
  return`<table class="tbl">
    <thead><tr><th>Torn</th><th>Cuina</th><th>Sala</th><th>Total</th></tr></thead>
    <tbody>${actius.map(t=>{const c=p.torn_coc[t]||0,s=p.torn_sal[t]||0,tot=c+s;
      return`<tr><td>${t}</td><td>${fmt(c)}h</td><td>${fmt(s)}h</td><td style="font-weight:700">${fmt(tot)}h</td></tr>`;
    }).join('')}
    <tr style="background:rgba(0,0,0,0.02)"><td style="font-weight:700">Total</td><td style="font-weight:700">${fmt(p.tot_hcoc)}h</td><td style="font-weight:700">${fmt(p.tot_hsal)}h</td><td style="font-weight:700">${fmt(p.tot_h)}h</td></tr>
    <tr style="background:#f5f5f7"><td style="color:#aaa;font-style:italic;font-size:9px">Vacances</td><td style="color:#aaa;font-size:9px">—</td><td style="color:#aaa;font-size:9px">—</td><td style="color:#aaa;font-size:9px">${totVac>0?totVac+'h':'—'}</td></tr>
    </tbody></table>`;
}

  return`<table class="dtbl"><thead><tr><th></th>${DIES.map(d=>`<th>${d}</th>`).join('')}<th class="tot-col">Total</th></tr></thead><tbody>
    <tr><td style="color:${col};font-weight:700">Cuina</td>${p.avg_dia_hcoc.map(v=>`<td>${v>0?v+'h':'—'}</td>`).join('')}<td class="tot-col" style="font-weight:700">${fmt(p.tot_hcoc)}h</td></tr>
    <tr><td style="color:${col}99;font-weight:700">Sala</td>${p.avg_dia_hsal.map(v=>`<td>${v>0?v+'h':'—'}</td>`).join('')}<td class="tot-col" style="font-weight:700">${fmt(p.tot_hsal)}h</td></tr>

function renderLocVendesDetail(loc, col){
  const el = document.getElementById('loc-vendes-detail');
  if(!el || !LD.locals[loc]) return;
  const d = LD.locals[loc];
  const fws = LD.weeks.map(w=>'fw'+w);
  const N = LD.weeks.length;

  // Sub-segment: Famílies / Menjar / Postres / Begudes  ×  Unitats / Euros
  let html = `
  <div class="card" style="margin-top:8px">
    <div class="ch" style="background:${col}18;flex-direction:column;gap:6px;align-items:flex-start">
      <span class="ct" style="color:${col}">Vendes per família i article · evolució setmanal</span>
      <div style="display:flex;gap:4px;flex-wrap:wrap;width:100%">
        <div class="seg" style="flex:1">
          <button class="sb active" id="lv-sec-fam" onclick="lvSec('fam','${loc}','${col}')">Famílies</button>
          <button class="sb" id="lv-sec-men" onclick="lvSec('men','${loc}','${col}')">🍽 Menjar</button>
          <button class="sb" id="lv-sec-pos" onclick="lvSec('pos','${loc}','${col}')">🍮 Postres</button>
          <button class="sb" id="lv-sec-beg" onclick="lvSec('beg','${loc}','${col}')">🍺 Begudes</button>
        </div>
      </div>
      <div style="display:flex;gap:4px">
        <button class="sb active" id="lv-unit-uni" onclick="lvUnit('uni','${loc}','${col}')">Unitats</button>
        <button class="sb" id="lv-unit-eur" onclick="lvUnit('eur','${loc}','${col}')">Euros</button>
      </div>
    </div>
    <div class="cb" style="padding:4px 0 0;overflow-x:auto">
      <div id="lv-taula"></div>
    </div>
  </div>`;
  el.innerHTML = html;
  lvRender('fam','uni',loc,col);
}

let _lvSec='fam', _lvUnit='uni';

function lvSec(sec,loc,col){
  _lvSec=sec;
  ['fam','men','pos','beg'].forEach(s=>{ const b=document.getElementById('lv-sec-'+s); if(b) b.classList.toggle('active',s===sec); });
  lvRender(sec,_lvUnit,loc,col);
}
function lvUnit(unit,loc,col){
  _lvUnit=unit;
  ['uni','eur'].forEach(u=>{ const b=document.getElementById('lv-unit-'+u); if(b) b.classList.toggle('active',u===unit); });
  lvRender(_lvSec,unit,loc,col);
}

function lvRender(sec, unit, loc, col){
  const el = document.getElementById('lv-taula');
  if(!el || !LD.locals[loc]) return;
  const d = LD.locals[loc];
  const fws = LD.weeks.map(w=>'fw'+w);
  const isEur = unit==='eur';

  let items, dataObj, mitjaObj;
  if(sec==='fam'){
    items = d.fam.order;
    dataObj = isEur ? d.fam.eur : d.fam.uni;
    mitjaObj = isEur ? d.fam.mitja_eur : d.fam.mitja_uni;
  } else {
    const secMap = {men:'MENJAR',pos:'POSTRES',beg:'BEGUDES'};
    const s = secMap[sec];
    items = d.art[s].order;
    dataObj = isEur ? d.art[s].eur : d.art[s].uni;
    mitjaObj = isEur ? d.art[s].mitja_eur : d.art[s].mitja_uni;
  }

  // Color coding per cel·la vs mitja pròpia
  function cellColor(val, mitja){
    if(mitja===0) return '';
    const p = (val-mitja)/mitja;
    if(p>0.20) return 'background:#2E7D32;color:#fff';
    if(p>0.10) return 'background:#81C784;color:#1B5E20';
    if(p>=-0.10) return 'background:#FFF9C4;color:#5D4037';
    if(p>=-0.20) return 'background:#FFB74D;color:#4E2600';
    return 'background:#C62828;color:#fff';
  }

  // Week header colors
  function wkCol(w){ return w<=4?'#1A5276':w<=9?'#1A7A5E':'#5B3A8C'; }

  // Amplades: Article=130px, Mitja=46px, Acum=50px — sticky a left:0, 130, 176
  const MITJA_LEFT = 130, ACUM_LEFT = 176;

  let tbl = `<table style="border-collapse:collapse;font-size:9px;width:100%">
    <thead><tr>
      <th style="text-align:left;padding:3px 6px;position:sticky;left:0;z-index:3;background:#fff;min-width:130px;font-size:8px;color:var(--sub)">Article / Família</th>
      <th style="padding:3px 4px;text-align:right;font-size:8px;color:var(--sub);white-space:nowrap;position:sticky;left:${MITJA_LEFT}px;z-index:3;background:#fff;border-right:.5px solid var(--sep)">Mitja/fw</th>
      <th style="padding:3px 4px;text-align:right;font-size:8px;color:var(--sub);white-space:nowrap;position:sticky;left:${ACUM_LEFT}px;z-index:3;background:#f5f5f7;min-width:50px;border-right:1px solid var(--sep)">Acum.</th>`;
  fws.forEach((fw,i)=>{ tbl+=`<th style="padding:2px 3px;text-align:right;background:${wkCol(LD.weeks[i])};color:#fff;font-size:8px;min-width:28px">${fw}</th>`; });
  tbl+=`</tr></thead><tbody>`;

  // Totals per calcular % cobertura
  const totMitja = items.reduce((s,item)=>(mitjaObj[item]||0)>0?s+(mitjaObj[item]||0):s, 0);

  items.forEach((item,ri)=>{
    const vals = dataObj[item] || [];
    const mitja = mitjaObj[item] || 0;
    const acum = vals.reduce((a,b)=>a+b,0);
    const bgCol = ri%2===0?'#fff':'#f8f8f8';
    const bgAcum = ri%2===0?'#f5f5f7':'#ececf0';
    tbl+=`<tr><td style="padding:3px 6px;font-weight:600;font-size:8.5px;position:sticky;left:0;z-index:2;background:${bgCol};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px">${item}</td>`;
    tbl+=`<td style="padding:3px 4px;text-align:right;font-weight:700;font-size:8px;position:sticky;left:${MITJA_LEFT}px;z-index:2;background:${bgCol};border-right:.5px solid var(--sep)">${isEur?fmt(Math.round(mitja))+'€':fmt(Math.round(mitja))}</td>`;
    tbl+=`<td style="padding:3px 4px;text-align:right;font-weight:700;font-size:8px;position:sticky;left:${ACUM_LEFT}px;z-index:2;background:${bgAcum};border-right:1px solid var(--sep)">${isEur?fmt(Math.round(acum))+'€':fmt(Math.round(acum))}</td>`;
    vals.forEach((v,wi)=>{
      const style = cellColor(v, mitja);
      tbl+=`<td style="padding:2px 3px;text-align:right;font-size:8px;${style}">${isEur?fmt(Math.round(v))+'€':fmt(v)}</td>`;
    });
    tbl+=`</tr>`;
  });

  // Fila cobertura: per a menjar/postres/begudes; per a famílies mostrar les 3 seccions
  if(isEur){
    if(sec!=='fam'){
      const secKey = {men:'MENJAR',pos:'POSTRES',beg:'BEGUDES'}[sec];
      const locIdx = LOCS.indexOf(loc);
      const k = ['sar','sbd','psb','psc'][locIdx] || 'sar';
      const pct = PD.cov[k+'_'+secKey]||0;
      const cls = pct>=85?'ok':pct>=70?'warn':'bad';
      tbl+=`<tr style="border-top:1px solid var(--sep);background:rgba(0,0,0,.03)">
        <td style="position:sticky;left:0;z-index:2;background:rgba(245,245,245,1);padding:3px 6px;font-size:8px;font-weight:600;color:var(--sub)">% cobertura ≥100€/fw</td>
        <td style="position:sticky;left:${MITJA_LEFT}px;z-index:2;background:rgba(240,240,240,1);text-align:right;font-size:9px;font-weight:700;color:var(--${cls});border-right:.5px solid var(--sep)">${pct}%</td>
        <td style="position:sticky;left:${ACUM_LEFT}px;z-index:2;background:rgba(236,236,240,1);border-right:1px solid var(--sep)"></td>
        <td colspan="${fws.length}" style="font-size:8px;color:var(--sub);padding:3px 6px">articles ≥100€/fw de mitjana</td>
      </tr>`;
    } else {
      // Famílies: mostrar cobertura per cada secció
      const locIdx = LOCS.indexOf(loc);
      const k = ['sar','sbd','psb','psc'][locIdx] || 'sar';
      [['MENJAR','🍽'],['POSTRES','🍮'],['BEGUDES','🍺']].forEach(([secKey,ic])=>{
        const pct = PD.cov[k+'_'+secKey]||100;
        const cls = pct>=85?'ok':pct>=70?'warn':'bad';
        tbl+=`<tr style="background:rgba(0,0,0,.02)">
          <td style="position:sticky;left:0;z-index:2;background:rgba(248,248,248,1);padding:3px 6px;font-size:8px;color:var(--sub)">${ic} Cob. ${secKey.charAt(0)+secKey.slice(1).toLowerCase()}</td>
          <td style="position:sticky;left:${MITJA_LEFT}px;z-index:2;background:rgba(245,245,245,1);text-align:right;font-size:9px;font-weight:700;color:var(--${cls});border-right:.5px solid var(--sep)">${pct}%</td>
          <td style="position:sticky;left:${ACUM_LEFT}px;z-index:2;background:rgba(242,242,242,1);border-right:1px solid var(--sep)"></td>
          <td colspan="${fws.length}"></td>
        </tr>`;
      });
    }
  }

  tbl+=`</tbody></table>`;
  el.innerHTML = tbl;
}

    const covVals=visLocs.map((l,i)=>{const p=PD.cov[visKeys[i]+'_'+secKey]||0;const c=covClass(p);return`<td style="text-align:right;font-size:9px;font-weight:700;color:var(--${c})">${p}%</td>`;}).join('');
    const covRow=`<tr style="border-top:1px solid var(--sep);background:rgba(0,0,0,.03)">
      <td style="font-size:8px;font-weight:600;color:var(--sub)">% cobertura ≥100€/fw</td>
      ${covVals}<td></td><td></td><td></td></tr>`;
    return rows+covRow;
  }

  const locHdrs=visLocs.map((l,i)=>`<th style="color:${visCols[i]};font-size:8px;min-width:44px;width:44px;text-align:right">${visShort[i]}</th>`).join('');
  const legend=visLocs.map((l,i)=>`<span style="font-size:8px;color:${visCols[i]};font-weight:600">■ ${visShort[i]}</span>`).join(' ');

  const ctrlBar=`<div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap">
    <div style="display:flex;gap:3px">
      <button class="sb${isEur?' active':''}" onclick="setArtUnit('eur')">\u20AC Euros</button>
      <button class="sb${!isEur?' active':''}" onclick="setArtUnit('uni')">Unitats</button>
    </div>
  </div>`;

  const seccions=[{label:'🍽 Menjar',list:PD.top_menjar,key:'MENJAR',color:'#1A3A5C'},{label:'🍮 Postres',list:PD.top_postres,key:'POSTRES',color:'#6E2F1A'},{label:'🍺 Begudes',list:PD.top_begudes,key:'BEGUDES',color:'#1A5C3A'}];
  return seccions.map((s,i)=>`
    <div class="card" style="margin-top:${i===0?4:0}px">
      <div class="ch" style="flex-direction:column;align-items:flex-start;gap:4px">
        <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
          <span class="ct" style="color:${s.color}">${s.label} · mitja setmanal</span>
          ${i===0?ctrlBar:''}
        </div>
        <div style="font-size:8px;color:var(--sub)">${legend}</div>
      </div>
      <div class="cb" style="padding:4px 8px 8px;overflow-x:auto">
        <table class="dtbl" style="width:100%;table-layout:fixed">
          <thead><tr>
            <th style="text-align:left;width:120px">Article</th>
            ${locHdrs}
            <th style="min-width:30px"></th>
            <th style="min-width:44px;text-align:right">Total</th>
            <th style="min-width:32px;text-align:right;color:var(--sub)">%</th>
          </tr></thead>
          <tbody>${artRows(s.list,s.key)}</tbody>
        </table>
      </div>
    </div>`).join('');
}
function renderProdFamilies(){
  if(typeof _famUnit==='undefined') window._famUnit='eur';
  const isEur=_famUnit==='eur';

  // Locals visibles: filtrar per manager
  const visLocs = (SESSION&&SESSION.local) ? PROD_LOCS.filter(l=>l===SESSION.local) : PROD_LOCS;
  const visKeys = visLocs.map(l=>PROD_KEYS[PROD_LOCS.indexOf(l)]);
  const visCols = visLocs.map(l=>PROD_COLS[l]);
  const visShort = visLocs.map(l=>PROD_SHORT[l]);

  const maxVal=Math.max(...PD.fam_comp.map(f=>visLocs.reduce((s,l,i)=>s+f[visKeys[i]],0)));
  const totPerLoc=visLocs.map((l,i)=>PD.fam_comp.reduce((s,f)=>s+f[visKeys[i]],0));
  const totGeneral=PD.fam_comp.reduce((s,f)=>s+visLocs.reduce((ss,l,i)=>ss+f[visKeys[i]],0),0);

  const rows=PD.fam_comp.map(f=>{
    const tot=visLocs.reduce((s,l,i)=>s+f[visKeys[i]],0);
    const pctTotal=totGeneral>0?Math.round(tot/totGeneral*100):0;
    const bars=visLocs.map((l,i)=>{const v=f[visKeys[i]];if(!v)return'';return`<div style="width:${Math.round(v/maxVal*100)}%;background:${visCols[i]}bb;height:100%"></div>`;}).join('');
    const vals=visLocs.map((l,i)=>`<td style="text-align:right;font-size:8px;color:${visCols[i]}">${f[visKeys[i]]>0?fmt(f[visKeys[i]])+(isEur?'€':''):'—'}</td>`).join('');
    return`<tr>
      <td style="font-size:9px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px">${f.fam}</td>
      <td style="padding:3px 3px;min-width:50px"><div style="display:flex;height:10px;border-radius:3px;overflow:hidden;background:#f0f0f0">${bars}</div></td>
      ${vals}
      <td style="text-align:right;font-weight:700;font-size:9px">${fmt(tot)}${isEur?'€':''}</td>
      <td style="text-align:right;font-size:8px;color:var(--sub)">${pctTotal}%</td>
    </tr>`;
  }).join('');

  const locHdrs=visLocs.map((l,i)=>`<th style="color:${visCols[i]};font-size:8px;min-width:44px;width:44px;text-align:right">${visShort[i]}</th>`).join('');
  const legend=visLocs.map((l,i)=>`<span style="font-size:8px;color:${visCols[i]};font-weight:600">■ ${visShort[i]}</span>`).join(' ');

  const totRow=`<tr style="border-top:1px solid var(--sep);background:rgba(0,0,0,.03)">
    <td style="font-size:9px;font-weight:700">TOTAL</td><td></td>
    ${visLocs.map((l,i)=>`<td style="text-align:right;font-size:9px;font-weight:700;color:${visCols[i]}">${fmt(totPerLoc[i])}${isEur?'€':''}</td>`).join('')}
    <td style="text-align:right;font-weight:700;font-size:9px">${fmt(totGeneral)}${isEur?'€':''}</td>
    <td style="text-align:right;font-size:8px;color:var(--sub)">100%</td>
  </tr>`;

  // Fila cobertura per secció
  function covRow(secKey){
    const pctsLoc=visLocs.map((l,i)=>PD.cov[visKeys[i]+'_'+secKey]||0);
    const mitjaCov=Math.round(pctsLoc.reduce((a,b)=>a+b,0)/pctsLoc.length);
    const cls=mitjaCov>=85?'ok':mitjaCov>=70?'warn':'bad';
    const cels=visLocs.map((l,i)=>{const p=pctsLoc[i];const c2=p>=85?'ok':p>=70?'warn':'bad';return`<td style="text-align:right;font-size:9px;font-weight:700;color:var(--${c2})">${p}%</td>`;}).join('');
    return`<tr style="background:rgba(0,0,0,.02)">
      <td style="font-size:8px;font-weight:600;color:var(--sub)">Cob. ${secKey.charAt(0)+secKey.slice(1).toLowerCase()}</td>
      <td></td>${cels}
      <td style="text-align:right;font-size:9px;font-weight:700;color:var(--${cls})">${mitjaCov}%</td>
      <td></td>
    </tr>`;
  }

  const unitSel=`<div style="display:flex;gap:4px;margin-top:4px">
    <button class="sb${isEur?' active':''}" onclick="setFamUnit('eur')">\u20AC Euros</button>
    <button class="sb${!isEur?' active':''}" onclick="setFamUnit('uni')">Unitats</button>
  </div>`;

  return`<div class="card" style="margin-top:4px">
    <div class="ch" style="flex-direction:column;align-items:flex-start;gap:4px">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
        <span class="ct">Vendes per família · mitja setmanal</span>
        ${unitSel}
      </div>
      <div style="font-size:8px;color:var(--sub);display:flex;gap:6px;flex-wrap:wrap">${legend}</div>
    </div>
    <div class="cb" style="padding:4px 8px 8px">
      <table class="dtbl" style="width:100%">
        <thead><tr><th style="text-align:left">Família</th><th></th>${locHdrs}<th>Total</th><th>%</th></tr></thead>
        <tbody>${rows}${totRow}${covRow('MENJAR')}${covRow('POSTRES')}${covRow('BEGUDES')}</tbody>
      </table>
    </div>
  </div>
  <div class="card">
    <div class="ch"><span class="ct">Comparativa visual · top 8 famílies</span></div>
    <div class="cb" style="padding:6px 4px 8px"><div style="position:relative;height:220px"><canvas id="c-prod-fam"></canvas></div></div>
  </div>`;
}
function initFamiliesChart(){const ctx=document.getElementById('c-prod-fam');if(!ctx)return;if(charts['pf'])charts['pf'].destroy();const top8=PD.fam_comp.slice(0,8);charts['pf']=new Chart(ctx,{type:'bar',data:{labels:top8.map(f=>f.fam),datasets:PROD_LOCS.map((l,i)=>({label:PROD_SHORT[l],data:top8.map(f=>f[PROD_KEYS[i]]),backgroundColor:PROD_COLS[l]+'cc'}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:9},boxWidth:10}}},scales:{x:{ticks:{font:{size:8},maxRotation:30}},y:{ticks:{font:{size:9},callback:v=>v+'€'}}}}});}
function setArtUnit(u){window._artUnit=u;document.getElementById('prod-detail').innerHTML=renderProdArticles();}
function setFamUnit(u){window._famUnit=u;document.getElementById('prod-detail').innerHTML=renderProdFamilies();setTimeout(initFamiliesChart,0);}

initAuth();
</script>
</body>
</html>
