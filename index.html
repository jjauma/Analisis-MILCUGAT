:root{--bg:#f2f2f7;--card:#fff;--text:#1c1c1e;--sub:#8e8e93;--sep:rgba(60,60,67,.1);--accent:#007aff;--ok:#34c759;--warn:#ff9f0a;--bad:#ff3b30;--r:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);padding-bottom:60px;font-size:14px}
.topbar{position:sticky;top:0;z-index:99;background:rgba(242,242,247,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:10px 14px 8px;border-bottom:.5px solid var(--sep)}
.topbar h1{font-size:15px;font-weight:700;letter-spacing:-.3px}
.topbar p{font-size:11px;color:var(--sub)}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:99;background:rgba(248,248,248,.97);backdrop-filter:blur(16px);border-top:.5px solid var(--sep);display:flex;height:56px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9px;color:var(--sub);cursor:pointer;border:none;background:none;transition:color .15s}
.tab.active{color:var(--accent)}.tab svg{width:20px;height:20px}
.page{display:none;padding:8px 10px 4px;animation:fi .18s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.ch{padding:8px 12px 7px;border-bottom:.5px solid var(--sep);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.4px}
.cb{padding:10px 12px}
.krow{display:grid;gap:6px;margin-bottom:8px}
.k2{grid-template-columns:1fr 1fr}.k3{grid-template-columns:1fr 1fr 1fr}
.kpi{background:var(--card);border-radius:var(--r);padding:8px 10px}
.kl{font-size:10px;color:var(--sub);margin-bottom:2px}
.kv{font-size:20px;font-weight:700;letter-spacing:-.7px;line-height:1.1}
.kv.ok{color:var(--ok)}.kv.warn{color:var(--warn)}.kv.bad{color:var(--bad)}
.ks{font-size:10px;color:var(--sub);margin-top:1px}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600}
.pill.ok{background:rgba(52,199,89,.14);color:#1a7a37}
.pill.warn{background:rgba(255,159,10,.14);color:#b36b00}
.pill.bad{background:rgba(255,59,48,.14);color:#c0392b}
.loc-sticky{position:sticky;top:52px;z-index:50;padding:6px 10px;background:rgba(242,242,247,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:.5px solid var(--sep);margin:0 -10px 10px}
.seg{display:flex;background:rgba(118,118,128,.12);border-radius:8px;padding:2px}
.sb{flex:1;padding:5px 2px;border:none;background:none;font-size:10px;font-weight:500;color:var(--sub);border-radius:6px;cursor:pointer;transition:all .15s;text-align:center}
.sb.active{background:var(--card);color:var(--text);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.loc-banner{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;margin-bottom:8px}
.cw{position:relative;height:190px}
.cws{position:relative;height:160px}
.cwm{position:relative;height:175px}
/* Taules dades */
.dtbl{width:100%;border-collapse:collapse;font-size:10px}
.dtbl th{color:var(--sub);font-weight:600;padding:3px 2px 4px;text-align:center;border-bottom:.5px solid var(--sep);white-space:nowrap;font-size:9px}
.dtbl th:first-child{text-align:left;padding-left:2px;min-width:42px}
.dtbl td{padding:3px 2px;text-align:center;border-bottom:.5px solid var(--sep);font-size:9px}
.dtbl td:first-child{text-align:left;padding-left:2px;font-weight:600;font-size:9px;white-space:nowrap}
.dtbl tr:last-child td{border-bottom:none}
.dtbl .tot-col{font-weight:700;border-left:.5px solid var(--sep)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-size:10px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:5px 8px;border-bottom:.5px solid var(--sep);text-align:right}
.tbl th:first-child{text-align:left}
.tbl td{padding:6px 8px;border-bottom:.5px solid var(--sep);text-align:right}
.tbl td:first-child{text-align:left;font-weight:500}
.tbl tr:last-child td{border-bottom:none}
.hm{display:grid;gap:2px}
.hml{color:var(--sub);display:flex;align-items:center;font-size:9px;font-weight:600}
.hmc{border-radius:4px;height:26px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.rg{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;text-align:center}
.rg .lbl{font-size:9px;font-weight:600;color:var(--sub);display:flex;align-items:center;font-size:9px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.day-row{display:flex;flex-direction:column;padding:5px 0;border-bottom:.5px solid var(--sep)}
.day-row:last-child{border-bottom:none}
.abs-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid var(--sep)}
.abs-row:last-child{border-bottom:none}
</style>
</head>

const LOCS=['SM Sarrià','SM Sabadell','Picu Sabadell','Picu StCugat'];
const DIES=['Dl','Dt','Dc','Dj','Dv','Ds','Dg'];

const GCOLS=['#1F3864','#1E6B3C','#E07B30','#9B6BD4'];
let curLoc='SM Sarrià',curPer='SM Sarrià',charts={};

const sf=r=>r<=35?'ok':r<=38?'warn':'bad';
const si=r=>r<=35?'🟢':r<=38?'🟡':'🔴';
const rc=r=>r<=35?'var(--ok)':r<=38?'var(--warn)':'var(--bad)';
const rcbg=r=>r<=35?'rgba(52,199,89,.12)':r<=38?'rgba(255,159,10,.12)':'rgba(255,59,48,.12)';
const fmt=n=>Math.round(n).toLocaleString('ca-ES');
const pc=n=>parseFloat(n).toFixed(1)+'%';
const dk=k=>{if(charts[k]){charts[k].destroy();delete charts[k]}};

function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('tab-'+p).classList.add('active');
  if(p==='resum')renderResum();
  if(p==='locals'){buildSeg('loc-seg',curLoc,selLocal);renderLocDetail();}
  if(p==='personal'){buildSeg('per-seg',curPer,selPer);renderPerDetail();}
  if(p==='productes'){curProdSec='vendes';renderProductes();}
  window.scrollTo(0,0);
}

function buildSeg(id,cur,fn){
  document.getElementById(id).innerHTML=LOCS.map((l,i)=>`<button class="sb${l===cur?' active':''}" onclick="${fn.name}('${l}')">${l.replace('SM Sarrià','Sarrià').replace('SM Sabadell','Sabadell').replace('Picu ','P.')}</button>`).join('');
}
function selLocal(l){curLoc=l;buildSeg('loc-seg',l,selLocal);renderLocDetail();window.scrollTo(0,52);}
function selPer(l){curPer=l;buildSeg('per-seg',l,selPer);renderPerDetail();window.scrollTo(0,52);}

// ── RESUM ─────────────────────────────────────────────────────────────────
function renderResum(){
  const totV=Object.values(DV).reduce((s,d)=>s+d.total_vendes,0);
  const totC=Object.values(DV).reduce((s,d)=>s+d.total_cost,0);
  const totR=totC/totV*100;

  // Taula resum: Local | Vendes | Cost | Ràtio | Dies
  let html=`<table class="dtbl" style="font-size:11px">
    <thead><tr>
      <th style="text-align:left">Local</th>
      <th>Vendes</th><th>Cost</th><th>Ràtio C/V</th><th>Dies</th>
    </tr></thead><tbody>`;
  LOCS.forEach((l,i)=>{
    const d=DV[l];
    html+=`<tr style="cursor:pointer" onclick="selLocal('${l}');showPage('locals')">
      <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${GCOLS[i]};margin-right:4px"></span>${l}</td>
      <td style="font-weight:600">${fmt(d.total_vendes)}€</td>
      <td>${fmt(d.total_cost)}€</td>
      <td style="font-weight:700;color:${rc(d.ratio)}">${pc(d.ratio)} ${si(d.ratio)}</td>
      <td style="color:var(--sub)">${d.dies}</td>
    </tr>`;
  });
  html+=`<tr style="border-top:.5px solid var(--sep);background:rgba(0,0,0,0.02)">
    <td style="font-weight:700">TOTAL</td>
    <td style="font-weight:700">${fmt(totV)}€</td>
    <td style="font-weight:700">${fmt(totC)}€</td>
    <td style="font-weight:700;color:${rc(totR)}">${pc(totR)} ${si(totR)}</td>
    <td style="color:var(--sub)">—</td>
  </tr></tbody></table>`;
  document.getElementById('resum-taula').innerHTML=html;

  const fws=DV['SM Sarrià'].fw_list.map(f=>'fw'+f);
  const mitjes=LOCS.reduce((o,l)=>{const fw=DV[l].fw_vendes;o[l]=fw.reduce((a,b)=>a+b,0)/fw.length;return o},{});

  // Gràfic vendes: línies per local + línia total grup (eix secundari per no desvirtuar)
  dk('cg');
  charts['cg']=new Chart(document.getElementById('cg').getContext('2d'),{
    type:'line',
    data:{labels:fws,datasets:[
      ...LOCS.map((l,i)=>({label:l,data:DV[l].fw_vendes,borderColor:GCOLS[i],backgroundColor:'transparent',borderWidth:2,pointRadius:2,tension:.3,yAxisID:'y'})),
      {label:'Total grup',data:GRUP_V,borderColor:'#aaa',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,3],pointRadius:2,tension:.3,yAxisID:'y2'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{font:{size:9},boxWidth:8,padding:5}},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.raw)}€`}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:8}}},
        y:{position:'left',grid:{color:'rgba(0,0,0,0.03)'},ticks:{font:{size:8},callback:v=>fmt(v)+'€'},title:{display:true,text:'Per local',font:{size:8},color:'var(--sub)'}},
        y2:{position:'right',grid:{display:false},ticks:{font:{size:8},callback:v=>(v/1000).toFixed(0)+'k€'},title:{display:true,text:'Grup',font:{size:8},color:'#aaa'}}
      }
    }
  });

  // Taula vendes: local x fw + total + mitja, colors per vs mitja
  let tV=`<table class="dtbl"><thead><tr><th>Local</th><th class="tot-col">Mitja/fw</th>${fws.map(f=>`<th>${f}</th>`).join('')}<th class="tot-col">Total</th></tr></thead><tbody>`;
  LOCS.forEach((l,i)=>{
    const mitja=mitjes[l];
    tV+=`<tr><td style="color:${GCOLS[i]}">${l.replace('SM ','').replace('Picu ','P.')}</td>`;
    tV+=`<td class="tot-col" style="color:var(--sub);font-weight:600">${(mitja/1000).toFixed(1)}k</td>`;
    DV[l].fw_vendes.forEach(v=>{
      const p=(v-mitja)/mitja;
      const bg=p>0.1?'rgba(52,199,89,.15)':p>-0.1?'':'rgba(255,59,48,.13)';
      const tc=p>0.1?'#1a7a37':p>-0.1?'var(--text)':'#c0392b';
      tV+=`<td style="background:${bg};color:${tc}${p!==0?';font-weight:600':''}">${(v/1000).toFixed(0)}k</td>`;
    });
    tV+=`<td class="tot-col" style="font-weight:700">${(DV[l].total_vendes/1000).toFixed(0)}k</td>`;
    tV+='</tr>';
  });
  // Fila total grup
  const gTot=GRUP_V.reduce((a,b)=>a+b,0);const gMitja=gTot/GRUP_V.length;
  tV+=`<tr style="border-top:.5px solid var(--sep)"><td style="font-weight:700">Grup</td>`;
  tV+=`<td class="tot-col" style="color:var(--sub);font-weight:600">${(gMitja/1000).toFixed(1)}k</td>`;
  GRUP_V.forEach(v=>tV+=`<td style="font-weight:600">${(v/1000).toFixed(0)}k</td>`);
  tV+=`<td class="tot-col" style="font-weight:700">${(gTot/1000).toFixed(0)}k</td>`;
  tV+='</tr></tbody></table>';
  document.getElementById('cg-taula').innerHTML=tV;

  // Gràfic ràtio
  dk('cr');
  charts['cr']=new Chart(document.getElementById('cr').getContext('2d'),{
    type:'line',
    data:{labels:fws,datasets:LOCS.map((l,i)=>({label:l,data:DV[l].fw_ratio,borderColor:GCOLS[i],backgroundColor:'transparent',borderWidth:2,pointRadius:2,tension:.3}))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{font:{size:9},boxWidth:8,padding:5}},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw}%`}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:8}}},y:{grid:{color:'rgba(0,0,0,0.03)'},ticks:{font:{size:8},callback:v=>v+'%'},min:20,max:65}}
    }
  });

  // Taula ràtio: fw + total acumulat + ràtio acumulat
  let tR=`<table class="dtbl"><thead><tr><th>Local</th>${fws.map(f=>`<th>${f}</th>`).join('')}<th class="tot-col">Acum.</th></tr></thead><tbody>`;
  // Ràtio setmanal per local
  LOCS.forEach((l,i)=>{
    tR+=`<tr><td style="color:${GCOLS[i]}">${l.replace('SM ','').replace('Picu ','P.')}</td>`;
    DV[l].fw_ratio.forEach(r=>tR+=`<td style="color:${rc(r)};font-weight:600">${r}%</td>`);
    tR+=`<td class="tot-col" style="font-weight:700;color:${rc(DV[l].ratio)}">${pc(DV[l].ratio)}</td>`;
    tR+='</tr>';
  });
  // Separador
  tR+=`<tr><td colspan="${fws.length+2}" style="padding:0"><div style="height:8px"></div></td></tr>`;tR+=`<tr><td colspan="${fws.length+2}" style="padding:3px 0;border-bottom:.5px solid var(--sep);font-size:9px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.3px">Ràtio acumulat (fw1→fwN)</td></tr>`;
  LOCS.forEach((l,i)=>{
    tR+=`<tr><td style="color:${GCOLS[i]}">${l.replace('SM ','').replace('Picu ','P.')}</td>`;
    DV[l].fw_ratio_acum.forEach(r=>tR+=`<td style="color:${rc(r)};font-weight:600">${r}%</td>`);
    tR+=`<td class="tot-col" style="font-weight:700;color:${rc(DV[l].ratio)}">${pc(DV[l].ratio)}</td>`;
    tR+='</tr>';
  });
  // Grup acumulat
  tR+=`<tr style="border-top:.5px solid var(--sep)"><td style="font-weight:700">Grup</td>`;
  GRUP_ACUM.forEach(r=>tR+=`<td style="color:${rc(r)};font-weight:600">${r}%</td>`);
  tR+=`<td class="tot-col" style="font-weight:700;color:${rc(GRUP_ACUM[GRUP_ACUM.length-1])}">${pc(GRUP_ACUM[GRUP_ACUM.length-1])}</td>`;
  tR+='</tr></tbody></table>';
  document.getElementById('cr-taula').innerHTML=tR;
}

function tornTaula(p,col){
  const torns=['Matí','Migdia','Tarda','Nit'];

  return`<table class="tbl">

      datasets:[
        {label:'SM Sarrià',data:PD.sar_w,borderColor:COL_SAR,backgroundColor:COL_SAR+'18',borderWidth:2.5,pointRadius:3,tension:.3,fill:false},
        {label:'SM Sabadell',data:PD.sbd_w,borderColor:COL_SBD,backgroundColor:COL_SBD+'18',borderWidth:2.5,pointRadius:3,tension:.3,fill:false},
        {label:'Tend. Sarrià',data:PD.tend_s,borderColor:COL_SAR,borderWidth:1.5,borderDash:[5,4],pointRadius:0,tension:0,fill:false},
        {label:'Tend. Sabadell',data:PD.tend_b,borderColor:COL_SBD,borderWidth:1.5,borderDash:[5,4],pointRadius:0,tension:0,fill:false}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:12}}},scales:{x:{ticks:{font:{size:9}}},y:{ticks:{font:{size:9},callback:v=>fmtK(v)+'€'}}}}
  });
}

function renderProdArticles(){
  function artRows(list){
    return list.map(a=>`<tr>
      <td style="max-width:115px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:9.5px;font-weight:600">${a.art}</td>
      <td style="text-align:right;font-size:9px;color:${COL_SAR}">${a.sar>0?a.sar+'€':'—'}</td>
      <td style="text-align:right;font-size:9px;color:${COL_SBD}">${a.sbd>0?a.sbd+'€':'—'}</td>
      <td style="padding:3px 4px;min-width:55px">
        <div style="display:flex;height:8px;border-radius:4px;overflow:hidden;background:#eee">
          ${a.sar>0?`<div style="width:${Math.round(a.sar/a.tot*100)}%;background:${COL_SAR}99"></div>`:''}
          ${a.sbd>0?`<div style="width:${Math.round(a.sbd/a.tot*100)}%;background:${COL_SBD}99"></div>`:''}
        </div>
      </td>
      <td style="text-align:right;font-weight:700;font-size:10px">${a.tot}€</td>
    </tr>`).join('');
  }
  const secs=[
    {label:'🍽 Menjar',list:PD.top_menjar,color:'#1A3A5C'},
    {label:'🍮 Postres',list:PD.top_postres,color:'#6E2F1A'},
    {label:'🍺 Begudes',list:PD.top_begudes,color:'#1A5C3A'}
  ];
  return secs.map((s,i)=>`
  <div class="card" style="margin-top:${i===0?4:0}px">
    <div class="ch">
      <span class="ct" style="color:${s.color}">${s.label} · top articles · €/setm</span>
      <div style="display:flex;gap:8px">
        <span style="font-size:9px;color:${COL_SAR};font-weight:600">■ Sarrià</span>
        <span style="font-size:9px;color:${COL_SBD};font-weight:600">■ Sabadell</span>
      </div>
    </div>
    <div class="cb" style="padding:4px 8px 8px;overflow-x:auto">
      <table class="dtbl" style="width:100%">
        <thead><tr><th style="text-align:left">Article</th><th>Sarrià</th><th>Sabadell</th><th></th><th>Total</th></tr></thead>
        <tbody>${artRows(s.list)}</tbody>
      </table>
    </div>
  </div>`).join('');
}

function renderProdFamilies(){
  const maxVal=Math.max(...PD.fam_comp.map(f=>f.sar+f.sbd));
  const rows=PD.fam_comp.map(f=>{
    const tot=f.sar+f.sbd;
    return `<tr>
      <td style="font-size:9px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:85px">${f.fam}</td>
      <td style="padding:4px 4px;min-width:65px">
        <div style="display:flex;height:10px;border-radius:3px;overflow:hidden;background:#f0f0f0">
          ${f.sar>0?`<div style="width:${Math.round(f.sar/maxVal*100)}%;background:${COL_SAR}bb"></div>`:''}
          ${f.sbd>0?`<div style="width:${Math.round(f.sbd/maxVal*100)}%;background:${COL_SBD}bb"></div>`:''}
        </div>
      </td>
      <td style="text-align:right;font-size:9px;color:${COL_SAR}">${f.sar>0?f.sar+'€':'—'}</td>
      <td style="text-align:right;font-size:9px;color:${COL_SBD}">${f.sbd>0?f.sbd+'€':'—'}</td>
      <td style="text-align:right;font-weight:700;font-size:10px">${tot}€</td>
    </tr>`;
  }).join('');
  return `
  <div class="card" style="margin-top:4px">
    <div class="ch">
      <span class="ct">Vendes per família · €/setm</span>
      <div style="display:flex;gap:8px">
        <span style="font-size:9px;color:${COL_SAR};font-weight:600">■ Sarrià</span>
        <span style="font-size:9px;color:${COL_SBD};font-weight:600">■ Sabadell</span>
      </div>
    </div>
    <div class="cb" style="padding:4px 8px 8px">
      <table class="dtbl" style="width:100%">
        <thead><tr><th style="text-align:left">Família</th><th></th><th>Sarrià</th><th>Sabadell</th><th>Total</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>
  <div class="card">
    <div class="ch"><span class="ct">Comparativa visual · top 8 famílies</span></div>
    <div class="cb" style="padding:6px 4px 8px"><div style="position:relative;height:210px"><canvas id="c-prod-fam"></canvas></div></div>
  </div>`;
}

function initFamiliesChart(){
  const ctx=document.getElementById('c-prod-fam');
  if(!ctx) return;
  if(charts['pf']) charts['pf'].destroy();
  const top8=PD.fam_comp.slice(0,8);
  charts['pf']=new Chart(ctx,{
    type:'bar',
    data:{
      labels:top8.map(f=>f.fam),
      datasets:[
        {label:'SM Sarrià',data:top8.map(f=>f.sar),backgroundColor:COL_SAR+'cc'},
        {label:'SM Sabadell',data:top8.map(f=>f.sbd),backgroundColor:COL_SBD+'cc'}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:9},boxWidth:10}}},scales:{x:{ticks:{font:{size:8},maxRotation:30}},y:{ticks:{font:{size:9},callback:v=>v+'€'}}}}
  });
}

function renderProdCobertura(){
  function covBar(pct){
    const cls=pct>=85?'ok':pct>=70?'warn':'bad';
    return `<div style="display:flex;align-items:center;gap:8px">
      <div style="flex:1;height:10px;background:var(--sep);border-radius:5px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:var(--${cls});border-radius:5px"></div>
      </div>
      <span class="pill ${cls}" style="font-size:10px;padding:1px 6px;min-width:42px;text-align:center">${pct}%</span>
    </div>`;
  }
  const c=PD.cov;
  return `
  <div class="card" style="margin-top:4px">
    <div class="ch"><span class="ct" style="color:${COL_SAR}">SM Sarrià · cobertura per secció</span></div>
    <div class="cb" style="display:flex;flex-direction:column;gap:12px">
      <div><div style="font-size:10px;color:var(--sub);margin-bottom:5px">🍽 Menjar · articles ≥100€/setm</div>${covBar(c.sar_menjar)}</div>
      <div><div style="font-size:10px;color:var(--sub);margin-bottom:5px">🍮 Postres · articles ≥100€/setm</div>${covBar(c.sar_postres)}</div>
      <div><div style="font-size:10px;color:var(--sub);margin-bottom:5px">🍺 Begudes · articles ≥100€/setm</div>${covBar(c.sar_begudes)}</div>
    </div>
  </div>
  <div class="card">
    <div class="ch"><span class="ct" style="color:${COL_SBD}">SM Sabadell · cobertura per secció</span></div>
    <div class="cb" style="display:flex;flex-direction:column;gap:12px">
      <div><div style="font-size:10px;color:var(--sub);margin-bottom:5px">🍽 Menjar · articles ≥100€/setm</div>${covBar(c.sbd_menjar)}</div>
      <div><div style="font-size:10px;color:var(--sub);margin-bottom:5px">🍮 Postres · articles ≥100€/setm</div>${covBar(c.sbd_postres)}</div>
      <div><div style="font-size:10px;color:var(--sub);margin-bottom:5px">🍺 Begudes · articles ≥100€/setm</div>${covBar(c.sbd_begudes)}</div>
    </div>
  </div>
  <div class="card">
    <div class="ch"><span class="ct">Interpretació</span></div>
    <div class="cb" style="font-size:11px;color:var(--sub);line-height:1.6">
      % de les vendes totals de cada secció representades pels articles amb ≥100€/setm de mitja. Com més alt, més completa és l'anàlisi.
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        <span class="pill ok">≥85% Òptim</span>
        <span class="pill warn">70–84% Acceptable</span>
        <span class="pill bad">&lt;70% Baix</span>
      </div>
    </div>
  </div>`;
}
</script>
</body>
</html>
