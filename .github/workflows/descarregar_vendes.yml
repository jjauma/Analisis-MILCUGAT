name: Descarregar vendes Sofyman

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  descarregar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Descarregar vendes SM Sarrià
        env:
          SOFYMAN_ORG_ID: '163'
          SOFYMAN_PV_ID: '1'
          SOFYMAN_API_KEY: ${{ secrets.SOFYMAN_API_KEY }}
          LOCAL_NOM: 'SM Sarria'
          ANY_VENDES: '2026'
        run: python descarregar_vendes.py

      - name: Desar CSV al repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Vendes actualitzades $(date +'%Y-%m-%d')"
          git push
